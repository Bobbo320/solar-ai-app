<script>

let preloadedWeather = null;

// -------------------- MODEL CONFIG --------------------
const MODEL = {
  daylightThreshold: 100,
  cloudWeight: 0.6,
  radiationWeight: 0.4,
  tempCoeff: -0.004,
  minTempFactor: 0.8,
  maxTempFactor: 1.05,
  socBuffer: 1.15,       // reserve margin
  systemLoss: 0.92       // inverter + wiring losses
};

// -------------------- HELPERS --------------------
function safeParse(value, fallback) {
  const n = parseFloat(value);
  return isNaN(n) ? fallback : n;
}

// -------------------- SETTINGS --------------------
function getSettings() {
  let s = JSON.parse(localStorage.getItem("settings") || "{}");

  return {
    postcode: s.postcode || "Norwich",
    pvSize: s.pvSize ?? 6.5,
    inverter: s.inverter ?? 5,
    battery: s.battery ?? 10.64,
    orientation: s.orientation || "south",
    shading: s.shading ?? 100,
    dailyLoad: s.dailyLoad ?? 10,
    efficiency: s.efficiency ?? 85,
    socLow: s.socLow ?? 20,
    socHigh: s.socHigh ?? 95
  };
}

function saveSettings() {
  let settings = {
    postcode: document.getElementById("postcode").value,
    pvSize: safeParse(document.getElementById("pvSize").value, 6.5),
    inverter: safeParse(document.getElementById("inverter").value, 5),
    battery: safeParse(document.getElementById("battery").value, 10.64),
    orientation: document.getElementById("orientation").value,
    shading: safeParse(document.getElementById("shading").value, 100),
    dailyLoad: safeParse(document.getElementById("dailyLoad").value, 10),
    efficiency: safeParse(document.getElementById("efficiency").value, 85),
    socLow: safeParse(document.getElementById("socLow").value, 20),
    socHigh: safeParse(document.getElementById("socHigh").value, 95)
  };

  if (!settings.postcode) {
    alert("Please enter a location");
    return;
  }

  localStorage.setItem("settings", JSON.stringify(settings));
  preloadWeather();

  alert("Saved");
  toggleSettings();
}

function loadSettingsToUI() {
  let s = getSettings();

  Object.keys(s).forEach(k => {
    let el = document.getElementById(k);
    if (el) el.value = s[k];
  });
}

function toggleSettings() {
  document.getElementById("settingsPanel").classList.toggle("hidden");
  loadSettingsToUI();
}

// -------------------- CACHE --------------------
function getCache(key) {
  return JSON.parse(localStorage.getItem(key) || "null");
}

function setCache(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

// -------------------- PRELOAD --------------------
async function preloadWeather() {
  try {
    let s = getSettings();
    preloadedWeather = await getWeather(s.postcode);
  } catch (e) {
    console.log("Preload failed:", e);
  }
}

// -------------------- GEOCODING --------------------
async function getCoordinates(postcode) {
  let cacheKey = "coords_" + postcode;
  let cached = getCache(cacheKey);
  if (cached) return cached;

  try {
    let res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(postcode)}&count=1`);
    if (!res.ok) throw new Error();

    let data = await res.json();

    if (!data.results || data.results.length === 0) {
      throw new Error();
    }

    let coords = {
      lat: data.results[0].latitude,
      lon: data.results[0].longitude
    };

    setCache(cacheKey, coords);
    return coords;

  } catch {
    document.getElementById("loading").innerText = "⚠️ Location not found, using last known/default";
    return getCache(cacheKey) || { lat: 52.6309, lon: 1.2974 };
  }
}

// -------------------- WEATHER --------------------
async function getWeather(postcode) {
  let cacheKey = "weather_" + postcode;
  let cached = getCache(cacheKey);

  let now = Date.now();
  let cacheDuration = 30 * 60 * 1000;

  if (cached && (now - cached.timestamp < cacheDuration)) {
    return cached.data;
  }

  try {
    let c = await getCoordinates(postcode);

    let res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto`
    );

    if (!res.ok) throw new Error();

    let data = await res.json();

    setCache(cacheKey, {
      timestamp: now,
      data: data
    });

    return data;

  } catch {
    document.getElementById("loading").innerText = "⚠️ Using fallback weather data";
    return {
      hourly: {
        cloudcover: new Array(72).fill(50),
        shortwave_radiation: new Array(72).fill(200),
        temperature_2m: new Array(72).fill(15),
        relativehumidity_2m: new Array(72).fill(70),
        precipitation: new Array(72).fill(0)
      }
    };
  }
}

// -------------------- SOLAR MODEL --------------------
function getOrientationFactor(o) {
  return {
    south: 1,
    se_sw: 0.92,
    east_west: 0.85,
    north: 0.65
  }[o] || 1;
}

function temperatureEfficiency(t) {
  let f = 1 + ((t - 25) * MODEL.tempCoeff);
  return Math.min(MODEL.maxTempFactor, Math.max(MODEL.minTempFactor, f));
}

function hourlySolarScore(c, r) {
  return (1 - c / 100) * MODEL.cloudWeight +
         (r / 1000) * MODEL.radiationWeight;
}

// ✅ NEW unified energy-based PV
function estimatePV(dayCloud, dayRad, dayTemp, s) {
  let totalScore = 0;

  for (let i = 0; i < dayRad.length; i++) {
    if (dayRad[i] > MODEL.daylightThreshold) {
      totalScore += hourlySolarScore(dayCloud[i], dayRad[i]);
    }
  }

  let avgScore = totalScore / 24;

  let totalRadiation = dayRad.reduce((a, b) => a + b, 0) / 1000; // kWh proxy

  let pv =
    s.pvSize *
    totalRadiation *
    avgScore *
    (s.efficiency / 100) *
    MODEL.systemLoss *
    temperatureEfficiency(dayTemp) *
    getOrientationFactor(s.orientation) *
    (s.shading / 100);

  let inverterCap = s.inverter * 5; // approx usable window

  return Math.min(pv, inverterCap);
}

// -------------------- SOC --------------------
function recommendedSOC(pv, s) {
  let netLoad = s.dailyLoad / MODEL.systemLoss;

  let shortfall = Math.max(0, netLoad - pv);

  let required = shortfall * MODEL.socBuffer;

  let soc = (required / s.battery) * 100;

  return Math.max(s.socLow, Math.min(s.socHigh, Math.round(soc)));
}

// -------------------- UI --------------------
function weatherSummary(c,r,t,h,p){
  return `
    🌤️ Cloud: ${c.toFixed(0)}%<br>
    ☀️ Radiation: ${r.toFixed(0)} W/m²<br>
    🌡️ Temp (midday): ${t.toFixed(1)}°C<br>
    💧 Humidity: ${h.toFixed(0)}%<br>
    🌧️ Precip: ${p.toFixed(2)} mm
  `;
}

function renderDayCard(label, summary, pv, soc) {
  return `
    <div class="card">
      <h3>${label}</h3>
      ${summary}
      <br><b>⚡ Estimated PV:</b> ${pv.toFixed(1)} kWh
      <br><b>🔋 Recommended SOC:</b> ${soc}%
    </div>
  `;
}

// -------------------- MAIN --------------------
async function runAI(){

  let btn = document.querySelector("button[onclick='runAI()']");
  btn.disabled = true;

  let s = getSettings();
  document.getElementById("loading").innerText="Loading...";

  let data = preloadedWeather || await getWeather(s.postcode);

  let cloud=data.hourly.cloudcover;
  let rad=data.hourly.shortwave_radiation;
  let temp=data.hourly.temperature_2m;
  let hum=data.hourly.relativehumidity_2m;
  let precip=data.hourly.precipitation;

  let html="";

  for(let d=0;d<3;d++){

    let start=d*24;

    let dayCloud = cloud.slice(start, start + 24);
    let dayRad = rad.slice(start, start + 24);

    let midTemp = temp[start+12];

    let avgRad = dayRad.reduce((a,b)=>a+b)/24;

    let pv = estimatePV(dayCloud, dayRad, midTemp, s);
    let soc = recommendedSOC(pv, s);

    let date = new Date();
    date.setDate(date.getDate() + d);
    let label = date.toLocaleDateString();

    let summary = weatherSummary(
      dayCloud.reduce((a,b)=>a+b)/24,
      avgRad,
      midTemp,
      hum[start+12],
      precip[start+12]
    );

    html += renderDayCard(label, summary, pv, soc);
  }

  document.getElementById("output").innerHTML=html;
  document.getElementById("loading").innerText="";
  btn.disabled = false;
}

// -------------------- INIT --------------------
window.onload = () => {
  preloadWeather();
};

</script>
