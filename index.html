<!DOCTYPE html>
<html>
<head>
  <title>Solar ROI AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding: 20px; background: #0f172a; color: white; text-align: center; }
    button { padding: 12px; margin: 10px; font-size: 16px; }
    .card { margin-top: 15px; padding: 15px; background: #1e293b; border-radius: 10px; text-align: left; }
  </style>
</head>

<body>

<h2>⚡ Solar ROI AI Pro</h2>

<div class="card">
📍 NR7 0WZ (Norwich)<br>
☀️ 6.5 kW Array | 🔋 10.6 kWh Battery
</div>

<button onclick="runAI()">Run Forecast</button>

<div id="output"></div>

<script>
const ARRAY_SIZE = 6.5;
const BATTERY_SIZE = 10.6;
const INVERTER_LIMIT = 5;
const EXPORT_RATE = 0.24;

function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;
  return Math.min(1, Math.max(0, (cloudFactor * 0.6) + (radiationFactor * 0.4)));
}

function sunElevation(date, lat, lon) {
  const rad = Math.PI / 180;
  let day = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  let decl = 23.45 * Math.sin(rad * (360 * (284 + day) / 365));
  let hour = date.getHours();
  let solarTime = hour + (lon / 15);
  let hourAngle = 15 * (solarTime - 12);

  let elevation = Math.asin(
    Math.sin(lat * rad) * Math.sin(decl * rad) +
    Math.cos(lat * rad) * Math.cos(decl * rad) * Math.cos(hourAngle * rad)
  ) / rad;

  return Math.max(0, elevation);
}

async function runAI() {

  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,shortwave_radiation&forecast_days=3&timezone=auto"
  );

  let data = await res.json();

  let output = "";

  for (let d = 0; d < 3; d++) {

    let totalKwh = 0;
    let peakPower = 0;
    let clippedEnergy = 0;

    for (let h = d * 24; h < d * 24 + 24; h++) {

      let date = new Date(data.hourly.time[h]);
      let elevation = sunElevation(date, 52.627, 1.331);

      let sunFactor = Math.sin(elevation * Math.PI / 180);
      let score = hourlySolarScore(data.hourly.cloudcover[h], data.hourly.shortwave_radiation[h]);

      let power = ARRAY_SIZE * score * sunFactor;

      peakPower = Math.max(peakPower, power);

      if (power > INVERTER_LIMIT) {
        clippedEnergy += (power - INVERTER_LIMIT);
        power = INVERTER_LIMIT;
      }

      totalKwh += power * 0.75; // efficiency factor
    }

    let batteryFill = Math.min(100, (totalKwh / BATTERY_SIZE) * 100);
    let exportKwh = Math.max(0, totalKwh - BATTERY_SIZE);
    let earnings = exportKwh * EXPORT_RATE;

    output += `
      <div class="card">
        <b>Day ${d+1}</b><br><br>

        📈 Generation: ${totalKwh.toFixed(1)} kWh<br>
        ⚡ Peak Power: ${peakPower.toFixed(1)} kW<br>
        ✂️ Clipping Loss: ${clippedEnergy.toFixed(1)} kWh<br><br>

        🔋 Battery Fill: ${batteryFill.toFixed(0)}%<br>
        💰 Export: £${earnings.toFixed(2)}<br>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
