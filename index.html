<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Smart Learning)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }

    .highlight {
      font-size: 20px;
      font-weight: bold;
      background: #7f1d1d;
      padding: 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .footer {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro (Smart Learning)</h2>

<div class="card">
📍 NR7 0WZ (Norwich)<br>
☀️ PV: 6.5 kWp | 🔋 Battery: 10.64 kWh
</div>

<button onclick="runAI()">Plan Next 3 Days</button>
<button onclick="toggleHistory()">📊 PV History</button>

<br>

<input type="date" id="pvDate">
<input type="number" id="pvInput" placeholder="Enter PV kWh">
<button onclick="savePV()">Save PV</button>

<p id="loading"></p>

<div id="output"></div>

<div id="historyPanel" class="card" style="display:none;">
  <b>📊 PV History</b><br><br>
  <canvas id="pvChart"></canvas><br>
  <div id="historyContent"></div>
</div>

<div class="footer">
  🔥 85–100% Excellent<br>
  👍 65–85% Good<br>
  ⚖️ 45–65% Moderate<br>
  ⚠️ &lt;45% Low solar
</div>

<script>

// ---------------- SETTINGS ----------------
function defaultSettings() {
  return {
    pvsize: 6.5,
    battery: 10.64,
    inverter: 5,
    direction: 170,

    pvHistorySeed: [
      { date: "2026-04-05", kwh: 26 },
      { date: "2026-04-04", kwh: 26.7 },
      { date: "2026-04-03", kwh: 9.3 },
      { date: "2026-04-02", kwh: 23.7 },
      { date: "2026-04-01", kwh: 17.3 }
    ]
  };
}

function getSettings() {
  return JSON.parse(localStorage.getItem("settings")) || defaultSettings();
}

// ---------------- HISTORY ----------------
function getAllPVHistory(settings) {
  let stored = JSON.parse(localStorage.getItem("pvHistory") || "[]");
  return [...settings.pvHistorySeed, ...stored];
}

// ---------------- SAVE PV ----------------
function savePV() {

  let pv = parseFloat(document.getElementById("pvInput").value);
  let date = document.getElementById("pvDate").value;

  if (!date || isNaN(pv)) return alert("Enter valid data");

  let history = JSON.parse(localStorage.getItem("pvHistory") || "[]");

  history = history.filter(d => d.date !== date);

  history.push({
    date,
    kwh: pv,
    predicted: window.lastPredictedPV || null
  });

  localStorage.setItem("pvHistory", JSON.stringify(history));

  alert("Saved + model updated");
}

// ---------------- PHYSICS PV MODEL ----------------
function calculateDailyPV(dayStart, radiation, temp, settings) {

  let total = 0;

  let orientation = Math.cos((settings.direction - 180) * Math.PI / 180);
  orientation = Math.max(0.75, orientation);

  for (let h = dayStart; h < dayStart + 24; h++) {

    let rad = radiation[h] / 1000;
    let t = temp[h];

    let tempLoss = 1 - (Math.max(0, t - 25) * 0.004);
    let systemLoss = 0.80;

    total += rad * settings.pvsize * orientation * tempLoss * systemLoss;
  }

  return Math.min(total, settings.inverter * 24);
}

// ---------------- LEARNING ----------------
function getSmartCalibration(settings) {

  let history = getAllPVHistory(settings);
  let factors = [];

  history.forEach(entry => {
    if (entry.kwh > 0) {
      let expected = settings.pvsize * 4;
      let factor = entry.kwh / expected;

      if (factor > 0.3 && factor < 2.5) {
        factors.push(factor);
      }
    }
  });

  if (!factors.length) return 1;

  return factors.reduce((a,b)=>a+b,0)/factors.length;
}

// ---------------- SOC ----------------
function recommendedSOCFromPV(pv, battery) {

  let ratio = pv / battery;

  if (ratio > 2) return "20%";
  if (ratio > 1.5) return "30%";
  if (ratio > 1.0) return "50%";
  if (ratio > 0.7) return "65%";
  if (ratio > 0.4) return "80%";
  return "90%";
}

// ---------------- MAIN ----------------
async function runAI() {

  document.getElementById("loading").innerText = "Loading...";

  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=shortwave_radiation,temperature_2m&forecast_days=3&timezone=auto"
  );

  let data = await res.json();

  let times = data.hourly.time;
  let rad = data.hourly.shortwave_radiation;
  let temp = data.hourly.temperature_2m;

  let s = getSettings();
  let calibration = getSmartCalibration(s);

  let output = "";

  for (let d = 0; d < 3; d++) {

    let dayStart = d * 24;

    let pv = calculateDailyPV(dayStart, rad, temp, s);
    pv = pv * calibration;

    if (d === 0) window.lastPredictedPV = pv.toFixed(1);

    let soc = recommendedSOCFromPV(pv, s.battery);

    let label = d === 0 ? "Today" : d === 1 ? "Tomorrow" : "Day +2";

    let socHTML =
      d === 1
      ? `<span class="highlight">${soc}</span>`
      : soc;

    output += `
      <div class="card">
        <b>${label}</b><br><br>
        ⚡ Predicted PV: ${pv.toFixed(1)} kWh<br><br>
        🔋 Recommended SOC: ${socHTML}
      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText = "";
}

// ---------------- HISTORY UI ----------------
function toggleHistory() {
  let panel = document.getElementById("historyPanel");

  if (panel.style.display === "none") {
    panel.style.display = "block";
    renderHistory();
  } else {
    panel.style.display = "none";
  }
}

let chart;

function renderHistory() {

  let s = getSettings();
  let history = getAllPVHistory(s);

  history.sort((a,b)=>new Date(a.date)-new Date(b.date));

  let labels = history.map(d=>d.date);
  let actual = history.map(d=>d.kwh);
  let predicted = history.map(d=>d.predicted || null);

  let ctx = document.getElementById("pvChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [
        { label: "Actual", data: actual },
        { type: "line", label: "Predicted", data: predicted }
      ]
    }
  });

  let html = "";

  history.slice().reverse().forEach(d => {
    html += `📅 ${d.date} → ${d.kwh} kWh ${(d.predicted ? `(pred ${d.predicted})` : "")}<br>`;
  });

  document.getElementById("historyContent").innerHTML = html;
}

</script>

</body>
</html>
