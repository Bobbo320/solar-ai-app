<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input {
      padding: 8px;
      width: 180px;
      margin-bottom: 10px;
    }
    .hidden { display: none; }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="runAI()">Plan Next 3 Days</button>

<div id="settingsPanel" class="card hidden">
  <h3>Settings</h3>

  <label>Postcode:</label><br>
  <input id="postcode"><br>

  <label>PV Size (kWp):</label><br>
  <input id="pvSize" type="number" step="0.1"><br>

  <label>Inverter Size (kW):</label><br>
  <input id="inverter" type="number" step="0.1"><br>

  <label>Battery Capacity (kWh):</label><br>
  <input id="battery" type="number" step="0.1"><br>

  <label>Daily Load (kWh):</label><br>
  <input id="dailyLoad" type="number"><br>

  <label>Efficiency (%):</label><br>
  <input id="efficiency" type="number"><br>

  <label>SOC Low (%):</label><br>
  <input id="socLow" type="number"><br>

  <label>SOC High (%):</label><br>
  <input id="socHigh" type="number"><br>

  <br>
  <button onclick="saveSettings()">Save Settings</button>
</div>

<p id="loading"></p>
<div id="output"></div>

<script>

// -------------------- SETTINGS --------------------
function getSettings() {
  let s = JSON.parse(localStorage.getItem("settings") || "{}");

  return {
    postcode: s.postcode || "NR7 0WZ",
    pvSize: s.pvSize ?? 6.5,
    inverter: s.inverter ?? 5,
    battery: s.battery ?? 10.64,
    dailyLoad: s.dailyLoad ?? 10,
    efficiency: s.efficiency ?? 85,
    socLow: s.socLow ?? 20,
    socHigh: s.socHigh ?? 95
  };
}

function saveSettings() {
  let settings = {
    postcode: document.getElementById("postcode").value,
    pvSize: parseFloat(document.getElementById("pvSize").value),
    inverter: parseFloat(document.getElementById("inverter").value),
    battery: parseFloat(document.getElementById("battery").value),
    dailyLoad: parseFloat(document.getElementById("dailyLoad").value),
    efficiency: parseFloat(document.getElementById("efficiency").value),
    socLow: parseFloat(document.getElementById("socLow").value),
    socHigh: parseFloat(document.getElementById("socHigh").value)
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  alert("Settings saved");
  toggleSettings();
}

function loadSettingsToUI() {
  let s = getSettings();

  document.getElementById("postcode").value = s.postcode;
  document.getElementById("pvSize").value = s.pvSize;
  document.getElementById("inverter").value = s.inverter;
  document.getElementById("battery").value = s.battery;
  document.getElementById("dailyLoad").value = s.dailyLoad;
  document.getElementById("efficiency").value = s.efficiency;
  document.getElementById("socLow").value = s.socLow;
  document.getElementById("socHigh").value = s.socHigh;
}

function toggleSettings() {
  let panel = document.getElementById("settingsPanel");
  panel.classList.toggle("hidden");
  loadSettingsToUI();
}

// -------------------- WEATHER --------------------
async function getWeather() {
  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto"
  );
  return await res.json();
}

// -------------------- TEMPERATURE --------------------
function temperatureEfficiency(temp) {
  const nominalTemp = 25;
  const coef = -0.004;

  let delta = temp - nominalTemp;
  let factor = 1 + (delta * coef);

  if (factor < 0.8) factor = 0.8;
  if (factor > 1.05) factor = 1.05;

  return factor;
}

// -------------------- SOLAR SCORE --------------------
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;
  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

// -------------------- SUNSHINE HOURS --------------------
function calculateSunshineHours(radiationArray, startIndex) {
  let hours = 0;
  for (let i = startIndex; i < startIndex + 24; i++) {
    if (radiationArray[i] > 120) hours++;
  }
  return hours;
}

// -------------------- CLOUD WEIGHTING --------------------
function weightedCloudAverage(cloudArray, startIndex) {

  let weights = [];
  for (let i = 0; i < 24; i++) {
    let hourWeight = Math.exp(-Math.pow((i - 12) / 6, 2));
    weights.push(hourWeight);
  }

  let weightedSum = 0;
  let weightTotal = 0;

  for (let i = 0; i < 24; i++) {
    weightedSum += cloudArray[startIndex + i] * weights[i];
    weightTotal += weights[i];
  }

  return weightedSum / weightTotal;
}

// -------------------- PV ESTIMATE --------------------
function estimatePV(avgScore, sunshineHours, middayTemp, settings) {

  let tempFactor = temperatureEfficiency(middayTemp);

  let raw = settings.pvSize * sunshineHours * avgScore * (settings.efficiency / 100) * tempFactor;

  let inverterLimit = settings.inverter * sunshineHours;

  return Math.min(raw, inverterLimit);
}

// -------------------- SOC MODEL --------------------
function recommendedSOC(predictedPV, settings) {

  let shortfall = Math.max(0, settings.dailyLoad - predictedPV);
  let required = shortfall * 1.2;

  let soc = (required / settings.battery) * 100;

  // USE SETTINGS BOUNDS
  if (soc < settings.socLow) soc = settings.socLow;
  if (soc > settings.socHigh) soc = settings.socHigh;

  return Math.round(soc);
}

// -------------------- WEATHER DISPLAY --------------------
function weatherSummary(cloud, rad, temp, humidity, precip) {
  return `
    🌤️ Cloud: ${cloud.toFixed(0)}%<br>
    ☀️ Radiation: ${rad.toFixed(0)} W/m²<br>
    🌡️ Temp (midday): ${temp.toFixed(1)}°C<br>
    💧 Humidity: ${humidity.toFixed(0)}%<br>
    🌧️ Precip: ${precip.toFixed(2)} mm
  `;
}

// -------------------- MAIN --------------------
async function runAI() {

  let settings = getSettings();

  document.getElementById("loading").innerText = "Loading...";

  let data = await getWeather();

  let cloud = data.hourly.cloudcover;
  let radiation = data.hourly.shortwave_radiation;
  let temp = data.hourly.temperature_2m;
  let humidity = data.hourly.relativehumidity_2m;
  let precip = data.hourly.precipitation;

  let outputHTML = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;

    let weightedCloud = weightedCloudAverage(cloud, start);

    let dailyRad = 0;
    let scores = [];

    for (let i = start; i < start + 24; i++) {
      dailyRad += radiation[i];
      scores.push(hourlySolarScore(cloud[i], radiation[i]));
    }

    let avgRad = dailyRad / 24;
    let avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;

    let sunshineHours = calculateSunshineHours(radiation, start);

    let middayTemp = temp[start + 12];

    let pv = estimatePV(avgScore, sunshineHours, middayTemp, settings);

    let soc = recommendedSOC(pv, settings);

    let label = d === 0 ? "Today" : d === 1 ? "Tomorrow" : "The day after tomorrow";

    let socStyle = (d === 1)
      ? "style='color:red; font-weight:bold; font-size:20px;'"
      : "";

    outputHTML += `
      <div class="card">
        <h3>${label}</h3>

        ${weatherSummary(
          weightedCloud,
          avgRad,
          middayTemp,
          humidity[start + 12],
          precip[start + 12]
        )}

        <br><b>🌞 Sunshine Hours:</b> ${sunshineHours}
        <br><b>⚡ Estimated PV:</b> ${pv.toFixed(1)} kWh
        <br><span ${socStyle}>🔋 Recommended SOC: ${soc}%</span>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = outputHTML;
  document.getElementById("loading").innerText = "";
}

</script>

</body>
</html>
