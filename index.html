<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input {
      padding: 8px;
      width: 180px;
      margin-bottom: 10px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="runAI()">Plan Next 3 Days</button>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="card hidden">
  <h3>Settings</h3>

  <label>Postcode:</label><br>
  <input id="postcode" type="text"><br>

  <label>PV Array Size (kWp):</label><br>
  <input id="pvSize" type="number" step="0.1"><br>

  <label>Inverter Size (kW):</label><br>
  <input id="inverter" type="number" step="0.1"><br>

  <label>Battery Capacity (kWh):</label><br>
  <input id="battery" type="number" step="0.1"><br>

  <label>Daily Load (kWh):</label><br>
  <input id="dailyLoad" type="number" step="0.1"><br>

  <label>Efficiency (%):</label><br>
  <input id="efficiency" type="number" step="1"><br>

  <br>
  <button onclick="saveSettings()">Save Settings</button>
</div>

<p id="loading"></p>

<div id="output"></div>

<script>

// -------------------- SETTINGS STORAGE --------------------
function getSettings() {
  return JSON.parse(localStorage.getItem("settings")) || {
    postcode: "NR7 0WZ",
    pvSize: 6.5,
    inverter: 5,
    battery: 10.64,
    dailyLoad: 10,
    efficiency: 85
  };
}

function saveSettings() {
  const settings = {
    postcode: document.getElementById("postcode").value,
    pvSize: parseFloat(document.getElementById("pvSize").value),
    inverter: parseFloat(document.getElementById("inverter").value),
    battery: parseFloat(document.getElementById("battery").value),
    dailyLoad: parseFloat(document.getElementById("dailyLoad").value),
    efficiency: parseFloat(document.getElementById("efficiency").value)
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  alert("Settings saved");
  loadSettingsToUI();
}

function loadSettingsToUI() {
  const s = getSettings();

  document.getElementById("postcode").value = s.postcode;
  document.getElementById("pvSize").value = s.pvSize;
  document.getElementById("inverter").value = s.inverter;
  document.getElementById("battery").value = s.battery;
  document.getElementById("dailyLoad").value = s.dailyLoad;
  document.getElementById("efficiency").value = s.efficiency;
}

function toggleSettings() {
  document.getElementById("settingsPanel").classList.toggle("hidden");
}

// -------------------- WEATHER --------------------
async function getWeather() {
  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,windspeed_10m,precipitation&forecast_days=3&timezone=auto"
  );
  return await res.json();
}

// -------------------- TEMP EFFICIENCY --------------------
function temperatureEfficiency(temp) {
  const nominalTemp = 25;
  const coef = -0.004;

  let delta = temp - nominalTemp;
  let efficiencyFactor = 1 + (delta * coef);

  if (efficiencyFactor < 0.8) efficiencyFactor = 0.8;
  if (efficiencyFactor > 1.05) efficiencyFactor = 1.05;

  return efficiencyFactor;
}

// -------------------- SOLAR SCORE --------------------
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;
  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

// -------------------- SUNSHINE HOURS --------------------
function calculateSunshineHours(radiationArray, startIndex) {
  let hours = 0;
  for (let i = startIndex; i < startIndex + 24; i++) {
    if (radiationArray[i] > 120) hours++;
  }
  return hours;
}

// -------------------- PV ESTIMATE --------------------
function estimatePV(avgScore, sunshineHours, temp, settings) {

  let tempFactor = temperatureEfficiency(temp);

  let raw = settings.pvSize * sunshineHours * avgScore * (settings.efficiency / 100) * tempFactor;

  let inverterLimit = settings.inverter * sunshineHours;

  return Math.min(raw, inverterLimit);
}

// -------------------- SOC --------------------
function calculateSOC(predictedPV, settings) {

  let shortfall = Math.max(0, settings.dailyLoad - predictedPV);
  let required = shortfall * 1.2;

  let soc = (required / settings.battery) * 100;

  if (soc < 20) soc = 20;
  if (soc > 95) soc = 95;

  return Math.round(soc);
}

// -------------------- MAIN --------------------
async function runAI() {

  const settings = getSettings();

  document.getElementById("loading").innerText = "Loading...";

  let data = await getWeather();

  let cloud = data.hourly.cloudcover;
  let radiation = data.hourly.shortwave_radiation;
  let temp = data.hourly.temperature_2m;

  let output = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;

    let cloudSlice = cloud.slice(start, start + 24);
    let radSlice = radiation.slice(start, start + 24);

    let avgCloud = cloudSlice.reduce((a,b)=>a+b,0) / 24;
    let avgRad = radSlice.reduce((a,b)=>a+b,0) / 24;

    let scores = radSlice.map((r,i)=>{
      return hourlySolarScore(cloudSlice[i], r);
    });

    let avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;

    let sunshineHours = calculateSunshineHours(radiation, start);

    let middayTemp = temp[start + 12];

    let pv = estimatePV(avgScore, sunshineHours, middayTemp, settings);

    let soc = calculateSOC(pv, settings);

    let label = d === 0 ? "Today" : d === 1 ? "Tomorrow" : "The day after tomorrow";

    let socStyle = (d === 1) ? "color:red;font-weight:bold;font-size:20px;" : "";

    output += `
      <div class="card">
        <h3>${label}</h3>
        ☀️ PV: ${pv.toFixed(2)} kWh<br>
        🌤️ Cloud: ${avgCloud.toFixed(0)}%<br>
        🌞 Sunshine Hours: ${sunshineHours}<br>
        🌡️ Midday Temp: ${middayTemp.toFixed(1)}°C<br>
        <br>
        <span style="${socStyle}">🔋 Recommended SOC: ${soc}%</span>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText = "";
}

// Load settings on startup
loadSettingsToUI();

</script>

</body>
</html>
