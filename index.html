<!DOCTYPE html>
<html>
<head>
  <title>Solar AI App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 10px;
      background: #000;
      color: #fff;
    }

    button {
      padding: 12px;
      width: 100%;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      margin-bottom: 10px;
    }

    .card {
      background: #111;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid #333;
    }

    .soc-box {
      margin-top: 20px;
      padding: 25px;
      background: #220000;
      border-radius: 10px;
      text-align: center;
      border: 2px solid #550000;
    }

    .soc-value {
      font-size: 40px;
      color: #ff4d4d;
      font-weight: bold;
    }

    .error {
      color: red;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>Solar AI App</h2>

<button onclick="loadWeather()">Load / Refresh Weather</button>

<div id="status"></div>
<div id="weather"></div>
<div id="pv"></div>
<div id="soc"></div>

<canvas id="chart"></canvas>

<script>

let weatherData = null;

/* LOAD WEATHER */
async function loadWeather(){

  status.innerHTML = "Loading weather...";

  try {
    let lat = 52.627;
    let lon = 1.331;

    let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,cloudcover,precipitation&forecast_days=3`;

    let res = await fetch(url);
    let data = await res.json();

    console.log("API RESPONSE:", data);

    if(!data.hourly){
      throw new Error("No hourly data returned");
    }

    weatherData = data.hourly;

    status.innerHTML = "Weather loaded ✅";

    renderAll();

  } catch(e){
    console.error(e);
    status.innerHTML = `<div class="error">Weather failed to load ❌</div>`;

    // fallback so UI still works
    renderFallback();
  }
}

/* GET DAILY */
function getDailyWeather(dayIndex){

  let start = dayIndex * 24;

  let clouds = [];
  let radiation = [];
  let precip = [];

  for(let i=0;i<24;i++){
    let idx = start + i;

    clouds.push(weatherData?.cloudcover?.[idx] ?? 50);
    radiation.push(weatherData?.shortwave_radiation?.[idx] ?? 100);
    precip.push(weatherData?.precipitation?.[idx] ?? 0);
  }

  let avgCloud = clouds.reduce((a,b)=>a+b,0)/24;
  let avgRad = radiation.reduce((a,b)=>a+b,0)/24;
  let totalPrecip = precip.reduce((a,b)=>a+b,0);
  let sunshine = radiation.filter(r => r > 100).length;

  return {
    cloud: avgCloud,
    radiation: avgRad,
    precipitation: totalPrecip,
    sunshine: sunshine
  };
}

/* PV MODEL */
function predictPV(dayIndex){

  let pvSize = 6.5;
  let inverter = 5;

  let w = getDailyWeather(dayIndex);

  let cloudFactor = 0.4 + 0.6 * (1 - w.cloud / 100);
  let rainPenalty = Math.max(0.7, 1 - (w.precipitation * 0.05));
  let sunshineFactor = Math.min(1.2, 0.7 + (w.sunshine / 10));

  let base = w.radiation * 0.08;

  let pv = pvSize * base * cloudFactor * rainPenalty * sunshineFactor;

  if(isNaN(pv)) pv = 0;

  return Math.min(pv, inverter * 6);
}

/* SOC */
function calculateSOC(pvTomorrow){

  let battery = 10.64;

  if(!pvTomorrow || isNaN(pvTomorrow)) return 50;

  let ratio = pvTomorrow / battery;

  if(ratio > 3) return 20;
  if(ratio > 1.5) return 35;
  return 60;
}

/* RENDER */
function renderAll(){

  if(!weatherData){
    status.innerHTML = "No weather data";
    return;
  }

  let pvToday = predictPV(0);
  let pvTomorrow = predictPV(1);
  let pvDay3 = predictPV(2);

  /* WEATHER */
  let wHtml = "<div class='card'><b>3 Day Weather</b>";

  for(let d=0; d<3; d++){
    let w = getDailyWeather(d);

    wHtml += `
      <div>
        <b>${d===0?"Today":d===1?"Tomorrow":"Day 3"}</b><br>
        ☁️ ${w.cloud.toFixed(0)}% |
        ☀️ ${w.radiation.toFixed(0)} W/m² |
        🌞 ${w.sunshine} hrs |
        🌧️ ${w.precipitation.toFixed(2)} mm
      </div><br>
    `;
  }

  wHtml += "</div>";
  weather.innerHTML = wHtml;

  /* PV */
  pv.innerHTML = `
    <div class="card">
      Today: <b>${pvToday.toFixed(2)} kWh</b><br>
      Tomorrow: <b>${pvTomorrow.toFixed(2)} kWh</b><br>
      Day 3: <b>${pvDay3.toFixed(2)} kWh</b>
    </div>
  `;

  /* SOC */
  let soc = calculateSOC(pvTomorrow);

  soc.innerHTML = `
    <div class="soc-box">
      <div>🔥 SOC Tomorrow</div>
      <div class="soc-value">${soc}%</div>
    </div>
  `;

  renderChart([pvToday, pvTomorrow, pvDay3]);
}

/* FALLBACK */
function renderFallback(){

  weather.innerHTML = "<div class='card'>Fallback weather used</div>";

  let pvToday = 20;
  let pvTomorrow = 22;
  let pvDay3 = 18;

  pv.innerHTML = `
    <div class='card'>
      Today: ${pvToday} kWh<br>
      Tomorrow: ${pvTomorrow} kWh<br>
      Day 3: ${pvDay3} kWh
    </div>
  `;

  let soc = calculateSOC(pvTomorrow);

  soc.innerHTML = `
    <div class="soc-box">
      🔥 SOC Tomorrow<br>
      <div class="soc-value">${soc}%</div>
    </div>
  `;
}

/* CHART */
let chartInstance = null;

function renderChart(values){

  let ctx = document.getElementById('chart').getContext('2d');

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Today','Tomorrow','Day 3'],
      datasets: [{
        label: 'PV kWh',
        data: values
      }]
    }
  });
}

/* START */
window.onload = loadWeather;

</script>

</body>
</html>
