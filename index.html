<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    .footer {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<div class="card">
📍 NR7 0WZ (Norwich, UK)<br>
☀️ South-facing array (unshaded)
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<div id="output"></div>

<div class="footer">
  <b>📊 Solar Score Meaning:</b><br><br>
  🔥 85–100% → Excellent<br>
  👍 65–85% → Good<br>
  ⚖️ 45–65% → Moderate<br>
  ⚠️ &lt;45% → Low solar<br>
</div>

<script>
function soc(score) {
  if (score > 0.85) return "65%";
  if (score > 0.65) return "75%";
  if (score > 0.45) return "85%";
  return "95%";
}

function explain(score) {
  if (score > 0.85) return "Excellent solar conditions. Strong export likely.";
  if (score > 0.65) return "Good solar with some cloud. Battery should charge well.";
  if (score > 0.45) return "Moderate solar. Partial battery charge expected.";
  return "Low solar. Prioritise higher SOC to avoid import.";
}

function strategy(scores) {
  let avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  if (avg > 0.8) return "☀️ Strong solar period → Lower SOC to maximise export";
  if (avg > 0.6) return "⚖️ Mixed conditions → Balanced SOC strategy";
  return "⚠️ Weak solar → Higher SOC to avoid grid import";
}

function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;
  return Math.min(1, Math.max(0, (cloudFactor * 0.6) + (radiationFactor * 0.4)));
}

function sunElevation(date, lat, lon) {
  const rad = Math.PI / 180;

  let day = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  let decl = 23.45 * Math.sin(rad * (360 * (284 + day) / 365));

  let hour = date.getHours();
  let solarTime = hour + (lon / 15);
  let hourAngle = 15 * (solarTime - 12);

  let elevation = Math.asin(
    Math.sin(lat * rad) * Math.sin(decl * rad) +
    Math.cos(lat * rad) * Math.cos(decl * rad) * Math.cos(hourAngle * rad)
  ) / rad;

  return Math.max(0, elevation);
}

function weatherSummary(avgCloud, avgRad) {
  if (avgCloud < 20 && avgRad > 600)
    return "☀️ Clear skies. Excellent solar generation.";
  if (avgCloud < 40 && avgRad > 400)
    return "🌤️ Mostly sunny. Good solar expected.";
  if (avgCloud < 70)
    return "⛅ Mixed cloud. Moderate generation.";
  return "☁️ Cloudy. Low solar expected.";
}

async function runAI() {

  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,shortwave_radiation,temperature_2m&forecast_days=3&timezone=auto"
  );

  let data = await res.json();

  let output = "";
  let dayScores = [];

  for (let d = 0; d < 3; d++) {

    let scores = [];
    let clouds = [];
    let rads = [];

    for (let h = d * 24; h < d * 24 + 24; h++) {

      let date = new Date(data.hourly.time[h]);
      let hour = date.getHours();

      if (hour >= 10 && hour <= 15) {

        let elevation = sunElevation(date, 52.627, 1.331);
        let sunFactor = Math.sin(elevation * Math.PI / 180);

        let base = hourlySolarScore(
          data.hourly.cloudcover[h],
          data.hourly.shortwave_radiation[h]
        );

        scores.push(base * sunFactor);
        clouds.push(data.hourly.cloudcover[h]);
        rads.push(data.hourly.shortwave_radiation[h]);
      }
    }

    let avg = scores.reduce((a,b)=>a+b,0) / scores.length || 0;
    dayScores.push(avg);

    let avgCloud = clouds.reduce((a,b)=>a+b,0) / clouds.length || 0;
    let avgRad = rads.reduce((a,b)=>a+b,0) / rads.length || 0;

    output += `
      <div class="card">
        <b>Day ${d===0?"Today":d===1?"Tomorrow":"Day +2"}</b><br><br>

        🌤️ ${weatherSummary(avgCloud, avgRad)}<br><br>

        ⚡ Solar Score: ${(avg*100).toFixed(0)}%<br><br>

        🔋 Recommended SOC: ${soc(avg)}<br><br>

        🧠 ${explain(avg)}
      </div>
    `;
  }

  output += `
    <div class="card">
      <b>📊 3-Day Strategy</b><br><br>
      ${strategy(dayScores)}
    </div>
  `;

  document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
