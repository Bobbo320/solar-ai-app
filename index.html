<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Full Weather + Learning)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }

    .highlight {
      font-size: 22px;
      font-weight: bold;
      background: #7f1d1d;
      padding: 10px;
      border-radius: 8px;
      display: inline-block;
    }

    input {
      padding: 6px;
      margin: 4px;
      width: 90%;
    }

  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<div class="card" id="systemInfo"></div>

<button onclick="runAI()">Plan Next 3 Days</button>
<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="toggleHistory()">📊 PV History</button>

<br><br>

<input type="date" id="pvDate">
<input type="number" id="pvInput" placeholder="Enter PV kWh">
<button onclick="savePV()">Save PV</button>

<p id="loading"></p>

<div id="output"></div>

<!-- SETTINGS -->
<div id="settingsPanel" class="card" style="display:none;">
  <b>⚙️ Settings</b><br><br>

  Postcode:<br>
  <input id="set_postcode"><br>

  PV Size (kWp):<br>
  <input id="set_pvsize" type="number"><br>

  Battery (kWh):<br>
  <input id="set_battery" type="number"><br>

  Inverter (kW):<br>
  <input id="set_inverter" type="number"><br>

  Direction (°):<br>
  <input id="set_direction" type="number"><br>

  <button onclick="saveSettings()">Save</button>
</div>

<!-- HISTORY -->
<div id="historyPanel" class="card" style="display:none;">
  <b>📊 PV History</b><br><br>
  <canvas id="pvChart"></canvas>
  <div id="historyContent"></div>
</div>

<script>

// ---------------- SETTINGS ----------------
function defaultSettings() {
  return {
    postcode: "NR7 0WZ",
    pvsize: 6.5,
    battery: 10.64,
    inverter: 5,
    direction: 170
  };
}

function getSettings() {
  return JSON.parse(localStorage.getItem("settings")) || defaultSettings();
}

// ---------------- UI ----------------
function updateSystemInfo() {
  let s = getSettings();
  document.getElementById("systemInfo").innerHTML = `
    📍 ${s.postcode}<br>
    ☀️ PV: ${s.pvsize} kWp<br>
    🔋 Battery: ${s.battery} kWh<br>
    ⚡ Inverter: ${s.inverter} kW<br>
    🧭 Direction: ${s.direction}°
  `;
}

updateSystemInfo();

// ---------------- SETTINGS UI ----------------
function toggleSettings() {
  let p = document.getElementById("settingsPanel");
  if (p.style.display === "none") {
    p.style.display = "block";
    let s = getSettings();

    set_postcode.value = s.postcode;
    set_pvsize.value = s.pvsize;
    set_battery.value = s.battery;
    set_inverter.value = s.inverter;
    set_direction.value = s.direction;
  } else {
    p.style.display = "none";
  }
}

function saveSettings() {
  let settings = {
    postcode: set_postcode.value,
    pvsize: parseFloat(set_pvsize.value),
    battery: parseFloat(set_battery.value),
    inverter: parseFloat(set_inverter.value),
    direction: parseFloat(set_direction.value)
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  updateSystemInfo();
  alert("Saved");
}

// ---------------- PV HISTORY ----------------
function getHistory() {
  return JSON.parse(localStorage.getItem("pvHistory") || "[]");
}

function savePV() {

  let pv = parseFloat(pvInput.value);
  let date = pvDate.value;

  if (!date || isNaN(pv)) return alert("Invalid input");

  let history = getHistory();

  history = history.filter(d => d.date !== date);

  history.push({
    date,
    kwh: pv,
    predicted: window.lastPredictedPV || null
  });

  localStorage.setItem("pvHistory", JSON.stringify(history));

  alert("Saved");
}

// ---------------- PV MODEL ----------------
function calculatePV(radiation, temp, settings) {

  let total = 0;

  let orientation = Math.cos((settings.direction - 180) * Math.PI / 180);
  orientation = Math.max(0.75, orientation);

  for (let i = 0; i < radiation.length; i++) {

    let rad = radiation[i] / 1000;

    let tempLoss = 1 - (Math.max(0, temp[i] - 25) * 0.004);

    total += rad * settings.pvsize * orientation * tempLoss * 0.80;
  }

  return total;
}

// ---------------- CALIBRATION ----------------
function getCalibration(settings) {
  let hist = getHistory();

  if (hist.length === 0) return 1;

  let avg = hist.reduce((a,b)=>a+b.kwh,0)/hist.length;
  let expected = settings.pvsize * 4;

  return avg / expected;
}

// ---------------- SOC ----------------
function getSOC(pv, battery) {
  let r = pv / battery;

  if (r > 2) return "20%";
  if (r > 1.5) return "30%";
  if (r > 1) return "50%";
  if (r > 0.7) return "65%";
  if (r > 0.4) return "80%";
  return "90%";
}

// ---------------- MAIN ----------------
async function runAI() {

  loading.innerText = "Loading...";

  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=shortwave_radiation,temperature_2m,cloudcover,precipitation&forecast_days=3&timezone=auto"
  );

  let data = await res.json();

  let times = data.hourly.time;
  let rad = data.hourly.shortwave_radiation;
  let temp = data.hourly.temperature_2m;
  let cloud = data.hourly.cloudcover;
  let precip = data.hourly.precipitation;

  let s = getSettings();
  let calibration = getCalibration(s);

  let output = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;

    let radDay = [];
    let tempDay = [];
    let cloudDay = [];
    let precipDay = [];

    let sunshineHours = 0;

    for (let h = start; h < start + 24; h++) {

      radDay.push(rad[h]);
      tempDay.push(temp[h]);
      cloudDay.push(cloud[h]);
      precipDay.push(precip[h]);

      if (rad[h] > 120) sunshineHours++;
    }

    let pv = calculatePV(radDay, tempDay, s) * calibration;

    if (d === 0) window.lastPredictedPV = pv;

    let avgCloud = cloudDay.reduce((a,b)=>a+b,0)/cloudDay.length;
    let avgTemp = tempDay.reduce((a,b)=>a+b,0)/tempDay.length;
    let totalPrecip = precipDay.reduce((a,b)=>a+b,0);

    let soc = getSOC(pv, s.battery);

    let label = d === 0 ? "Today" : d === 1 ? "Tomorrow" : "Day +2";

    let socDisplay =
      d === 1
      ? `<div class="highlight">${soc}</div>`
      : soc;

    output += `
      <div class="card">
        <b>${label}</b><br><br>

        🌤️ Cloud: ${avgCloud.toFixed(0)}%<br>
        🌡️ Temp: ${avgTemp.toFixed(1)}°C<br>
        🌧️ Rain: ${totalPrecip.toFixed(1)} mm<br>
        ☀️ Sunshine: ${sunshineHours} hrs<br><br>

        ⚡ PV: ${pv.toFixed(1)} kWh<br><br>

        🔋 SOC: ${socDisplay}
      </div>
    `;
  }

  outputDiv.innerHTML = output;
  loading.innerText = "";
}

// ---------------- HISTORY UI ----------------
function toggleHistory() {
  let panel = historyPanel;
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
