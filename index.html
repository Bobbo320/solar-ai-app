<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input, select {
      padding: 8px;
      width: 180px;
      margin-bottom: 10px;
    }
    .hidden { display: none; }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="runAI()">Plan Next 3 Days</button>

<div id="settingsPanel" class="card hidden">
  <h3>Settings</h3>

  <label>Place:</label><br>
  <input id="postcode"><br>

  <label>PV Size (kWp):</label><br>
  <input id="pvSize" type="number"><br>

  <label>Inverter Size (kW):</label><br>
  <input id="inverter" type="number"><br>

  <label>Battery Capacity (kWh):</label><br>
  <input id="battery" type="number"><br>

  <label>PV Orientation:</label><br>
  <select id="orientation">
    <option value="south">South (100% output)</option>
    <option value="se_sw">SE / SW (92% output)</option>
    <option value="east_west">East / West (85% output)</option>
    <option value="north">North (65% output)</option>
  </select><br>

  <label>Shading:</label><br>
  <select id="shading">
    <option value="100">None (100% output)</option>
    <option value="90">Very light (90%)</option>
    <option value="80">Light (80%)</option>
    <option value="70">Moderate (70%)</option>
    <option value="50">Heavy (50%)</option>
  </select><br>

  <label>Daily Load (kWh):</label><br>
  <input id="dailyLoad" type="number"><br>

  <label>Efficiency (%):</label><br>
  <input id="efficiency" type="number"><br>

  <label>SOC Low (%):</label><br>
  <input id="socLow" type="number"><br>

  <label>SOC High (%):</label><br>
  <input id="socHigh" type="number"><br>

  <button onclick="saveSettings()">Save</button>
</div>

<p id="loading"></p>
<div id="output"></div>

<script>

let preloadedWeather = null;

// -------------------- SETTINGS --------------------
function getSettings() {
  let s = JSON.parse(localStorage.getItem("settings") || "{}");

  return {
    postcode: s.postcode || "Norwich",
    pvSize: s.pvSize ?? 6.5,
    inverter: s.inverter ?? 5,
    battery: s.battery ?? 10.64,
    orientation: s.orientation || "south",
    shading: s.shading ?? 100,
    dailyLoad: s.dailyLoad ?? 10,
    efficiency: s.efficiency ?? 85,
    socLow: s.socLow ?? 20,
    socHigh: s.socHigh ?? 95
  };
}

function saveSettings() {
  let settings = {
    postcode: document.getElementById("postcode").value,
    pvSize: parseFloat(document.getElementById("pvSize").value),
    inverter: parseFloat(document.getElementById("inverter").value),
    battery: parseFloat(document.getElementById("battery").value),
    orientation: document.getElementById("orientation").value,
    shading: parseFloat(document.getElementById("shading").value),
    dailyLoad: parseFloat(document.getElementById("dailyLoad").value),
    efficiency: parseFloat(document.getElementById("efficiency").value),
    socLow: parseFloat(document.getElementById("socLow").value),
    socHigh: parseFloat(document.getElementById("socHigh").value)
  };

  localStorage.setItem("settings", JSON.stringify(settings));

  preloadWeather();

  alert("Saved");
  toggleSettings();
}

function loadSettingsToUI() {
  let s = getSettings();

  document.getElementById("postcode").value = s.postcode;
  document.getElementById("pvSize").value = s.pvSize;
  document.getElementById("inverter").value = s.inverter;
  document.getElementById("battery").value = s.battery;
  document.getElementById("orientation").value = s.orientation;
  document.getElementById("shading").value = s.shading;
  document.getElementById("dailyLoad").value = s.dailyLoad;
  document.getElementById("efficiency").value = s.efficiency;
  document.getElementById("socLow").value = s.socLow;
  document.getElementById("socHigh").value = s.socHigh;
}

function toggleSettings() {
  document.getElementById("settingsPanel").classList.toggle("hidden");
  loadSettingsToUI();
}

// -------------------- CACHE --------------------
function getCache(key) {
  return JSON.parse(localStorage.getItem(key) || "null");
}

function setCache(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

// -------------------- PRELOAD --------------------
async function preloadWeather() {
  try {
    let s = getSettings();
    preloadedWeather = await getWeather(s.postcode);
    console.log("Weather preloaded");
  } catch (e) {
    console.log("Preload failed:", e);
    preloadedWeather = null;
  }
}

// -------------------- GEOCODING --------------------
async function getCoordinates(postcode) {

  try {
    let cacheKey = "coords_" + postcode;
    let cached = getCache(cacheKey);

    if (cached) return cached;

    let res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(postcode)}&count=1`);

    if (!res.ok) throw new Error("Geocoding failed");

    let data = await res.json();

    if (!data.results || data.results.length === 0) {
      throw new Error("Location not found");
    }

    let coords = {
      lat: data.results[0].latitude,
      lon: data.results[0].longitude
    };

    setCache(cacheKey, coords);

    return coords;

  } catch (e) {
    console.error("Coord error:", e);

    return {
      lat: 52.6309,
      lon: 1.2974
    };
  }
}

// -------------------- WEATHER --------------------
async function getWeather(postcode) {

  try {
    let cacheKey = "weather_" + postcode;
    let cached = getCache(cacheKey);

    let now = Date.now();
    let cacheDuration = 30 * 60 * 1000;

    if (cached && (now - cached.timestamp < cacheDuration)) {
      return cached.data;
    }

    let c = await getCoordinates(postcode);

    let res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto`
    );

    if (!res.ok) throw new Error("Weather fetch failed");

    let data = await res.json();

    setCache(cacheKey, {
      timestamp: now,
      data: data
    });

    return data;

  } catch (e) {
    console.error("Weather error:", e);

    document.getElementById("loading").innerText = "Weather fallback mode";

    return {
      hourly: {
        cloudcover: new Array(72).fill(50),
        shortwave_radiation: new Array(72).fill(200),
        temperature_2m: new Array(72).fill(15),
        relativehumidity_2m: new Array(72).fill(70),
        precipitation: new Array(72).fill(0)
      }
    };
  }
}

// -------------------- MAIN --------------------
async function runAI(){

  let s = getSettings();
  document.getElementById("loading").innerText = "Loading...";

  let data;

  try {
    data = preloadedWeather || await getWeather(s.postcode);
  } catch (e) {
    console.error("runAI fetch failed:", e);

    document.getElementById("loading").innerText = "Using fallback data";

    data = {
      hourly: {
        cloudcover: new Array(72).fill(50),
        shortwave_radiation: new Array(72).fill(200),
        temperature_2m: new Array(72).fill(15),
        relativehumidity_2m: new Array(72).fill(70),
        precipitation: new Array(72).fill(0)
      }
    };
  }

  if (!data || !data.hourly) {
    document.getElementById("loading").innerText = "Invalid data fallback";
    return;
  }

  let cloud=data.hourly.cloudcover;
  let rad=data.hourly.shortwave_radiation;
  let temp=data.hourly.temperature_2m;
  let hum=data.hourly.relativehumidity_2m;
  let precip=data.hourly.precipitation;

  let html="";

  for(let d=0;d<3;d++){

    let start=d*24;

    let avgRad=rad.slice(start,start+24).reduce((a,b)=>a+b)/24;
    let midTemp=temp[start+12];

    let label=d===0?"Today":d===1?"Tomorrow":"The day after tomorrow";

    html+=`
      <div class="card">
        <h3>${label}</h3>
        🌤️ Cloud: ${cloud[start+12]}%<br>
        ☀️ Radiation: ${avgRad.toFixed(0)} W/m²<br>
        🌡️ Temp (midday): ${midTemp.toFixed(1)}°C<br>
        💧 Humidity: ${hum[start+12]}%<br>
        🌧️ Precip: ${precip[start+12]} mm
      </div>
    `;
  }

  document.getElementById("output").innerHTML=html;
  document.getElementById("loading").innerText="";
}

// -------------------- INIT --------------------
window.onload = () => {
  preloadWeather();
};

</script>

</body>
</html>
