<!DOCTYPE html>
<html>
<head>
  <title>Solar AI App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 10px;
      background: #000;
      color: #fff;
    }

    h2 { text-align: center; }

    .card {
      background: #111;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .soc-box {
      margin-top: 20px;
      padding: 25px;
      background: #220000;
      border-radius: 10px;
      text-align: center;
      border: 2px solid #550000;
    }

    .soc-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .soc-value {
      font-size: 42px;
      font-weight: bold;
      color: #ff4d4d;
    }

    .forecast-day {
      margin-top: 6px;
    }

    button {
      padding: 12px;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      width: 100%;
    }

    canvas {
      margin-top: 15px;
      background: #111;
      border-radius: 8px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Solar AI App</h2>

<button onclick="loadWeather()">Refresh Weather</button>

<div id="weather"></div>
<div id="pv"></div>
<div id="soc"></div>

<canvas id="chart"></canvas>

<script>

let weatherData = null;

/* LOAD WEATHER */
async function loadWeather(){

  try {
    let lat = 52.627;
    let lon = 1.331;

    let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,cloudcover,precipitation&forecast_days=3`;

    let res = await fetch(url);
    let data = await res.json();

    weatherData = data.hourly;

    renderAll();

  } catch(e){
    alert("Weather failed to load");
    console.error(e);
  }
}

/* DAILY WEATHER */
function getDailyWeather(dayIndex){

  let start = dayIndex * 24;

  let clouds = [];
  let radiation = [];
  let precip = [];

  for(let i=0;i<24;i++){
    let idx = start + i;

    clouds.push(weatherData.cloudcover[idx] || 0);
    radiation.push(weatherData.shortwave_radiation[idx] || 0);
    precip.push(weatherData.precipitation[idx] || 0);
  }

  let avgCloud = clouds.reduce((a,b)=>a+b,0)/24;
  let avgRad = radiation.reduce((a,b)=>a+b,0)/24;
  let totalPrecip = precip.reduce((a,b)=>a+b,0);
  let sunshine = radiation.filter(r => r > 100).length;

  return {
    cloud: avgCloud,
    radiation: avgRad,
    precipitation: totalPrecip,
    sunshine: sunshine
  };
}

/* PV MODEL */
function predictPV(dayIndex){

  if(!weatherData) return 0;

  let pvSize = 6.5; // fallback
  let inverter = 5;

  let w = getDailyWeather(dayIndex);

  let cloudFactor = 0.4 + 0.6 * (1 - w.cloud / 100);
  let rainPenalty = Math.max(0.7, 1 - (w.precipitation * 0.05));
  let sunshineFactor = Math.min(1.2, 0.7 + (w.sunshine / 10));

  let base = w.radiation * 0.08;

  let pv = pvSize * base * cloudFactor * rainPenalty * sunshineFactor;

  return Math.min(pv, inverter * 6);
}

/* SOC MODEL */
function calculateSOC(pvTomorrow){

  let battery = 10.64;

  let ratio = pvTomorrow / battery;

  if(ratio > 3) return 20;
  if(ratio > 1.5) return 35;
  return 60;
}

/* RENDER */
function renderAll(){

  if(!weatherData) return;

  let pvToday = predictPV(0);
  let pvTomorrow = predictPV(1);
  let pvDay3 = predictPV(2);

  /* WEATHER DISPLAY */
  let wHtml = "<div class='card'><b>3 Day Weather</b>";

  for(let d=0; d<3; d++){
    let w = getDailyWeather(d);

    wHtml += `
      <div class="forecast-day">
        <b>${d===0?"Today":d===1?"Tomorrow":"Day 3"}</b><br>
        ☁️ ${w.cloud.toFixed(0)}% | ☀️ ${w.radiation.toFixed(0)} W/m² | 🌞 ${w.sunshine} hrs | 🌧️ ${w.precipitation.toFixed(2)} mm
      </div>
    `;
  }

  wHtml += "</div>";
  weather.innerHTML = wHtml;

  /* PV DISPLAY */
  pv.innerHTML = `
    <div class="card">
      Today: <b>${pvToday.toFixed(2)} kWh</b><br>
      Tomorrow: <b>${pvTomorrow.toFixed(2)} kWh</b><br>
      Day 3: <b>${pvDay3.toFixed(2)} kWh</b>
    </div>
  `;

  /* SOC DISPLAY */
  let soc = calculateSOC(pvTomorrow);

  soc.innerHTML = `
    <div class="soc-box">
      <div class="soc-title">🔥 SOC (Tomorrow)</div>
      <div class="soc-value">${soc}%</div>
    </div>
  `;

  /* GRAPH */
  renderChart([pvToday, pvTomorrow, pvDay3]);
}

/* CHART */
let chartInstance = null;

function renderChart(values){

  let ctx = document.getElementById('chart').getContext('2d');

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Today','Tomorrow','Day 3'],
      datasets: [{
        label: 'PV kWh',
        data: values
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: '#fff' } }
      },
      scales: {
        x: { ticks: { color: '#fff' } },
        y: { ticks: { color: '#fff' } }
      }
    }
  });
}

/* AUTO LOAD */
window.onload = loadWeather;

</script>

</body>
</html>
