<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button { padding: 10px; margin: 6px; }

    input {
      padding: 6px;
      margin: 4px;
      width: 90%;
    }

    .card {
      margin-top: 12px;
      padding: 12px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }

    .tab { display: none; }
    .active { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #555;
      padding: 6px;
      font-size: 13px;
    }

    .tomorrow-soc {
      font-size: 34px;
      font-weight: bold;
      color: red;
      background: #220000;
      padding: 14px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI</h2>

<button onclick="showTab('main')">Main</button>
<button onclick="showTab('settings')">Settings</button>
<button onclick="showTab('history')">History</button>

<!-- MAIN -->
<div id="main" class="tab active">

  <button onclick="runAI()">Plan Next 3 Days</button>

  <p id="loading"></p>

  <div class="card">
    <h3>Debug</h3>
    <div id="debug"></div>
  </div>

  <div class="card">
    <h3>Weather</h3>
    <div id="weatherOutput"></div>
  </div>

  <div id="output"></div>

</div>

<!-- SETTINGS -->
<div id="settings" class="tab">

  <div class="card">
    <h3>System Settings</h3>

    <input id="postcode" placeholder="Postcode"><br>
    <input id="inverter" placeholder="Inverter kW"><br>
    <input id="battery" placeholder="Battery kWh"><br>
    <input id="pvSize" placeholder="PV kWp"><br>
    <input id="direction" placeholder="Panel Direction (deg)"><br>
    <input id="elevation" placeholder="Elevation (m)"><br>

    <button onclick="saveSettings()">Save</button>
  </div>

  <div class="card">
    <h3>Manual PV Input</h3>

    <input type="date" id="pvDate"><br>
    <input type="number" id="pvKwh" placeholder="kWh"><br>

    <button onclick="addPV()">Add PV</button>
  </div>

</div>

<!-- HISTORY -->
<div id="history" class="tab">

  <div class="card">
    <h3>PV History</h3>
    <div id="historyTable"></div>
  </div>

  <div class="card">
    <h3>Calibration</h3>
    <div id="calibrationTable"></div>
  </div>

</div>

<script>

// ---------------- SETTINGS ----------------
function saveSettings(){
  let s = {
    postcode: document.getElementById("postcode").value,
    inverter: document.getElementById("inverter").value,
    battery: document.getElementById("battery").value,
    pvSize: document.getElementById("pvSize").value,
    direction: document.getElementById("direction").value,
    elevation: document.getElementById("elevation").value
  };
  localStorage.setItem("settings", JSON.stringify(s));
  alert("Saved");
}

function loadSettings(){
  let s = JSON.parse(localStorage.getItem("settings"));

  if(!s){
    s = {
      postcode:"NR7 0WZ",
      inverter:"5",
      battery:"10.64",
      pvSize:"6.5",
      direction:"170",
      elevation:"30"
    };
    localStorage.setItem("settings", JSON.stringify(s));
  }

  document.getElementById("postcode").value = s.postcode;
  document.getElementById("inverter").value = s.inverter;
  document.getElementById("battery").value = s.battery;
  document.getElementById("pvSize").value = s.pvSize;
  document.getElementById("direction").value = s.direction;
  document.getElementById("elevation").value = s.elevation;
}

// ---------------- HISTORY ----------------
function getHistory(){
  return JSON.parse(localStorage.getItem("pvHistory")) || [];
}

function saveHistory(h){
  localStorage.setItem("pvHistory", JSON.stringify(h));
}

function addPV(){
  let date = document.getElementById("pvDate").value;
  let kwh = parseFloat(document.getElementById("pvKwh").value);

  if(!date || isNaN(kwh)){
    alert("Invalid input");
    return;
  }

  let h = getHistory();
  h.push({date, kwh});
  saveHistory(h);

  alert("Saved");
  renderHistory();
  updateCalibration();
}

// ---------------- CALIBRATION ----------------
function updateCalibration(){

  let history = getHistory();
  let pvSize = parseFloat(JSON.parse(localStorage.getItem("settings")).pvSize);

  let monthly = {};

  history.forEach(e=>{
    let m = new Date(e.date).getMonth();
    if(!monthly[m]) monthly[m]=[];
    monthly[m].push(e.kwh);
  });

  let calibration = {};

  Object.keys(monthly).forEach(m=>{
    let arr = monthly[m];
    let avg = arr.reduce((a,b)=>a+b,0)/arr.length;

    let baseline = pvSize * 4;

    let factor = avg / baseline;

    factor = Math.max(0.5, Math.min(1.5, factor));

    calibration[m] = factor;
  });

  localStorage.setItem("calibration", JSON.stringify(calibration));
}

function getCalibration(month){
  let c = JSON.parse(localStorage.getItem("calibration")) || {};
  return c[month] || 1;
}

// ---------------- SOLAR POSITION ----------------
function toRad(d){ return d*Math.PI/180; }
function toDeg(r){ return r*180/Math.PI; }

function solarPosition(date, lat, lon){

  let n = Math.floor((date - new Date(date.getFullYear(),0,0))/86400000);

  let decl = 23.45 * Math.sin(toRad(360*(284+n)/365));

  let hour = date.getHours() + date.getMinutes()/60;
  let solarTime = hour + (lon/15);
  let hourAngle = 15*(solarTime-12);

  let elevation = Math.asin(
    Math.sin(toRad(lat))*Math.sin(toRad(decl)) +
    Math.cos(toRad(lat))*Math.cos(toRad(decl))*Math.cos(toRad(hourAngle))
  );

  let azimuth = Math.atan2(
    Math.sin(toRad(hourAngle)),
    Math.cos(toRad(hourAngle))*Math.sin(toRad(lat)) -
    Math.tan(toRad(decl))*Math.cos(toRad(lat))
  );

  return {
    elevation: toDeg(elevation),
    azimuth: (toDeg(azimuth)+180)%360
  };
}

function angleEfficiency(sunAz, panelAz){
  let diff = Math.abs(sunAz - panelAz);
  if(diff>180) diff = 360-diff;
  return Math.max(0, Math.cos(toRad(diff)));
}

// ---------------- WEATHER ----------------
async function getWeather(){
  let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,shortwave_radiation,precipitation&forecast_days=3&timezone=auto");
  return await res.json();
}

// ---------------- PV MODEL ----------------
function predictPV(hourly, dayIndex, settings, cal){

  let pvSize = parseFloat(settings.pvSize);
  let inverter = parseFloat(settings.inverter);

  let lat = 52.627;
  let lon = 1.331;

  let start = dayIndex*24;
  let total=0;

  for(let h=start; h<start+24; h++){

    let date = new Date(hourly.time[h]);

    let cloud = hourly.cloudcover[h];
    let rad = hourly.shortwave_radiation[h];

    let sun = solarPosition(date, lat, lon);

    let elevFactor = Math.max(0, Math.sin(toRad(sun.elevation)));
    let azFactor = angleEfficiency(sun.azimuth, parseFloat(settings.direction));
    let cloudFactor = 1 - (cloud/100);

    let potential = (rad/1000)*pvSize;

    let raw = potential * cloudFactor * elevFactor * azFactor;

    let clipped = Math.min(raw, inverter);

    total += clipped/4;
  }

  return total * cal;
}

// ---------------- SOC MODEL ----------------
function calculateSOC(weather, cal){

  let score =
    (weather.rad/1000)*0.5 +
    (1-weather.cloud/100)*0.3 +
    (weather.sun/12)*0.2;

  score *= cal;

  let soc = 80 - (score*60);

  if(score < 0.4) soc += 10;
  if(weather.sun < 4) soc += 10;
  if(score > 0.7) soc -= 10;

  return Math.max(20, Math.min(90, Math.round(soc)));
}

// ---------------- MAIN ----------------
async function runAI(){

  document.getElementById("loading").innerText="Loading...";

  let data = await getWeather();

  let settings = JSON.parse(localStorage.getItem("settings"));
  let month = new Date().getMonth();
  let cal = getCalibration(month);

  document.getElementById("debug").innerHTML =
    `Calibration: ${cal.toFixed(2)}`;

  // WEATHER SUMMARY
  let wOut="";

  for(let d=0; d<3; d++){

    let c=0,r=0,sun=0;

    for(let h=d*24; h<d*24+24; h++){
      c+=data.hourly.cloudcover[h];
      r+=data.hourly.shortwave_radiation[h];
      if(data.hourly.shortwave_radiation[h]>300) sun++;
    }

    c/=24; r/=24;

    wOut += `<b>${d===0?"Today":d===1?"Tomorrow":"Day +2"}</b><br>
    ☁️ ${c.toFixed(0)}% | ☀️ ${r.toFixed(0)} W/m² | 🌞 ${sun} hrs<br><br>`;
  }

  document.getElementById("weatherOutput").innerHTML = wOut;

  // MAIN OUTPUT
  let output="";

  for(let d=0; d<3; d++){

    let start=d*24;

    let c=0,r=0,sun=0;

    for(let h=start; h<start+24; h++){
      c+=data.hourly.cloudcover[h];
      r+=data.hourly.shortwave_radiation[h];
      if(data.hourly.shortwave_radiation[h]>300) sun++;
    }

    c/=24; r/=24;

    let weather = {cloud:c, rad:r, sun:sun};

    let soc = calculateSOC(weather, cal);

    let pv = predictPV(data.hourly, d, settings, cal);

    output += `
      <div class="card">
        <b>${d===0?"Today":d===1?"Tomorrow":"Day +2"}</b><br><br>

        ⚡ Predicted PV: <b>${pv.toFixed(1)} kWh</b><br><br>

        🔋 SOC Recommendation:<br>

        ${d===1
          ? `<span class="tomorrow-soc">${soc}%</span>`
          : `<b>${soc}%</b>`
        }

        <br><br>

        ☁️ Cloud: ${c.toFixed(0)}%<br>
        ☀️ Radiation: ${r.toFixed(0)} W/m²<br>
        🌞 Sunshine hours: ${sun}
      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText="";
}

// ---------------- HISTORY UI ----------------
function renderHistory(){

  let h = getHistory();
  let el = document.getElementById("historyTable");

  if(!h.length){
    el.innerHTML="No history";
    return;
  }

  let html="<table><tr><th>Date</th><th>kWh</th></tr>";

  h.forEach(d=>{
    html+=`<tr><td>${d.date}</td><td>${d.kwh}</td></tr>`;
  });

  html+="</table>";
  el.innerHTML=html;
}

function renderCalibration(){

  let c = JSON.parse(localStorage.getItem("calibration")) || {};
  let el = document.getElementById("calibrationTable");

  let html="<table><tr><th>Month</th><th>Factor</th></tr>";

  Object.keys(c).forEach(m=>{
    html+=`<tr><td>${m}</td><td>${c[m].toFixed(2)}</td></tr>`;
  });

  html+="</table>";

  el.innerHTML=html;
}

// ---------------- TABS ----------------
function showTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if(tab==="history"){
    renderHistory();
    renderCalibration();
  }

  if(tab==="settings"){
    loadSettings();
  }
}

// ---------------- INIT ----------------
window.onload=function(){
  loadSettings();
  updateCalibration();
}

</script>

</body>
</html>
