<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Season Aware)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input {
      padding: 8px;
      width: 160px;
    }
    .footer {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro (Season Aware)</h2>

<div class="card">
📍 <b>Location:</b><br>
NR7 0WZ (Norwich, UK)<br>
<small>Lat: 52.627 | Lon: 1.331</small>
</div>

<!-- ✅ PV INPUT SECTION -->
<div class="card">
  <b>📥 Add Today’s PV Data</b><br><br>
  <input id="pvInput" type="number" placeholder="Enter PV kWh">
  <br><br>
  <button onclick="savePV()">Save PV</button>
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<p id="loading"></p>

<div id="output"></div>

<div class="footer">
  <b>📊 Solar Score Meaning:</b><br><br>
  🔥 85–100% → Excellent<br>
  👍 65–85% → Good<br>
  ⚖️ 45–65% → Moderate<br>
  ⚠️ &lt;45% → Low solar<br>
</div>

<script>

//
// -----------------------------
// PV STORAGE
// -----------------------------
//
function getPVHistory() {
  let data = localStorage.getItem("pvHistory");
  return data ? JSON.parse(data) : [];
}

function savePV() {
  let pv = parseFloat(document.getElementById("pvInput").value);
  if (isNaN(pv)) return alert("Enter a valid number");

  let history = getPVHistory();

  history.push({
    date: new Date().toISOString().split("T")[0],
    kwh: pv
  });

  localStorage.setItem("pvHistory", JSON.stringify(history));

  alert("PV saved!");
}

//
// Dynamic calibration factor
//
function getDynamicCalibrationFactor() {
  let history = getPVHistory();

  if (history.length === 0) return 52; // fallback (~26 / 0.5)

  let avgPV = history.reduce((a,b)=>a + b.kwh, 0) / history.length;

  let baselineScore = 0.5;

  return avgPV / baselineScore;
}

//
// -----------------------------
// SOC Colour Mapping
// -----------------------------
function socColor(socValue) {
  let soc = parseInt(socValue);

  if (soc >= 70) return "limegreen";
  if (soc >= 40) return "orange";
  return "red";
}

//
// -----------------------------
// SOC Logic
// -----------------------------
function recommendedSOC(avgScore, maxElevation) {

  let seasonalFactor = maxElevation / 60;
  seasonalFactor = Math.min(1, Math.max(0, seasonalFactor));

  let adjustedScore = (avgScore * 0.7) + (seasonalFactor * 0.3);

  let soc = 100 - (adjustedScore * 50);

  soc = Math.min(95, Math.max(20, soc));

  return Math.round(soc) + "%";
}

function explain(score) {
  if (score > 0.85) return "Excellent solar conditions. Strong export likely.";
  if (score > 0.65) return "Good solar with some cloud. Battery should charge well.";
  if (score > 0.45) return "Moderate solar. Partial battery charge expected.";
  return "Low solar. Prioritise higher SOC to avoid grid import.";
}

//
// -----------------------------
// Solar scoring model
// -----------------------------
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;

  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

//
// -----------------------------
// Sun elevation
// -----------------------------
function sunElevation(date, lat, lon) {
  const rad = Math.PI / 180;

  let day = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  let decl = 23.45 * Math.sin(rad * (360 * (284 + day) / 365));

  let hour = date.getHours() + date.getMinutes() / 60;
  let solarTime = hour + (lon / 15);
  let hourAngle = 15 * (solarTime - 12);

  let elevation = Math.asin(
    Math.sin(lat * rad) * Math.sin(decl * rad) +
    Math.cos(lat * rad) * Math.cos(decl * rad) * Math.cos(hourAngle * rad)
  ) / rad;

  return Math.max(0, elevation);
}

//
// -----------------------------
// Max sun elevation
// -----------------------------
function maxSunElevationForDay(date, lat, lon) {
  let maxElev = 0;

  for (let hour = 0; hour < 24; hour++) {
    let d = new Date(date);
    d.setHours(hour, 0, 0, 0);

    let elev = sunElevation(d, lat, lon);
    if (elev > maxElev) maxElev = elev;
  }

  return maxElev;
}

//
// -----------------------------
// Weather summary
// -----------------------------
function weatherSummary(avgCloud, avgRad, avgTemp) {
  if (avgCloud < 20 && avgRad > 600) {
    return "☀️ Clear skies with strong solar radiation.";
  }
  if (avgCloud < 40 && avgRad > 400) {
    return "🌤️ Mostly sunny with some cloud.";
  }
  if (avgCloud < 70) {
    return "⛅ Mixed cloud cover.";
  }
  return "☁️ Heavy cloud cover.";
}

//
// -----------------------------
// Strategy
// -----------------------------
function strategy(scores) {
  let avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  if (avg > 0.8) return "☀️ Strong solar → Lower SOC";
  if (avg > 0.6) return "⚖️ Mixed → Balanced SOC";
  return "⚠️ Weak solar → Higher SOC";
}

//
// -----------------------------
// MAIN
// -----------------------------
async function runAI() {
  try {

    document.getElementById("loading").innerText = "Loading forecast...";

    let res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation&forecast_days=3&timezone=auto"
    );

    let data = await res.json();

    let times = data.hourly.time;
    let cloud = data.hourly.cloudcover;
    let radiation = data.hourly.shortwave_radiation;
    let temp = data.hourly.temperature_2m;

    let calibrationFactor = getDynamicCalibrationFactor();

    let output = "";
    let dayScores = [];

    for (let d = 0; d < 3; d++) {

      let dayStart = d * 24;

      let scores = [];
      let cloudVals = [];
      let radVals = [];
      let tempVals = [];
      let elevations = [];

      for (let h = dayStart; h < dayStart + 24; h++) {

        let date = new Date(times[h]);
        let hour = date.getHours();

        if (hour >= 10 && hour <= 15) {

          let elevation = sunElevation(date, 52.627, 1.331);
          let sunFactor = Math.sin(elevation * Math.PI / 180);

          let baseScore = hourlySolarScore(cloud[h], radiation[h]);
          let adjustedScore = baseScore * sunFactor;

          scores.push(adjustedScore);
          cloudVals.push(cloud[h]);
          radVals.push(radiation[h]);
          tempVals.push(temp[h]);
          elevations.push(elevation);
        }
      }

      let avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;
      if (isNaN(avgScore)) avgScore = 0;

      let avgCloud = cloudVals.reduce((a,b)=>a+b,0) / cloudVals.length;
      let avgRad = radVals.reduce((a,b)=>a+b,0) / radVals.length;
      let avgTemp = tempVals.reduce((a,b)=>a+b,0) / tempVals.length;
      let avgElevation = elevations.reduce((a,b)=>a+b,0) / elevations.length;

      let dateObj = new Date(times[dayStart]);
      let maxElevation = maxSunElevationForDay(dateObj, 52.627, 1.331);

      let percent = (avgScore * 100).toFixed(0);

      // ✅ Dynamic PV prediction
      let predictedPV = (avgScore * calibrationFactor).toFixed(1);

      dayScores.push(avgScore);

      output += `
        <div class="card">
          <b>Day ${
            d === 0 ? "Today" :
            d === 1 ? '<span style="color:red">Tomorrow</span>' :
            "Day +2"
          }</b><br><br>

          🌤️ ${weatherSummary(avgCloud, avgRad, avgTemp)}<br><br>

          ⚡ Solar Score: ${percent}%<br>
          🔋 Estimated PV: ${predictedPV} kWh<br><br>

          ☀️ Sun Elevation: ${avgElevation.toFixed(1)}°<br>
          📈 Max Elevation: ${maxElevation.toFixed(1)}°<br><br>

          🔋 Recommended SOC:
          <span style="color:${socColor(recommendedSOC(avgScore, maxElevation))}; font-weight:bold;">
            ${recommendedSOC(avgScore, maxElevation)}
          </span><br><br>

          🧠 ${explain(avgScore)}
        </div>
      `;
    }

    output += `
      <div class="card">
        <b>📊 Strategy</b><br><br>
        ${strategy(dayScores)}
      </div>
    `;

    document.getElementById("output").innerHTML = output;
    document.getElementById("loading").innerText = "";

  } catch (err) {
    document.getElementById("output").innerHTML = "Error loading data";
    document.getElementById("loading").innerText = "";
  }
}
</script>

</body>
</html>
