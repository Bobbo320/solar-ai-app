<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<div class="card">
📍 <b>Location:</b><br>
NR7 0WZ (Norwich, UK)
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<p id="loading"></p>

<div id="output"></div>

<script>

// -------------------- Settings --------------------
const system = {
  pvSize: 6.5,
  inverter: 5,
  battery: 10.64,
  orientation: "south" // south, east, west, north
};

const dailyLoad = 10;
const efficiency = 0.85;

// -------------------- Weather Fetch --------------------
async function getWeather() {
  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto"
  );
  return await res.json();
}

// -------------------- Temperature Efficiency --------------------
function temperatureEfficiency(temp) {
  const nominalTemp = 25;
  const coef = -0.004;

  let delta = temp - nominalTemp;
  let efficiencyFactor = 1 + (delta * coef);

  if (efficiencyFactor < 0.8) efficiencyFactor = 0.8;
  if (efficiencyFactor > 1.05) efficiencyFactor = 1.05;

  return efficiencyFactor;
}

// -------------------- Seasonal Factor --------------------
function getSeasonalFactor(date) {
  let month = date.getMonth() + 1;

  if (month >= 11 || month <= 2) return 0.8;
  if (month >= 3 && month <= 5) return 0.9;
  if (month >= 6 && month <= 8) return 1.0;
  return 0.9;
}

// -------------------- Solar Score --------------------
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;
  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

// -------------------- Sunshine Split --------------------
function sunshineSplit(radiationArray, startIndex) {
  let morning = 0;
  let afternoon = 0;

  for (let i = 0; i < 24; i++) {
    let rad = radiationArray[startIndex + i];
    if (rad > 120) {
      if (i < 12) morning++;
      else afternoon++;
    }
  }

  return { morning, afternoon };
}

// -------------------- Orientation Weighting --------------------
function applyOrientation(morning, afternoon) {

  let o = system.orientation;

  if (o === "east") return morning * 1.3 + afternoon * 0.5;
  if (o === "west") return morning * 0.5 + afternoon * 1.3;
  if (o === "north") return (morning + afternoon) * 0.6;

  // default south
  return morning * 1.0 + afternoon * 1.0;
}

// -------------------- Forecast Confidence --------------------
function forecastConfidence(cloudArray, startIndex) {

  let values = cloudArray.slice(startIndex, startIndex + 24);

  let mean = values.reduce((a,b)=>a+b,0) / values.length;

  let variance = values.reduce((sum,v)=>{
    return sum + Math.pow(v - mean, 2);
  },0) / values.length;

  let stdDev = Math.sqrt(variance);

  if (stdDev < 10) return "High";
  if (stdDev < 20) return "Medium";
  return "Low";
}

// -------------------- Cloud Timing Weighting --------------------
function weightedCloudAverage(cloudArray, startIndex) {

  let weights = [];

  for (let i = 0; i < 24; i++) {
    let hourWeight = Math.exp(-Math.pow((i - 12) / 6, 2));
    weights.push(hourWeight);
  }

  let weightedSum = 0;
  let weightTotal = 0;

  for (let i = 0; i < 24; i++) {
    let cloud = cloudArray[startIndex + i];
    weightedSum += cloud * weights[i];
    weightTotal += weights[i];
  }

  return weightedSum / weightTotal;
}

// -------------------- PV Estimate --------------------
function estimatePV(avgScore, effectiveSunHours, middayTemp, seasonalFactor) {

  let tempFactor = temperatureEfficiency(middayTemp);

  let raw = system.pvSize * effectiveSunHours * avgScore * efficiency * tempFactor * seasonalFactor;

  let inverterLimit = system.inverter * effectiveSunHours;

  return Math.min(raw, inverterLimit);
}

// -------------------- SOC Model --------------------
function recommendedSOC(predictedPV) {

  const batteryCapacity = system.battery;
  const buffer = 1.2;

  let shortfall = Math.max(0, dailyLoad - predictedPV);
  let required = shortfall * buffer;

  let soc = (required / batteryCapacity) * 100;

  if (soc < 20) soc = 20;
  if (soc > 95) soc = 95;

  return Math.round(soc);
}

// -------------------- Weather Summary --------------------
function weatherSummary(cloud, rad, temp, humidity, precip) {
  return `
    🌤️ Cloud: ${cloud.toFixed(0)}%<br>
    ☀️ Radiation: ${rad.toFixed(0)} W/m²<br>
    🌡️ Temp (midday): ${temp.toFixed(1)}°C<br>
    💧 Humidity: ${humidity.toFixed(0)}%<br>
    🌧️ Precip: ${precip.toFixed(2)} mm
  `;
}

// -------------------- MAIN --------------------
async function runAI() {

  document.getElementById("loading").innerText = "Loading...";

  let data = await getWeather();

  let cloud = data.hourly.cloudcover;
  let rad = data.hourly.shortwave_radiation;
  let temp = data.hourly.temperature_2m;
  let hum = data.hourly.relativehumidity_2m;
  let precip = data.hourly.precipitation;

  let timeArray = data.hourly.time;

  let html = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;

    let weightedCloud = weightedCloudAverage(cloud, start);

    let avgRad = rad.slice(start, start + 24).reduce((a,b)=>a+b)/24;

    let scores = rad.slice(start, start + 24)
      .map((r,i)=>hourlySolarScore(cloud[start+i], r));

    let avgScore = scores.reduce((a,b)=>a+b)/scores.length;

    let sunshine = sunshineSplit(rad, start);

    let effectiveSunHours = applyOrientation(sunshine.morning, sunshine.afternoon);

    let middayTemp = temp[start + 12];

    let date = new Date(timeArray[start]);
    let seasonalFactor = getSeasonalFactor(date);

    let pv = estimatePV(avgScore, effectiveSunHours, middayTemp, seasonalFactor);
    let soc = recommendedSOC(pv);

    let confidence = forecastConfidence(cloud, start);

    let label = d===0?"Today":d===1?"Tomorrow":"The day after tomorrow";
    let style = d===1?"style='color:red;font-weight:bold;font-size:20px'":"";

    let pvColor = pv > dailyLoad ? "lightgreen" : pv > dailyLoad * 0.7 ? "orange" : "red";

    html += `
      <div class="card">
        <h3>${label}</h3>

        ${weatherSummary(
          weightedCloud,
          avgRad,
          middayTemp,
          hum[start+12],
          precip[start+12]
        )}

        <br><b>🌞 Sunshine:</b>
        <br>🌅 Morning: ${sunshine.morning}h
        <br>🌇 Afternoon: ${sunshine.afternoon}h

        <br><b>🧭 Orientation:</b> ${system.orientation}

        <br><b>📊 Forecast Confidence:</b> ${confidence}

        <br><b>🌍 Seasonal Factor:</b> ${seasonalFactor.toFixed(2)}

        <br><b>⚡ Estimated PV:</b> <span style="color:${pvColor}">${pv.toFixed(1)} kWh</span>

        <br><span ${style}>🔋 Recommended SOC: ${soc}%</span>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
  document.getElementById("loading").innerText = "";
}

</script>

</body>
</html>
