<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Season-Aware)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    .footer {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro (Season-Aware)</h2>

<div class="card">
📍 <b>Location:</b><br>
NR7 0WZ (Norwich, UK)<br>
<small>Lat: 52.627 | Lon: 1.331</small>
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<div id="output"></div>

<div class="footer">
  <b>📊 Solar Score Meaning:</b><br><br>
  🔥 85–100% → Excellent<br>
  👍 65–85% → Good<br>
  ⚖️ 45–65% → Moderate<br>
  ⚠️ &lt;45% → Low solar<br>
</div>

<script>
function soc(score) {
  if (score > 0.85) return "65%";
  if (score > 0.65) return "75%";
  if (score > 0.45) return "85%";
  return "95%";
}

function explain(score) {
  if (score > 0.85) return "Excellent solar conditions. Strong export likely.";
  if (score > 0.65) return "Good solar with some cloud. Battery should charge well.";
  if (score > 0.45) return "Moderate solar. Partial battery charge expected.";
  return "Low solar. Prioritise higher SOC to avoid import.";
}

// Seasonal factor (day-of-year based)
function seasonalFactor() {
  let now = new Date();
  let start = new Date(now.getFullYear(), 0, 0);
  let diff = now - start;
  let oneDay = 1000 * 60 * 60 * 24;
  let dayOfYear = Math.floor(diff / oneDay);

  let angle = (2 * Math.PI * (dayOfYear - 172)) / 365;

  // Range ~0.6 (winter) to 1.0 (summer)
  return 0.8 + 0.2 * Math.cos(angle);
}

// Solar scoring model
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;

  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

// Weather summary
function weatherSummary(avgCloud, avgRad, avgTemp) {
  if (avgCloud < 20 && avgRad > 600) {
    return "☀️ Clear skies with strong solar radiation. Excellent generation expected.";
  }
  if (avgCloud < 40 && avgRad > 400) {
    return "🌤️ Mostly sunny with some cloud. Good solar generation.";
  }
  if (avgCloud < 70) {
    return "⛅ Mixed cloud cover. Moderate solar generation with variability.";
  }
  if (avgCloud >= 70) {
    return "☁️ Heavy cloud cover. Low solar generation expected.";
  }
  return "🌥️ Variable conditions.";
}

function strategy(scores) {
  let avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  if (avg > 0.8) return "☀️ Strong solar period → Lower SOC to maximise export";
  if (avg > 0.6) return "⚖️ Mixed conditions → Balanced SOC strategy";
  return "⚠️ Weak solar → Higher SOC to avoid grid import";
}

async function runAI() {
  try {
    let res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation&forecast_days=3&timezone=auto"
    );

    let data = await res.json();

    let times = data.hourly.time;
    let cloud = data.hourly.cloudcover;
    let radiation = data.hourly.shortwave_radiation;
    let temp = data.hourly.temperature_2m;

    let output = "";
    let dayScores = [];

    for (let d = 0; d < 3; d++) {

      let dayStart = d * 24;

      let scores = [];
      let cloudVals = [];
      let radVals = [];
      let tempVals = [];

      for (let h = dayStart; h < dayStart + 24; h++) {

        let hour = new Date(times[h]).getHours();

        if (hour >= 10 && hour <= 15) {
          scores.push(hourlySolarScore(cloud[h], radiation[h]));
          cloudVals.push(cloud[h]);
          radVals.push(radiation[h]);
          tempVals.push(temp[h]);
        }
      }

      let avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;
      if (isNaN(avgScore)) avgScore = 0;

      // Apply seasonal adjustment
      let season = seasonalFactor();
      avgScore = avgScore * season;
      avgScore = Math.min(1, avgScore);

      let avgCloud = cloudVals.reduce((a,b)=>a+b,0) / cloudVals.length;
      let avgRad = radVals.reduce((a,b)=>a+b,0) / radVals.length;
      let avgTemp = tempVals.reduce((a,b)=>a+b,0) / tempVals.length;

      dayScores.push(avgScore);

      let percent = (avgScore * 100).toFixed(0);

      output += `
        <div class="card">
          <b>Day ${d === 0 ? "Today" : d === 1 ? "Tomorrow" : "Day +2"}</b><br><br>

          🌤️ Weather Summary: ${weatherSummary(avgCloud, avgRad, avgTemp)}<br><br>

          ⚡ Solar Score: ${percent}%<br>
          🌍 Seasonal Factor: ${season.toFixed(2)}<br><br>

          ☁️ Cloud impact: ${(1 - avgCloud / 100).toFixed(2)}<br>
          ☀️ Radiation impact: ${(avgRad / 1000).toFixed(2)}<br>
          🌡️ Temperature: ${avgTemp.toFixed(1)}°C<br><br>

          🔋 Recommended SOC: ${soc(avgScore)}<br><br>

          🧠 ${explain(avgScore)}
        </div>
      `;
    }

    output += `
      <div class="card">
        <b>📊 3-Day Strategy</b><br><br>
        ${strategy(dayScores)}
      </div>
    `;

    document.getElementById("output").innerHTML = output;

  } catch (err) {
    document.getElementById("output").innerHTML = "Error loading data";
  }
}
</script>

</body>
</html>
