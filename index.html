<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input, select {
      padding: 8px;
      width: 180px;
      margin-bottom: 10px;
    }
    .hidden { display: none; }
    .cloud-bar {
  width: 100%;
  height: 10px;
  background: #334155;
  border-radius: 5px;
  margin-top: 5px;
  overflow: hidden;
}

.cloud-bar-fill {
  height: 100%;
  background: #38bdf8;
  width: 0%;
  transition: width 0.3s ease;
}
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="runAI()">Plan Next 3 Days</button>
<button onclick="togglePVTab()">📊 PV Data</button>
  
<div id="settingsPanel" class="card hidden">
  <h3>Settings</h3>

  <label>Place:</label><br>
  <input id="postcode"><br>

  <label>PV Size (kWp):</label><br>
  <input id="pvSize" type="number"><br>

  <label>Inverter Size (kW):</label><br>
  <input id="inverter" type="number"><br>

  <label>Battery Capacity (kWh):</label><br>
  <input id="battery" type="number"><br>

  <label>PV Orientation:</label><br>
  <select id="orientation">
    <option value="south">South (100% output)</option>
    <option value="se_sw">SE / SW (92% output)</option>
    <option value="east_west">East / West (85% output)</option>
    <option value="north">North (65% output)</option>
  </select><br>

  <label>Shading:</label><br>
  <select id="shading">
    <option value="100">None (100% output)</option>
    <option value="90">Very light (90%)</option>
    <option value="80">Light (80%)</option>
    <option value="70">Moderate (70%)</option>
    <option value="50">Heavy (50%)</option>
  </select><br>

  <label>Daily Load (kWh):</label><br>
  <input id="dailyLoad" type="number"><br>

  <label>Efficiency (%):</label><br>
  <input id="efficiency" type="number"><br>

  <label>SOC Low (%):</label><br>
  <input id="socLow" type="number"><br>

  <label>SOC High (%):</label><br>
  <input id="socHigh" type="number"><br>

  <button onclick="saveSettings()">Save</button>
</div>

 <div id="pvPanel" class="card hidden">
  <h3>📊 PV Data</h3>
   <label>View:</label>
<select id="pvViewMode" onchange="renderPVTable()">
  <option value="today">Today</option>
  <option value="7days">Last 7 Days</option>
  <option value="all">All</option>
</select>
<br><br>
<p><b>Calibration Factor:</b> <span id="calFactor">1.00</span></p>
   
  <table border="1" style="width:100%; color:white; border-collapse:collapse;">
    <thead>
      <tr>
        <th>Date</th>
        <th>Expected PV (kWh)</th>
        <th>Manual PV (kWh)</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="pvTable"></tbody>
  </table>
</div>
  
<p id="loading"></p>
<div id="output"></div>

<script>

const SOLAR_THRESHOLD = 120;

let preloadedWeather = null;

// -------------------- PV DATA + AUTO TUNING --------------------

function getPVData() {
  return JSON.parse(localStorage.getItem("pvData") || "{}");
}

function savePVData(data) {
  localStorage.setItem("pvData", JSON.stringify(data));
}

function togglePVTab() {
  pvPanel.classList.toggle("hidden");
  renderPVTable();
}

function storeExpectedPV(dayIndex, pvValue) {
  let data = getPVData();

  let date = new Date();
  date.setDate(date.getDate() + dayIndex);

  let key = date.toISOString().split("T")[0];

  // Create row if it doesn't exist
if (!data[key]) data[key] = {};

// ❌ Do NOT overwrite if manual already exists
if (data[key].manual !== undefined) return;

// ❌ Do NOT overwrite existing expected (preserve history)
if (data[key].expected !== undefined) return;

// ✅ Safe to store
data[key].expected = pvValue;

  savePVData(data);
}

function getCalibrationFactor() {
  let data = getPVData();

  let weightedManual = 0;
  let weightedExpected = 0;

  let today = new Date();

  Object.keys(data).forEach(date => {
  let row = data[date];

  let entryDate = new Date(date);
  let diffDays = (today - entryDate) / (1000 * 60 * 60 * 24);

  if (
    diffDays >= 0 &&
    diffDays <= 14 &&
    row.expected !== undefined &&
    row.manual !== undefined &&
    row.expected > 0 &&
    !isNaN(row.expected) &&
    !isNaN(row.manual)
  ) {

    let baseWeight = row.expected;
    // ❌ Outlier protection (bad manual entries)
let ratio = row.manual / row.expected;

// Ignore unrealistic values
if (ratio < 0.3 || ratio > 1.7) return;

    // ❌ Ignore weak/noisy days
    if (baseWeight < 2) return;

    // ✅ Boost strong days
    let weight = Math.pow(baseWeight, 1.3);

    weightedManual += row.manual * weight;
    weightedExpected += row.expected * weight;
  }
});

  if (weightedExpected === 0) return 1;

let factor = weightedManual / weightedExpected;

// ✅ Stability clamp (prevents crazy swings)
factor = Math.max(0.75, Math.min(1.25, factor));

return factor;
}

function renderPVTable() {
  let data = getPVData();
  let tbody = document.getElementById("pvTable");

  tbody.innerHTML = "";

  let mode = document.getElementById("pvViewMode")?.value || "today";

let today = new Date();
let todayStr = today.toISOString().split("T")[0];

Object.keys(data).sort().forEach(date => {

  let include = false;
  let entryDate = new Date(date);

  if (mode === "today") {
    include = (date === todayStr);
  }

  if (mode === "7days") {
    let diff = (today - entryDate) / (1000 * 60 * 60 * 24);
    include = diff >= 0 && diff <= 7;
  }

  if (mode === "all") {
    include = true;
  }

  if (!include) return;

    let row = data[date];

    let tr = document.createElement("tr");

    tr.setAttribute("data-date", date);

    tr.innerHTML = `
      <td>${date}</td>
      <td>${row.expected ? row.expected.toFixed(1) : "-"}</td>
      <td>
        <select onchange="changeEntryDate('${date}', this.value)">
  ${generateDateOptions(date)}
</select>
<br>
<input type="number" step="0.1" value="${row.manual || ""}" id="manual-${date}">
<button onclick="saveManual('${date}')">Save</button>
      </td>
      <td>
        <button onclick="deletePVRow('${date}')">Delete</button>
        <span class="saveTick" style="margin-left:10px; color:lightgreen;"></span>
      </td>
    `;

    tbody.appendChild(tr);
  });

  // ✅ Calibration factor display (run once)
  let factor = getCalibrationFactor();
  document.getElementById("calFactor").innerText = factor.toFixed(2);
}

function saveManual(date){
  let input = document.getElementById("manual-"+date);
  updateManualPV(date, input.value);
}
  
function updateManualPV(date, value) {
  let data = getPVData();

  if (!data[date]) data[date] = {};
  data[date].manual = parseFloat(value);

  savePVData(data);

  // show tick
  let row = document.querySelector(`tr[data-date="${date}"]`);
  if (row) {
    let tick = row.querySelector(".saveTick");
    if (tick) {
      tick.innerText = "✔️ Saved";
      setTimeout(() => tick.innerText = "", 1500);
    }
  }
}

function deletePVRow(date) {
  let data = getPVData();
  delete data[date];
  savePVData(data);
  renderPVTable();
}
  
// -------------------- SETTINGS --------------------
function getSettings() {
  let s = JSON.parse(localStorage.getItem("settings") || "{}");

  return {
    postcode: s.postcode || "Norwich",
    pvSize: s.pvSize ?? 6.5,
    inverter: s.inverter ?? 5,
    battery: s.battery ?? 10.64,
    orientation: s.orientation || "south",
    shading: s.shading ?? 100,
    dailyLoad: s.dailyLoad ?? 10,
    efficiency: s.efficiency ?? 85,
    socLow: s.socLow ?? 20,
    socHigh: s.socHigh ?? 95
  };
}

function saveSettings() {
  let settings = {
    postcode: postcode.value,
    pvSize: +pvSize.value,
    inverter: +inverter.value,
    battery: +battery.value,
    orientation: orientation.value,
    shading: +shading.value,
    dailyLoad: +dailyLoad.value,
    efficiency: +efficiency.value,
    socLow: +socLow.value,
    socHigh: +socHigh.value
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  preloadWeather();

  alert("Saved");
  toggleSettings();

  if (!localStorage.getItem("firstUseDate")) {
  localStorage.setItem("firstUseDate", new Date().toISOString().split("T")[0]);
}
}

function loadSettingsToUI() {
  let s = getSettings();

  postcode.value = s.postcode;
  pvSize.value = s.pvSize;
  inverter.value = s.inverter;
  battery.value = s.battery;
  orientation.value = s.orientation;
  shading.value = s.shading;
  dailyLoad.value = s.dailyLoad;
  efficiency.value = s.efficiency;
  socLow.value = s.socLow;
  socHigh.value = s.socHigh;
}

function toggleSettings() {
  settingsPanel.classList.toggle("hidden");
  loadSettingsToUI();
}

// -------------------- CACHE --------------------
function getCache(key) {
  return JSON.parse(localStorage.getItem(key) || "null");
}

function setCache(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

// -------------------- PRELOAD --------------------
async function preloadWeather() {
  try {
    let s = getSettings();
    preloadedWeather = await getWeather(s.postcode);
  } catch {}
}

// -------------------- GEOCODING --------------------
async function getCoordinates(postcode) {
  try {
    let cacheKey = "coords_" + postcode;
    let cached = getCache(cacheKey);

    if (cached) return cached;

    let res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(postcode)}&count=1`);
    let data = await res.json();

    if (!data.results || data.results.length === 0) throw new Error();

    let coords = {
      lat: data.results[0].latitude,
      lon: data.results[0].longitude
    };

    setCache(cacheKey, coords);
    return coords;

  } catch {
    return { lat: 52.6309, lon: 1.2974 };
  }
}

// -------------------- WEATHER --------------------
async function getWeather(postcode) {
  try {
    let cacheKey = "weather_" + postcode;
    let cached = getCache(cacheKey);
    let now = Date.now();

    if (cached && (now - cached.timestamp < 1800000)) {
      return cached.data;
    }

    let c = await getCoordinates(postcode);

    let res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto`
    );

    let data = await res.json();

    setCache(cacheKey, { timestamp: now, data });
    return data;

  } catch {
    return {
      hourly: {
        cloudcover: new Array(72).fill(50),
        shortwave_radiation: new Array(72).fill(200),
        temperature_2m: new Array(72).fill(15),
        relativehumidity_2m: new Array(72).fill(70),
        precipitation: new Array(72).fill(0)
      }
    };
  }
}

// -------------------- SOLAR --------------------
function getOrientationFactor(o) {
  if (o==="south") return 1;
  if (o==="se_sw") return 0.92;
  if (o==="east_west") return 0.85;
  if (o==="north") return 0.65;
  return 1;
}

function temperatureEfficiency(t) {
  let f = 1 + ((t - 25) * -0.004);
  return Math.min(1.05, Math.max(0.8, f));
}

function daylightHours(radSlice) {
  return radSlice.filter(r => r > SOLAR_THRESHOLD);
}

function sunshineSplit(r,start){
  let morning=0, afternoon=0;

  for(let i=0;i<24;i++){
    if(r[start+i] > SOLAR_THRESHOLD){
      if(i < 12) morning++;
      else afternoon++;
    }
  }

  return {morning, afternoon};
}

function hourlySolarScore(c, r) {
  return Math.min(1, r / 1000);
}

function weightedCloudAverage(c, r, start){

  let sum = 0, wSum = 0;

  for(let i=0;i<24;i++){
    let radVal = r[start+i];

    if(radVal > SOLAR_THRESHOLD){
      let weight = radVal;

      sum += c[start+i] * weight;
      wSum += weight;
    }
  }

  if(wSum === 0) wSum = 1;

  return sum / wSum;
}

function cloudIntensityFactor(cloud, rad) {
  let cloudFactor = cloud / 100;

  // Thin cloud → strong boost (sun breaks)
  if (cloud < 30) {
    if (rad > 200) return 1.25;
    return 1.1;
  }

  // Medium cloud → balanced scaling
  if (cloud >= 30 && cloud <= 70) {
    return 0.85 + (rad / 1000) * 0.2;
  }

  // Thick cloud → strong reduction
  if (cloud > 70) {
    return 0.6 + (rad / 1000) * 0.1;
  }

  return 1;
}

function getCloudThicknessLabel(cloud, rad) {
  let radFactor = rad / 1000;

  let score = (cloud / 100) * (1 - radFactor);

  // Normalize score to 0–1 range for UI
  let intensity = Math.min(1, Math.max(0, score));

  if (cloud < 30 && rad > 300) {
    return { label: "Thin / Broken Cloud ☁️", intensity };
  }

  if (cloud >= 30 && cloud <= 70) {
    return { label: "Moderate Cloud 🌥️", intensity };
  }

  if (cloud > 70) {
    return { label: "Thick Cloud ☁️☁️", intensity };
  }

  return { label: "Clear / Light Cloud ☀️", intensity: intensity * 0.5 };
}
  
function estimatePV(avgScore, sun, temp, s) {
  let orientationFactor = getOrientationFactor(s.orientation);
  let shadingFactor = s.shading / 100;

  let raw = s.pvSize * sun * avgScore *
            (s.efficiency/100) *
            temperatureEfficiency(temp) *
            orientationFactor *
            shadingFactor;

  let limit = s.inverter * sun;

  return Math.min(raw, limit);
}

function generateDateOptions(selectedDate) {
  let data = getPVData();

  // earliest stored date
  let dates = Object.keys(data);
  let minDate = dates.length ? dates.sort()[0] : new Date().toISOString().split("T")[0];

  let today = new Date();

  let options = "";

  for (let i = 0; i < 14; i++) { // last 14 days window
    let d = new Date();
    d.setDate(today.getDate() - i);

    let dStr = d.toISOString().split("T")[0];

    // disable dates before first use
    let disabled = dStr < minDate ? "disabled" : "";

    let selected = dStr === selectedDate ? "selected" : "";

    options += `<option value="${dStr}" ${selected} ${disabled}>${dStr}</option>`;
  }

  return options;
}

function changeEntryDate(oldDate, newDate) {
  let data = getPVData();

  if (!data[oldDate]) return;

  // ✅ Prevent overwriting an existing entry
  if (data[newDate]) {
    alert("Date already exists. Delete it first.");
    return;
  }

  // move entry safely
  data[newDate] = data[oldDate];
  delete data[oldDate];

  savePVData(data);
  renderPVTable();
}
  
// -------------------- SOC --------------------
function recommendedSOC(pv, s){

  let shortfall = Math.max(0, s.dailyLoad - pv);

  let buffer = 1.15;
  if (shortfall > 5) buffer = 1.25;
  if (shortfall > 10) buffer = 1.35;

  let required = shortfall * buffer;

  let soc = (required / s.battery) * 100;

  if(soc < s.socLow) soc = s.socLow;
  if(soc > s.socHigh) soc = s.socHigh;

  return Math.round(soc);
}

function getSolarTimeRange(radSlice, timeSlice) {
  let startTime = null;
  let endTime = null;

  for (let i = 0; i < 24; i++) {
    if (radSlice[i] > SOLAR_THRESHOLD) {
      if (startTime === null) {
        startTime = timeSlice[i];
      }
      endTime = timeSlice[i];
    }
  }

  if (!startTime || !endTime) return "No data";

  let start = new Date(startTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  let end = new Date(endTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  return `${start} – ${end}`;
}

function weatherSummary(c,r,t,h,p){
  return `
    🌤️ Cloud (daylight): ${c.toFixed(0)}%<br>
    ☀️ Radiation (daylight avg): ${r.toFixed(0)} W/m²<br>
    🌡️ Temp (daylight avg): ${t.toFixed(1)}°C<br>
    💧 Humidity (daylight avg): ${h.toFixed(0)}%<br>
    🌧️ Precip (daylight total): ${p.toFixed(2)} mm
  `;
}

// -------------------- MAIN --------------------
async function runAI(){

  let s=getSettings();
  loading.innerText="Loading...";
  let tomorrowSOCValue = null;
  let data = preloadedWeather || await getWeather(s.postcode);

  let cloud=data.hourly.cloudcover;
  let rad=data.hourly.shortwave_radiation;
  let temp=data.hourly.temperature_2m;
  let hum=data.hourly.relativehumidity_2m;
  let precip=data.hourly.precipitation;
  let time = data.hourly.time;

  let html = "";
let forecastHtml = "";

  // -------------------- LIVE NOW --------------------
let now = new Date();

// Find closest hour index
let nowIndex = time.findIndex(t => {
  let tDate = new Date(t);
  return tDate.getHours() === now.getHours() &&
         tDate.getDate() === now.getDate();
});

// fallback if not found
if (nowIndex === -1) nowIndex = 0;

// Extract current conditions
let nowRad = rad[nowIndex];
let nowCloud = cloud[nowIndex];
let cloudInfo = getCloudThicknessLabel(nowCloud, nowRad); 
let nowTemp = temp[nowIndex];

// -------------------- LIVE PV ESTIMATE --------------------

// Convert radiation to PV output (kW)
let cloudFactorLive = cloudIntensityFactor(nowCloud, nowRad);

let nowPV = (
  s.pvSize *
  (nowRad / 1000) *
  (s.efficiency / 100) *
  temperatureEfficiency(nowTemp) *
  getOrientationFactor(s.orientation) *
  (s.shading / 100) *
  cloudFactorLive
);

// inverter cap
nowPV = Math.min(nowPV, s.inverter);

// apply calibration
nowPV *= getCalibrationFactor();

 let status = "";

if (nowRad < 50) {
  status = "🌙 No solar → discharge or grid use";
} else if (nowPV < 0.3) {
  status = "🌥️ Very weak → minimal charging";
} else if (nowPV < 1) {
  status = "⚡ Low solar → partial charging";
} else if (nowPV < 3) {
  status = "☀️ Good solar → charging battery";
} else {
  status = "🔋 Peak solar → maximise charging / export";
}
  
// Format time nicely
let nowTimeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

// Build UI card
html += `
  <div class="card">
    <h3>☀️ Now (${nowTimeStr})</h3>

    <b>Radiation:</b> ${nowRad.toFixed(0)} W/m²<br>
    <b>Live PV:</b> ${nowPV.toFixed(2)} kW<br>
    <b>Cloud:</b> ${nowCloud.toFixed(0)}%<br>
    <b>Cloud Type:</b> ${cloudInfo.label}<br>

<div class="cloud-bar">
  <div class="cloud-bar-fill" style="width:${(Math.pow(cloudInfo.intensity, 0.7) * 100).toFixed(0)}%"></div>
</div>
    <b>Temp:</b> ${nowTemp.toFixed(1)}°C<br>

    <br><b>Status:</b> ${status}
  </div>
`;

 for (let d = 0; d < 3; d++) {

  let start = d * 24;

  let dayRad = daylightHours(rad.slice(start, start + 24));

  let avgRad = dayRad.length
    ? dayRad.reduce((a, b) => a + b) / dayRad.length
    : 0;

  let validHours = 0;
  let scoreSum = 0;

  for (let i = 0; i < 24; i++) {
    let rVal = rad[start + i];

    if (rVal > SOLAR_THRESHOLD) {
      scoreSum += hourlySolarScore(cloud[start + i], rVal);
      validHours++;
    }
  }

  let avgScore = validHours ? (scoreSum / validHours) : 0;

  let split = sunshineSplit(rad, start);

  let timeRange = getSolarTimeRange(
    rad.slice(start, start + 24),
    time.slice(start, start + 24)
  );

  let sun = split.morning + split.afternoon;

  let midTemp = temp[start + 12] ?? temp[start]; // safety fallback

  let cloudFactorDay = cloudIntensityFactor(
    weightedCloudAverage(cloud, rad, start),
    avgRad
  );

  let basePV = s.pvSize *
    (avgRad / 1000) *
    sun *
    (s.efficiency / 100) *
    temperatureEfficiency(midTemp) *
    getOrientationFactor(s.orientation) *
    (s.shading / 100) *
    cloudFactorDay;

  // inverter cap
  basePV = Math.min(basePV, s.inverter * sun);

  // calibration
  let calibration = getCalibrationFactor();
  let pv = basePV * calibration;

  // ✅ Store expected PV only for tomorrow
  if (d === 1) {
    storeExpectedPV(1, basePV);
  }

  // ✅ SOC calculation
  let soc = recommendedSOC(pv, s);

  // ✅ Capture tomorrow SOC for display
if (d === 1 && tomorrowSOCValue === null) {
  tomorrowSOCValue = soc;
}

  // Label
  let label = d === 0
  ? "Today"
  : d === 1
    ? "<span style='font-weight:bold'>Tomorrow</span>"
    : "The day after tomorrow";

  // Render card
  forecastHtml += `
    <div class="card">
      <h3>${label}</h3>

      ${weatherSummary(
        weightedCloudAverage(cloud, rad, start),
        avgRad,
        temp[start + 12] ?? temp[start],
        hum[start + 12] ?? hum[start],
        precip[start + 12] ?? precip[start]
      )}

      <br><b>🔆 Usable Solar Window:</b> ${sun} hours
      <br><b>⏱️ Time Range:</b> ${timeRange}

      <br><b>⚡ Estimated PV:</b> ${pv.toFixed(1)} kWh
    </div>
  `;
}

// -------------------- RENDER --------------------

loading.innerText = "";

// 1. Add SOC FIRST
html += `
  <div class="card">
    <h3>🔋 Tomorrow Grid Charge Target</h3>

    <b>Recommended SOC:</b>
    <span style="color:red;font-weight:bold; font-size:18px;">
      ${tomorrowSOCValue !== null ? tomorrowSOCValue + "%" : "N/A"}
    </span>
  </div>
`;

// 2. Then append forecast cards
html += forecastHtml;

output.innerHTML = html;
  
};

// -------------------- INIT --------------------
window.onload = () => {
  preloadWeather();
  renderPVTable();
};
</script>

</body>
</html>
