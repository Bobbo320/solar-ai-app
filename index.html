<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button {
      padding: 10px;
      margin: 6px;
    }

    input {
      padding: 6px;
      margin: 4px;
      width: 80%;
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }

    .tab { display: none; }
    .active { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #555;
      padding: 6px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="showTab('main')">Main</button>
<button onclick="showTab('settings')">Settings</button>
<button onclick="showTab('history')">History</button>

<!-- MAIN -->
<div id="main" class="tab active">
  <div class="card">📍 NR7 0WZ (Norwich)</div>
  <button onclick="runAI()">Plan Next 3 Days</button>
  <p id="loading"></p>
  <div id="output"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab">

  <div class="card">
    <h3>Settings</h3>

    <input id="postcode" placeholder="Postcode"><br>
    <input id="inverter" placeholder="Inverter kW"><br>
    <input id="battery" placeholder="Battery kWh"><br>
    <input id="pvSize" placeholder="PV kWp"><br>
    <input id="direction" placeholder="Direction"><br>
    <input id="elevation" placeholder="Elevation"><br>

    <button onclick="saveSettings()">Save Settings</button>
  </div>

  <div class="card">
    <h3>Manual PV Input</h3>

    <input type="date" id="pvDate"><br>
    <input type="number" id="pvInput" placeholder="kWh"><br>

    <button onclick="savePV()">Save PV</button>

    <div id="pvHistoryTable"></div>
  </div>

  <div class="card">
    <h3>📊 Monthly Calibration</h3>
    <canvas id="calibrationChart" width="300" height="200"></canvas>
    <div id="calibrationTable"></div>
  </div>

</div>

<!-- HISTORY -->
<div id="history" class="tab">
  <div class="card">
    <h3>PV History</h3>
    <div id="historyTable"></div>
  </div>
</div>

<script>

const LAT = 52.627;
const LON = 1.331;

let lastPredictedPV = null;

// ---------------- STORAGE ----------------
function getHistory() {
  return JSON.parse(localStorage.getItem("pvHistory")) || [];
}

function getCalibrationMap() {
  return JSON.parse(localStorage.getItem("calibrationMap")) || {};
}

function saveCalibrationMap(map) {
  localStorage.setItem("calibrationMap", JSON.stringify(map));
}

// ---------------- SETTINGS ----------------
function saveSettings() {
  let settings = {
    postcode: document.getElementById("postcode").value,
    inverter: document.getElementById("inverter").value,
    battery: document.getElementById("battery").value,
    pvSize: document.getElementById("pvSize").value,
    direction: document.getElementById("direction").value,
    elevation: document.getElementById("elevation").value
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  alert("Saved");
}

// ---------------- CALIBRATION ----------------
function updateCalibration(date, predicted, actual) {

  let map = getCalibrationMap();
  let month = new Date(date).getMonth() + 1;

  let factor = actual / predicted;

  if (!map[month]) {
    map[month] = factor;
  } else {
    map[month] = (map[month] * 0.7) + (factor * 0.3);
  }

  saveCalibrationMap(map);
}

function getCalibration(date) {
  let map = getCalibrationMap();
  let month = new Date(date).getMonth() + 1;
  return map[month] || 1;
}

// ---------------- PV ----------------
function savePV() {

  let pv = parseFloat(document.getElementById("pvInput").value);
  let date = document.getElementById("pvDate").value;

  if (!date || isNaN(pv)) return alert("Invalid input");

  let history = getHistory();

  history = history.filter(d => d.date !== date);
  history.push({ date, kwh: pv });

  localStorage.setItem("pvHistory", JSON.stringify(history));

  if (lastPredictedPV) {
    updateCalibration(date, lastPredictedPV, pv);
  }

  renderPVHistory();
  renderHistory();
  renderCalibration();

  alert("Saved");
}

// ---------------- WEATHER ----------------
function enhancedWeatherScore(cloud, rad, precip) {

  let cloudFactor = 1 - (cloud / 100);
  let radFactor = rad / 1000;
  let precipPenalty = precip > 0 ? 0.2 : 0;

  let score = (cloudFactor * 0.5) +
              (radFactor * 0.4) -
              precipPenalty;

  return Math.min(1, Math.max(0, score));
}

// ---------------- SUN ----------------
function sunElevation(date, lat, lon) {
  const rad = Math.PI / 180;

  let day = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  let decl = 23.45 * Math.sin(rad * (360 * (284 + day) / 365));

  let hour = date.getHours() + date.getMinutes() / 60;
  let solarTime = hour + (lon / 15);
  let hourAngle = 15 * (solarTime - 12);

  let elevation = Math.asin(
    Math.sin(lat * rad) * Math.sin(decl * rad) +
    Math.cos(lat * rad) * Math.cos(decl * rad) * Math.cos(hourAngle * rad)
  ) / rad;

  return Math.max(0, elevation);
}

// ---------------- SOC ----------------
function seasonalSOC(score, elev, date) {

  let month = new Date(date).getMonth() + 1;

  let seasonalWeight =
    (month <= 2 || month === 12) ? 0.9 :
    (month <= 5) ? 0.6 :
    (month <= 8) ? 0.3 : 0.5;

  let adjusted =
    (score * 0.6) +
    ((elev/60) * 0.2) +
    ((1 - seasonalWeight) * 0.2);

  let soc = 100 - (adjusted * 60);

  return Math.round(Math.min(95, Math.max(20, soc))) + "%";
}

// ---------------- MAIN ----------------
async function runAI() {

  document.getElementById("loading").innerText = "Loading...";

  let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation,precipitation&forecast_days=3&timezone=auto");

  let data = await res.json();

  let times = data.hourly.time;
  let cloud = data.hourly.cloudcover;
  let rad = data.hourly.shortwave_radiation;
  let precip = data.hourly.precipitation;

  let output = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;
    let scores = [];

    for (let h = start; h < start + 24; h++) {

      let dt = new Date(times[h]);
      let hour = dt.getHours();

      if (hour >= 10 && hour <= 15) {

        let elev = sunElevation(dt, LAT, LON);

        let base = enhancedWeatherScore(cloud[h], rad[h], precip[h]);

        let cal = getCalibration(dt);

        let score = base * Math.sin(elev*Math.PI/180) * cal;

        scores.push(score);
      }
    }

    let avg = scores.reduce((a,b)=>a+b,0)/scores.length || 0;

    let dateObj = new Date(times[start]);

    let maxElev = 0;
    for (let h=0; h<24; h++) {
      let dt = new Date(dateObj);
      dt.setHours(h);
      let e = sunElevation(dt, LAT, LON);
      if (e > maxElev) maxElev = e;
    }

    let predictedPV = avg * 30;
    if (d === 0) lastPredictedPV = predictedPV;

    let sunshineHours = cloud.slice(start,start+24).filter(c => c < 50).length;

    output += `
      <div class="card">
        <b>${d===0?"Today":d===1?"Tomorrow":"Day +2"}</b><br><br>

        ⚡ Solar Score: ${(avg*100).toFixed(0)}%<br>
        ☀️ Sunshine Hours: ${sunshineHours}<br>
        🌧️ Rain Avg: ${(precip.slice(start,start+24).reduce((a,b)=>a+b,0)/24).toFixed(2)} mm<br><br>

        🔋 Predicted PV: ${predictedPV.toFixed(1)} kWh<br>
        🔋 Recommended SOC: <b>${seasonalSOC(avg, maxElev, dateObj)}</b>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText = "";
}

// ---------------- RENDER PV ----------------
function renderPVHistory() {

  let history = getHistory();
  let el = document.getElementById("pvHistoryTable");

  if (!el) return;

  if (history.length === 0) {
    el.innerHTML = "No PV data";
    return;
  }

  history.sort((a,b)=> new Date(b.date)-new Date(a.date));

  let html = "<table><tr><th>Date</th><th>kWh</th></tr>";

  history.forEach(h => {
    html += `<tr><td>${h.date}</td><td>${h.kwh}</td></tr>`;
  });

  html += "</table>";

  el.innerHTML = html;
}

// ---------------- HISTORY TAB ----------------
function renderHistory() {
  document.getElementById("historyTable").innerHTML =
    document.getElementById("pvHistoryTable").innerHTML;
}

// ---------------- CALIBRATION ----------------
function renderCalibration() {

  let map = getCalibrationMap();

  let table = "<table><tr><th>Month</th><th>Factor</th></tr>";

  for (let m = 1; m <= 12; m++) {
    let val = map[m] ? map[m].toFixed(2) : "-";
    table += `<tr><td>${m}</td><td>${val}</td></tr>`;
  }

  table += "</table>";
  document.getElementById("calibrationTable").innerHTML = table;

  let canvas = document.getElementById("calibrationChart");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,300,200);

  let x = 20;

  for (let m = 1; m <= 12; m++) {
    let val = map[m] || 0;
    let h = val * 80;

    ctx.fillStyle = "#38bdf8";
    ctx.fillRect(x, 150 - h, 15, h);

    ctx.fillStyle = "white";
    ctx.fillText(m, x, 170);

    x += 20;
  }
}

// ---------------- SETTINGS UI ----------------
function loadSettingsUI() {
  let s = JSON.parse(localStorage.getItem("settings")) || {};

  document.getElementById("postcode").value = s.postcode || "";
  document.getElementById("inverter").value = s.inverter || "";
  document.getElementById("battery").value = s.battery || "";
  document.getElementById("pvSize").value = s.pvSize || "";
  document.getElementById("direction").value = s.direction || "";
  document.getElementById("elevation").value = s.elevation || "";
}

// ---------------- TABS ----------------
function showTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if (tab === "settings") {
    loadSettingsUI();
    renderPVHistory();
    renderCalibration();
  }

  if (tab === "history") {
    renderHistory();
  }
}

// init
renderPVHistory();
renderCalibration();

</script>

</body>
</html>
