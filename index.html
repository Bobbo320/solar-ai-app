<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Integrated)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button { padding: 10px; margin: 6px; }

    input {
      padding: 6px;
      margin: 4px;
      width: 90%;
    }

    .card {
      margin-top: 12px;
      padding: 12px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }

    .tab { display: none; }
    .active { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #555;
      padding: 6px;
      font-size: 13px;
    }

    .tomorrow-soc {
      font-size: 28px;
      font-weight: bold;
      color: red;
      background: #220000;
      padding: 10px;
      border-radius: 8px;
      display: inline-block;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="showTab('main')">Main</button>
<button onclick="showTab('settings')">Settings</button>
<button onclick="showTab('history')">History</button>

<!-- MAIN -->
<div id="main" class="tab active">

  <button onclick="runAI()">Plan Next 3 Days</button>

  <p id="loading"></p>

  <div class="card">
    <h3>🌤️ 3-Day Weather</h3>
    <div id="weatherOutput">Loading...</div>
  </div>

  <div id="output"></div>

</div>

<!-- SETTINGS -->
<div id="settings" class="tab">

  <div class="card">
    <h3>Settings</h3>

    <input id="postcode" placeholder="Postcode"><br>
    <input id="inverter" placeholder="Inverter kW"><br>
    <input id="battery" placeholder="Battery kWh"><br>
    <input id="pvSize" placeholder="PV kWp"><br>
    <input id="direction" placeholder="Direction (degrees)"><br>
    <input id="elevation" placeholder="Elevation (m)"><br>

    <button onclick="saveSettings()">Save Settings</button>
  </div>

  <div class="card">
    <h3>Manual PV Input</h3>
    <input type="date" id="pvDate"><br>
    <input type="number" id="pvInput" placeholder="kWh"><br>
    <button onclick="savePV()">Save PV</button>
  </div>

</div>

<!-- HISTORY -->
<div id="history" class="tab">

  <div class="card">
    <h3>PV History</h3>
    <div id="historyTable"></div>
  </div>

  <div class="card">
    <h3>Calibration</h3>
    <div id="calibrationTable"></div>
  </div>

</div>

<script>

// ---------------- SETTINGS ----------------
function saveSettings(){
  let s = {
    postcode: document.getElementById("postcode").value,
    inverter: document.getElementById("inverter").value,
    battery: document.getElementById("battery").value,
    pvSize: document.getElementById("pvSize").value,
    direction: document.getElementById("direction").value,
    elevation: document.getElementById("elevation").value
  };
  localStorage.setItem("settings", JSON.stringify(s));
  alert("Saved");
}

function loadSettings(){
  let s = JSON.parse(localStorage.getItem("settings"));

  if(!s){
    s = {
      postcode:"NR7 0WZ",
      inverter:"5",
      battery:"10.64",
      pvSize:"6.5",
      direction:"170",
      elevation:"30"
    };
    localStorage.setItem("settings", JSON.stringify(s));
  }

  document.getElementById("postcode").value = s.postcode;
  document.getElementById("inverter").value = s.inverter;
  document.getElementById("battery").value = s.battery;
  document.getElementById("pvSize").value = s.pvSize;
  document.getElementById("direction").value = s.direction;
  document.getElementById("elevation").value = s.elevation;
}

// ---------------- PV HISTORY ----------------
function getHistory(){
  return JSON.parse(localStorage.getItem("pvHistory")) || [];
}

function savePV(){
  let date = document.getElementById("pvDate").value;
  let pv = parseFloat(document.getElementById("pvInput").value);

  if(!date || isNaN(pv)) return alert("Invalid");

  let history = getHistory();
  history = history.filter(d=>d.date!==date);
  history.push({date, kwh:pv});

  localStorage.setItem("pvHistory", JSON.stringify(history));

  updateCalibration();
  renderHistory();
  renderCalibration();

  alert("Saved");
}

// ---------------- CALIBRATION ----------------
function updateCalibration(){

  let history = getHistory();
  let monthly = {};

  history.forEach(h=>{
    let m = new Date(h.date).getMonth();
    if(!monthly[m]) monthly[m]=[];
    monthly[m].push(h.kwh);
  });

  let cal={};

  Object.keys(monthly).forEach(m=>{
    let avg = monthly[m].reduce((a,b)=>a+b,0)/monthly[m].length;
    cal[m] = avg / 20; // baseline
  });

  localStorage.setItem("calibration", JSON.stringify(cal));
}

function getCalibration(month){
  let c = JSON.parse(localStorage.getItem("calibration")) || {};
  return c[month] || 1;
}

// ---------------- WEATHER ----------------
async function getWeather(){
  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,shortwave_radiation,precipitation&forecast_days=3&timezone=auto"
  );
  return await res.json();
}

function renderWeather(data){

  let cloud = data.hourly.cloudcover;
  let rad = data.hourly.shortwave_radiation;
  let precip = data.hourly.precipitation;

  let out="";

  for(let d=0; d<3; d++){

    let start = d*24;

    let c=0,r=0,p=0,sun=0;

    for(let h=start; h<start+24; h++){
      c+=cloud[h];
      r+=rad[h];
      p+=precip[h];
      if(rad[h]>300) sun++;
    }

    c/=24; r/=24;

    out += `
      <b>${d===0?"Today":d===1?"Tomorrow":"Day +2"}</b><br>
      ☁️ ${c.toFixed(0)}% |
      ☀️ ${r.toFixed(0)} W/m² |
      🌧️ ${p.toFixed(1)} mm |
      🌞 ${sun} hrs<br><br>
    `;
  }

  document.getElementById("weatherOutput").innerHTML = out;
}

// ---------------- SOC MODEL ----------------
function calculateSOC(weather, cal, settings){

  let rad = weather.rad;
  let cloud = weather.cloud;
  let sun = weather.sun;

  let radFactor = rad/1000;
  let cloudFactor = 1 - (cloud/100);
  let sunFactor = sun/12;

  let score = (radFactor*0.5)+(cloudFactor*0.3)+(sunFactor*0.2);

  let calibrated = score * cal;

  let pv = parseFloat(settings.pvSize);
  let inverter = parseFloat(settings.inverter);

  let clipping = pv/inverter;

  let soc = 80 - (calibrated*60);

  if(calibrated < 0.4) soc += 10;
  if(sun < 4) soc += 10;
  if(calibrated > 0.7) soc -= 10;
  if(clipping > 1.2) soc -= 5;

  return Math.max(20, Math.min(90, Math.round(soc)));
}

// ---------------- MAIN ----------------
async function runAI(){

  document.getElementById("loading").innerText="Loading...";

  let data = await getWeather();
  renderWeather(data);

  let settings = JSON.parse(localStorage.getItem("settings"));
  let month = new Date().getMonth();
  let cal = getCalibration(month);

  let output="";

  for(let d=0; d<3; d++){

    let start = d*24;

    let c=0,r=0,sun=0;

    for(let h=start; h<start+24; h++){
      c+=data.hourly.cloudcover[h];
      r+=data.hourly.shortwave_radiation[h];
      if(data.hourly.shortwave_radiation[h]>300) sun++;
    }

    c/=24; r/=24;

    let weather = {cloud:c, rad:r, sun:sun};

    let soc = calculateSOC(weather, cal, settings);

    output += `
      <div class="card">
        <b>${d===0?"Today":d===1?"Tomorrow":"Day +2"}</b><br><br>

        ⚡ SOC Recommendation:<br>

        ${d===1
          ? `<span class="tomorrow-soc">${soc}%</span>`
          : `<b>${soc}%</b>`
        }

        <br><br>

        ☁️ Cloud: ${c.toFixed(0)}%<br>
        ☀️ Radiation: ${r.toFixed(0)} W/m²<br>
        🌞 Sunshine hours: ${sun}
      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText="";
}

// ---------------- HISTORY UI ----------------
function renderHistory(){
  let h = getHistory();
  let el = document.getElementById("historyTable");

  if(!h.length){ el.innerHTML="No history"; return; }

  let html="<table><tr><th>Date</th><th>kWh</th></tr>";

  h.forEach(d=>{
    html+=`<tr><td>${d.date}</td><td>${d.kwh}</td></tr>`;
  });

  html+="</table>";
  el.innerHTML=html;
}

function renderCalibration(){
  let c = JSON.parse(localStorage.getItem("calibration")) || {};
  let el = document.getElementById("calibrationTable");

  let html="<table><tr><th>Month</th><th>Factor</th></tr>";

  Object.keys(c).forEach(m=>{
    html+=`<tr><td>${m}</td><td>${c[m].toFixed(2)}</td></tr>`;
  });

  html+="</table>";
  el.innerHTML=html;
}

// ---------------- TABS ----------------
function showTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if(tab==="history"){
    renderHistory();
    renderCalibration();
  }

  if(tab==="settings"){
    loadSettings();
  }
}

// ---------------- INIT ----------------
window.addEventListener("load",()=>{
  loadSettings();
  renderHistory();
  renderCalibration();
});
</script>

</body>
</html>
