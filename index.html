<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="runAI()">Analyse Tomorrow</button>

<div class="card" id="output">Press the button</div>

<script>
function weatherText(code) {
  if (code === 0) return "☀️ Clear sky";
  if ([1,2].includes(code)) return "🌤️ Partly cloudy";
  if (code === 3) return "☁️ Overcast";
  if ([51,61,63].includes(code)) return "🌧️ Rain";
  return "🌥️ Mixed";
}

function clippingRisk(score) {
  if (score > 85) return "🔥 HIGH";
  if (score > 65) return "⚠️ MEDIUM";
  return "✅ LOW";
}

function batteryPrediction(score) {
  if (score > 85) return "Battery likely full by late morning";
  if (score > 65) return "Battery likely full early afternoon";
  if (score > 45) return "Battery may not fully charge";
  return "Battery unlikely to fill";
}

function socRecommendation(score) {
  if (score > 85) return "60–70%";
  if (score > 65) return "70–80%";
  if (score > 45) return "80–90%";
  return "90–100%";
}

async function runAI() {
  try {
    let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=52.63&longitude=1.30&daily=weathercode,temperature_2m_max&timezone=auto");
    let data = await res.json();

    let code = data.daily.weathercode[1];
    let temp = data.daily.temperature_2m_max[1];

    let solarScore = 0;

    if (code === 0) solarScore = 1.0;
    else if ([1,2].includes(code)) solarScore = 0.8;
    else if (code === 3) solarScore = 0.6;
    else solarScore = 0.3;

    if (temp >= 10 && temp <= 20) solarScore += 0.05;

    solarScore = Math.min(1, solarScore);

    let scorePercent = (solarScore * 100).toFixed(0);

    document.getElementById("output").innerHTML = `
      🌤️ <b>Tomorrow:</b><br>
      ${weatherText(code)} | ${temp}°C<br><br>

      ⚡ <b>Solar Score:</b> ${scorePercent}%<br><br>

      🔋 <b>Recommended SOC:</b> ${socRecommendation(scorePercent)}<br><br>

      🔄 <b>Battery:</b><br>
      ${batteryPrediction(scorePercent)}<br><br>

      ⚠️ <b>Clipping Risk:</b> ${clippingRisk(scorePercent)}<br><br>

      💡 <b>Strategy:</b><br>
      Start lower SOC to maximise export if risk is high
    `;

  } catch (err) {
    document.getElementById("output").innerHTML = "Error loading data";
  }
}
</script>

</body>
</html>
