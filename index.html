<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<div class="card">
📍 <b>Location:</b><br>
NR7 0WZ (Norwich, UK)
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<p id="loading"></p>

<div id="output"></div>

<script>

// -------------------- Settings --------------------
const system = {
  pvSize: 6.5,
  inverter: 5,
  battery: 10.64
};

const dailyLoad = 10;
const efficiency = 0.85;

// -------------------- Weather Fetch --------------------
async function getWeather() {
  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,windspeed_10m,precipitation&forecast_days=3&timezone=auto"
  );
  return await res.json();
}

// -------------------- Temperature Efficiency --------------------
function temperatureEfficiency(temp) {
  const nominalTemp = 25;
  const coef = -0.004;

  let delta = temp - nominalTemp;
  let efficiencyFactor = 1 + (delta * coef);

  if (efficiencyFactor < 0.8) efficiencyFactor = 0.8;
  if (efficiencyFactor > 1.05) efficiencyFactor = 1.05;

  return efficiencyFactor;
}

// -------------------- Solar Score --------------------
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;
  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

// -------------------- Sunshine Hours --------------------
function calculateSunshineHours(radiationArray, startIndex) {
  let hours = 0;
  for (let i = startIndex; i < startIndex + 24; i++) {
    if (radiationArray[i] > 120) hours++;
  }
  return hours;
}

// -------------------- Cloud Timing Weighting --------------------
function weightedCloudAverage(cloudArray, startIndex) {

  let weights = [];

  for (let i = 0; i < 24; i++) {
    // Peak weighting around midday (index ~12)
    let hourWeight = Math.exp(-Math.pow((i - 12) / 6, 2));
    weights.push(hourWeight);
  }

  let weightedSum = 0;
  let weightTotal = 0;

  for (let i = 0; i < 24; i++) {
    let cloud = cloudArray[startIndex + i];
    weightedSum += cloud * weights[i];
    weightTotal += weights[i];
  }

  return weightedSum / weightTotal;
}

// -------------------- PV Estimate --------------------
function estimatePV(avgScore, sunshineHours, middayTemp) {

  let tempFactor = temperatureEfficiency(middayTemp);

  let raw = system.pvSize * sunshineHours * avgScore * efficiency * tempFactor;

  let inverterLimit = system.inverter * sunshineHours;

  return Math.min(raw, inverterLimit);
}

// -------------------- SOC Model --------------------
function recommendedSOC(predictedPV) {

  const batteryCapacity = system.battery;
  const buffer = 1.2;

  let shortfall = Math.max(0, dailyLoad - predictedPV);
  let required = shortfall * buffer;

  let soc = (required / batteryCapacity) * 100;

  if (soc < 20) soc = 20;
  if (soc > 95) soc = 95;

  return Math.round(soc);
}

// -------------------- Weather Summary --------------------
function weatherSummary(cloud, rad, temp, humidity, wind, precip) {
  return `
    🌤️ Cloud: ${cloud.toFixed(0)}%<br>
    ☀️ Radiation: ${rad.toFixed(0)} W/m²<br>
    🌡️ Temp (midday): ${temp.toFixed(1)}°C<br>
    💧 Humidity: ${humidity.toFixed(0)}%<br>
    🌬️ Wind: ${wind.toFixed(1)} km/h<br>
    🌧️ Precip: ${precip.toFixed(2)} mm
  `;
}

// -------------------- Main --------------------
async function runAI() {

  document.getElementById("loading").innerText = "Loading...";

  let data = await getWeather();

  let cloud = data.hourly.cloudcover;
  let radiation = data.hourly.shortwave_radiation;
  let temp = data.hourly.temperature_2m;
  let humidity = data.hourly.relativehumidity_2m;
  let wind = data.hourly.windspeed_10m;
  let precip = data.hourly.precipitation;

  let outputHTML = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;

    // Weighted cloud instead of simple average
    let weightedCloud = weightedCloudAverage(cloud, start);

    let dailyRad = 0;
    let scores = [];

    for (let i = start; i < start + 24; i++) {
      dailyRad += radiation[i];
      scores.push(hourlySolarScore(cloud[i], radiation[i]));
    }

    let avgRad = dailyRad / 24;
    let avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;

    let sunshineHours = calculateSunshineHours(radiation, start);

    let middayTemp = temp[start + 12];

    let pv = estimatePV(avgScore, sunshineHours, middayTemp);

    let soc = recommendedSOC(pv);

    // Labels
    let dayLabel = "";
    if (d === 0) dayLabel = "Today";
    if (d === 1) dayLabel = "Tomorrow";
    if (d === 2) dayLabel = "The day after tomorrow";

    let socStyle = (d === 1)
      ? "style='color:red; font-weight:bold; font-size:20px;'"
      : "";

    outputHTML += `
      <div class="card">
        <h3>${dayLabel}</h3>

        ${weatherSummary(
          weightedCloud,
          avgRad,
          middayTemp,
          humidity[start + 12],
          wind[start + 12],
          precip[start + 12]
        )}

        <br><b>🌞 Sunshine Hours:</b> ${sunshineHours}
        <br><b>⚡ Estimated PV:</b> ${pv.toFixed(1)} kWh
        <br><span ${socStyle}>🔋 Recommended SOC: ${soc}%</span>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = outputHTML;
  document.getElementById("loading").innerText = "";
}

</script>

</body>
</html>
