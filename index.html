<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI</h2>

<button onclick="runAI()">Get Tomorrow's Plan</button>

<div class="card" id="output">Press the button</div>

<script>
function weatherText(code) {
  if (code === 0) return "☀️ Clear sky";
  if ([1,2].includes(code)) return "🌤️ Partly cloudy";
  if (code === 3) return "☁️ Overcast";
  if ([45,48].includes(code)) return "🌫️ Fog";
  if ([51,61,63].includes(code)) return "🌧️ Rain";
  return "🌥️ Mixed conditions";
}

async function runAI() {
  try {
    let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=52.63&longitude=1.30&daily=weathercode,temperature_2m_max&timezone=auto");
    let data = await res.json();

    let code = data.daily.weathercode[1];
    let temp = data.daily.temperature_2m_max[1];

    let solarScore = 0;

    if (code === 0) solarScore = 1.0;
    else if ([1,2].includes(code)) solarScore = 0.8;
    else if (code === 3) solarScore = 0.6;
    else solarScore = 0.3;

    if (temp >= 10 && temp <= 20) solarScore += 0.05;

    solarScore = Math.min(1, solarScore);

    let soc = solarScore > 0.85 ? "60–70%" :
              solarScore > 0.65 ? "70–80%" :
              solarScore > 0.45 ? "80–90%" : "90–100%";

    document.getElementById("output").innerHTML = `
      🌤️ <b>Tomorrow's Weather:</b><br>
      ${weatherText(code)}<br>
      🌡️ ${temp}°C<br><br>

      🔋 <b>Recommended SOC:</b> ${soc}<br><br>

      ⚡ <b>Solar Score:</b> ${(solarScore*100).toFixed(0)}%
    `;

  } catch (err) {
    document.getElementById("output").innerHTML = "Error loading weather data";
  }
}
</script>

</body>
</html>
