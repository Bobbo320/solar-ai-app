<!DOCTYPE html>
<html>
<head>
  <title>Solar AI App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 10px;
      font-size: 16px;
      background: #000;
      color: #fff;
    }

    h2 { text-align: center; }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    button {
      flex: 1 1 45%;
      padding: 12px;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      background: #111;
      color: #fff;
      border: 1px solid #444;
      box-sizing: border-box;
    }

    .tab { display: none; }
    .active { display: block; }

    .card {
      background: #111;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .soc-box {
      margin-top: 20px;
      padding: 20px;
      background: #220000;
      border-radius: 10px;
      text-align: center;
      border: 1px solid #550000;
    }

    .soc-value {
      font-size: 32px;
      color: #ff4d4d;
      font-weight: bold;
    }

    canvas {
      margin-top: 15px;
      background: #111;
      border-radius: 8px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Solar AI App</h2>

<div class="nav">
  <button onclick="showTab('dashboard')">Dashboard</button>
  <button onclick="showTab('settings')">Settings</button>
  <button onclick="showTab('manual')">Manual PV</button>
  <button onclick="showTab('history')">History</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab active">
  <button onclick="loadWeather()">Load Weather</button>

  <div id="pv"></div>
  <div id="soc"></div>

  <canvas id="pvChart"></canvas>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab">
  <input id="postcode" placeholder="Postcode">
  <input id="pvSize" placeholder="PV Size (kWp)">
  <input id="inverter" placeholder="Inverter (kW)">
  <input id="battery" placeholder="Battery (kWh)">
  <input id="direction" placeholder="Direction">
  <input id="elevation" placeholder="Elevation">

  <button onclick="saveSettings()">Save Settings</button>
</div>

<!-- MANUAL PV -->
<div id="manual" class="tab">
  <input type="date" id="pvDate">
  <input id="pvInput" placeholder="kWh">
  <button onclick="addPV()">Add PV</button>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
  <div id="historyList"></div>
</div>

<script>

let weatherData = null;

/* ---------------- NAV ---------------- */

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');

  if(tab === 'history') renderHistory();
}

/* ---------------- SETTINGS ---------------- */

function saveSettings(){
  let settings = {
    postcode: postcode.value,
    pvSize: pvSize.value,
    inverter: inverter.value,
    battery: battery.value,
    direction: direction.value,
    elevation: elevation.value
  };
  localStorage.setItem("settings", JSON.stringify(settings));
  alert("Saved");
}

function loadSettings(){
  let s = JSON.parse(localStorage.getItem("settings") || "{}");

  postcode.value = s.postcode || "NR7 0WZ";
  pvSize.value = s.pvSize || 6.5;
  inverter.value = s.inverter || 5;
  battery.value = s.battery || 10.64;
  direction.value = s.direction || 170;
  elevation.value = s.elevation || 30;
}

/* ---------------- MANUAL PV ---------------- */

function addPV(){
  let history = JSON.parse(localStorage.getItem("pvHistory") || "[]");

  history.push({
    date: pvDate.value,
    kwh: parseFloat(pvInput.value)
  });

  localStorage.setItem("pvHistory", JSON.stringify(history));
  alert("Saved");
}

/* ---------------- HISTORY ---------------- */

function renderHistory(){
  let history = JSON.parse(localStorage.getItem("pvHistory") || "[]");

  let html = "<div class='card'>";
  history.forEach(h => {
    html += `${h.date} : ${h.kwh} kWh<br>`;
  });
  html += "</div>";

  historyList.innerHTML = html;
}

/* ---------------- WEATHER ---------------- */

async function loadWeather(){

  let lat = 52.627;
  let lon = 1.331;

  let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,cloudcover,precipitation&forecast_days=3`;

  let res = await fetch(url);
  let data = await res.json();

  weatherData = data.hourly;

  calculatePV();
}

/* ---------------- WEATHER HELPERS ---------------- */

function getDailyWeather(hourly, dayIndex){

  let start = dayIndex * 24;

  let clouds = [];
  let radiation = [];
  let precip = [];

  for(let i=0;i<24;i++){
    let idx = start + i;
    clouds.push(hourly.cloudcover[idx]);
    radiation.push(hourly.shortwave_radiation[idx]);
    precip.push(hourly.precipitation[idx]);
  }

  let avgCloud = clouds.reduce((a,b)=>a+b,0)/24;
  let avgRad = radiation.reduce((a,b)=>a+b,0)/24;
  let totalPrecip = precip.reduce((a,b)=>a+b,0);
  let sunshineHours = radiation.filter(r => r > 100).length;

  return { cloud: avgCloud, radiation: avgRad, precipitation: totalPrecip, sunshine: sunshineHours };
}

/* ---------------- CALIBRATION ---------------- */

function getCalibrationData(){
  return JSON.parse(localStorage.getItem("calibration") || "{}");
}

function saveCalibrationData(data){
  localStorage.setItem("calibration", JSON.stringify(data));
}

function basePredict(dayIndex){

  let settings = JSON.parse(localStorage.getItem("settings") || "{}");

  let pvSize = parseFloat(settings.pvSize);
  let inverter = parseFloat(settings.inverter);

  let w = getDailyWeather(weatherData, dayIndex);

  let cloudFactor = 0.4 + 0.6 * (1 - w.cloud / 100);
  let rainPenalty = Math.max(0.7, 1 - (w.precipitation * 0.05));
  let sunshineFactor = Math.min(1.2, 0.7 + (w.sunshine / 10));

  let base = w.radiation * 0.08;

  let pv = pvSize * base * cloudFactor * rainPenalty * sunshineFactor;

  return Math.min(pv, inverter * 6);
}

function buildCalibration(){

  let history = JSON.parse(localStorage.getItem("pvHistory") || "[]");
  let calibration = {};

  history.forEach(entry => {

    let date = new Date(entry.date);
    let month = date.getMonth();

    let predicted = basePredictFromDate(entry.date);

    if(predicted <= 0) return;

    let factor = entry.kwh / predicted;

    if(!calibration[month]) calibration[month] = [];
    calibration[month].push(factor);
  });

  let monthly = {};

  Object.keys(calibration).forEach(m => {
    let arr = calibration[m];
    monthly[m] = arr.reduce((a,b)=>a+b,0) / arr.length;
  });

  saveCalibrationData(monthly);
}

function basePredictFromDate(dateStr){
  return 1; // simplified fallback for calibration stability
}

function calibratedPredict(dayIndex){

  buildCalibration();

  let date = new Date();
  date.setDate(date.getDate() + dayIndex);

  let month = date.getMonth();
  let calibration = getCalibrationData();

  let factor = calibration[month] || 1.0;

  return basePredict(dayIndex) * factor;
}

/* ---------------- SOC ---------------- */

function calculateSOC(pvTomorrow){

  let settings = JSON.parse(localStorage.getItem("settings") || "{}");
  let battery = parseFloat(settings.battery);

  let ratio = pvTomorrow / battery;

  if(ratio > 3) return 20;
  if(ratio > 1.5) return 35;
  return 60;
}

/* ---------------- GRAPH ---------------- */

let chartInstance = null;

function renderChart(values){

  let ctx = document.getElementById('pvChart').getContext('2d');

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Today','Tomorrow','Day 3'],
      datasets: [{
        label: 'PV kWh',
        data: values
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: '#fff' } }
      },
      scales: {
        x: { ticks: { color: '#fff' } },
        y: { ticks: { color: '#fff' } }
      }
    }
  });
}

/* ---------------- DISPLAY ---------------- */

function calculatePV(){

  if(!weatherData) return;

  let pvToday = calibratedPredict(0);
  let pvTomorrow = calibratedPredict(1);
  let pvDay3 = calibratedPredict(2);

  let soc = calculateSOC(pvTomorrow);

  pv.innerHTML = `
    <div class="card">
      Today: ${pvToday.toFixed(2)} kWh<br>
      Tomorrow: ${pvTomorrow.toFixed(2)} kWh<br>
      Day 3: ${pvDay3.toFixed(2)} kWh
    </div>
  `;

  soc.innerHTML = `
    <div class="soc-box">
      Recommended SOC (Tomorrow)<br>
      <div class="soc-value">${soc}%</div>
    </div>
  `;

  renderChart([pvToday,pvTomorrow,pvDay3]);
}

/* ---------------- INIT ---------------- */

loadSettings();

</script>

</body>
</html>
