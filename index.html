<script>

const SOLAR_THRESHOLD = 50;        // used for real PV calculations
const SOLAR_VISIBLE_THRESHOLD = 30; // used for solar time window display

let preloadedWeather = null;
  
function getLocalDateKey(d = new Date()) {
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000)
    .toISOString()
    .split("T")[0];
}
// -------------------- PV DATA + AUTO TUNING --------------------

function getPVData() {
  return JSON.parse(localStorage.getItem("pvData") || "{}");
}

function savePVData(data) {
  localStorage.setItem("pvData", JSON.stringify(data));
}
function shouldUpdateExpectedPV() {
  const hour = new Date().getHours();

  // allow early-day creation, refine later
  return hour >= 10; // 10am+ improves forecast stability
}
function togglePVTab() {
  pvPanel.classList.toggle("hidden");
  renderPVTable();
}

function storeExpectedPV(dayIndex, pvValue) {
  let data = getPVData();

  let date = new Date();
  date.setDate(date.getDate() + dayIndex);

  let key = getLocalDateKey(date);

  if (!data[key]) data[key] = {};

  // ❌ NEVER overwrite manual data
  if (data[key].manual !== undefined) return;

  let existing = data[key].expected;

  // 🕒 time lock (prevents early unstable writes)
  const hour = new Date().getHours();
  const isStableTime = hour >= 10;

  // If no existing value → always allow
  if (existing === undefined) {
    data[key].expected = pvValue;
    savePVData(data);
    return;
  }

  // If early in day → never update
  if (!isStableTime) return;

  // Only update if meaningful change
  let diff = Math.abs(existing - pvValue);
  if (diff < 0.2) return;

  // Optional: dampen updates instead of replacing
  data[key].expected = existing * 0.7 + pvValue * 0.3;

  savePVData(data);
}

  function refreshExpectedPVAfterManualChange() {
  let data = getPVData();

  for (let d = 0; d < 2; d++) {
    let date = new Date();
    date.setDate(date.getDate() + d);

    let key = getLocalDateKey(date);

    if (data[key]?.manual !== undefined) continue;

    if (!data[key]) data[key] = {};
    delete data[key].expected;
  }

  savePVData(data);
}
  
function getCalibrationSystem() {
  let data = getPVData();
  let today = new Date();

  let weightedManual = 0;
  let weightedExpected = 0;

  // seasonal buckets
  let seasonal = {
    winter: { m: 0, e: 0 },
    spring: { m: 0, e: 0 },
    summer: { m: 0, e: 0 },
    autumn: { m: 0, e: 0 }
  };

  Object.keys(data).forEach(date => {
    let row = data[date];
    if (!row.expected || !row.manual) return;

    let entryDate = new Date(date);
    let diffDays = (today - entryDate) / 86400000;

    if (diffDays < 0 || diffDays > 45) return;

    let ratio = row.manual / row.expected;
    if (ratio < 0.3 || ratio > 1.7) return;
    if (row.expected < 1) return;

    let weight = Math.pow(row.expected, 1.2);

    weightedManual += row.manual * weight;
    weightedExpected += row.expected * weight;

    let month = entryDate.getMonth() + 1;

    let season =
      (month <= 2 || month === 12) ? "winter" :
      (month <= 5) ? "spring" :
      (month <= 8) ? "summer" : "autumn";

    seasonal[season].m += row.manual * weight;
    seasonal[season].e += row.expected * weight;
  });

  // ---------------------------
  // LAYER 1: SYSTEM BIAS
  // ---------------------------
  let bias = weightedExpected
    ? weightedManual / weightedExpected
    : 1;

  bias = Math.max(0.75, Math.min(1.25, bias));

  // ---------------------------
  // LAYER 2: SEASONAL DRIFT
  // ---------------------------
  let month = new Date().getMonth() + 1;

  let currentSeason =
    (month <= 2 || month === 12) ? "winter" :
    (month <= 5) ? "spring" :
    (month <= 8) ? "summer" : "autumn";

  let s = seasonal[currentSeason];

  let seasonalFactor = s.e > 0 ? (s.m / s.e) : 1;

  seasonalFactor = Math.max(0.85, Math.min(1.15, seasonalFactor));

  // ---------------------------
  // LAYER 3: DATA CONFIDENCE (NEW)
  // ---------------------------
  let sampleSize = Object.values(data)
    .filter(d => d.manual && d.expected)
    .length;

  // weak data → reduce correction strength
  let confidence = Math.min(1, sampleSize / 20);

  return {
    bias,
    seasonalFactor,
    confidence
  };
}

function applyCalibration(raw, mode = "live") {

  let { bias, seasonalFactor, confidence } = getCalibrationSystem();

  // combine layers
  let combined = bias * seasonalFactor;

  // ---------------------------
  // RESPONSIVENESS MODEL (NEW CORE IDEA)
  // ---------------------------
  let strength;

  if (mode === "live") {
    strength = 0.25;   // stable, avoids noise chasing
  } else if (mode === "forecast") {
    strength = 0.60;   // allows learning from trends
  } else {
    strength = 0.40;
  }

  // reduce effect when data is weak
  strength *= (0.4 + 0.6 * confidence);

  // blend toward 1 (neutral baseline)
  let corrected = 1 + (combined - 1) * strength;

  // hard safety clamp
  corrected = Math.max(0.85, Math.min(1.20, corrected));

  return raw * corrected;
}
  
function renderPVTable() {

  let tbody = document.getElementById("pvTable");

let today = new Date();
let todayStr = getLocalDateKey(new Date());

Object.keys(data)

  }

    let row = data[date];

<td>
  <button onclick="openEditor('${date}')">Edit</button>
  <button onclick="deletePVRow('${date}')">Delete</button>
</td>
    `;

    tbody.appendChild(tr);

  // ✅ Calibration factor display (run once)
let { bias, seasonalFactor } = getCalibrationSystem();

let factor = bias * seasonalFactor;
  document.getElementById("calFactor").innerText = factor.toFixed(2);
}


function deletePVRow(date) {
  let data = getPVData();
  delete data[date];
  savePVData(data);

refreshExpectedPVAfterManualChange();

renderPVTable();
runAI();
}

// -------------------- CACHE --------------------
function getCache(key) {
  return JSON.parse(localStorage.getItem(key) || "null");
}

function setCache(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

// -------------------- PRELOAD --------------------
async function preloadWeather() {
  try {
    let s = getSettings();
    preloadedWeather = await getWeather(s.postcode);
  } catch {}
}

// -------------------- GEOCODING --------------------
async function getCoordinates(postcode) {
  try {
    let cacheKey = "coords_" + postcode;
    let cached = getCache(cacheKey);

    if (cached) return cached;

    let res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(postcode)}&count=1`);
    let data = await res.json();

    if (!data.results || data.results.length === 0) throw new Error();

    let coords = {
      lat: data.results[0].latitude,
      lon: data.results[0].longitude
    };

    setCache(cacheKey, coords);
    return coords;

  } catch {
    return { lat: 52.6309, lon: 1.2974 };
  }
}

// -------------------- WEATHER --------------------
async function getWeather(postcode) {
  try {
    let cacheKey = "weather_" + postcode;
    let cached = getCache(cacheKey);
    let now = Date.now();

    if (cached && (now - cached.timestamp < 1800000)) {
      return cached.data;
    }

    let c = await getCoordinates(postcode);

    let res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto`
    );

    let data = await res.json();

    setCache(cacheKey, { timestamp: now, data });
    return data;

  } catch {
    return {
      hourly: {
        cloudcover: new Array(72).fill(50),
        shortwave_radiation: new Array(72).fill(200),
        temperature_2m: new Array(72).fill(15),
        relativehumidity_2m: new Array(72).fill(70),
        precipitation: new Array(72).fill(0)
      }
    };
  }
}

// -------------------- SOLAR --------------------
function getOrientationFactor(o) {
  if (o==="south") return 1;
  if (o==="se_sw") return 0.92;
  if (o==="east_west") return 0.85;
  if (o==="north") return 0.65;
  return 1;
}

// -------------------- SEASONAL TILT --------------------
function getSeasonalTilt(baseTilt) {
  let s = getSettings();
  if (s.seasonalTilt === "off") return baseTilt;

  let now = new Date();

  // Day of year (1–365)
  let start = new Date(now.getFullYear(), 0, 0);
  let diff = now - start;
  let day = Math.floor(diff / (1000 * 60 * 60 * 24));

  // Seasonal tilt limits
  let winterTilt = Math.min(60, baseTilt + 20);
  let summerTilt = Math.max(15, baseTilt - 15);

  // Smooth cosine curve across the year
  // Peak winter ≈ day 355 (Dec), peak summer ≈ day 172 (June)
  let seasonalFactor =
    (Math.cos((2 * Math.PI * (day - 172)) / 365) + 1) / 2;

  return summerTilt * (1 - seasonalFactor) + winterTilt * seasonalFactor;
}
  
function getTiltFactor(tilt, hour) {

  tilt = Math.max(0, Math.min(90, getSeasonalTilt(tilt)));

  const optimalTilt = 35;

  let tiltEffect = 1 - Math.pow((tilt - optimalTilt) / 55, 2);
  tiltEffect = Math.max(0.75, Math.min(1.05, tiltEffect));

  let sunAngleFactor = 1;

  let month = new Date().getMonth() + 1;
let winterBoost = (month <= 2 || month >= 11) ? 1.15 : 1;

if (hour < 10) {
  sunAngleFactor = (0.85 + (tilt / 90) * 0.3) * winterBoost;
} else if (hour > 16) {
  sunAngleFactor = (0.85 + (tilt / 90) * 0.3) * winterBoost;
}

  return tiltEffect * sunAngleFactor;
}
  
function temperatureEfficiency(t) {
  let f = 1 + ((t - 25) * -0.004);
  return Math.min(1.05, Math.max(0.8, f));
}

function daylightHours(radSlice) {
  return radSlice.filter(r => r > SOLAR_THRESHOLD);
}

function sunshineSplit(r,start){
  let morning=0, afternoon=0;

  for(let i=0;i<24;i++){
    if(r[start+i] > SOLAR_THRESHOLD){
      if(i < 12) morning++;
      else afternoon++;
    }
  }

  return {morning, afternoon};
}

function hourlySolarScore(c, r) {
  return Math.min(1, r / 1000);
}

function weightedCloudAverage(c, r, start){

  let sum = 0, wSum = 0;

  for(let i=0;i<24;i++){
    let radVal = r[start+i];

    if(radVal > SOLAR_THRESHOLD){
      let weight = radVal;

      sum += c[start+i] * weight;
      wSum += weight;
    }
  }

  if(wSum === 0) wSum = 1;

  return sum / wSum;
}

function cloudIntensityFactor(cloud, rad) {
  let cloudFactor = cloud / 100;

  // Thin cloud → strong boost (sun breaks)
  if (cloud < 30) {
    if (rad > 200) return 1.25;
    return 1.1;
  }

  // Medium cloud → balanced scaling
  if (cloud >= 30 && cloud <= 70) {
    return 0.85 + (rad / 1000) * 0.2;
  }

  // Thick cloud → strong reduction
  if (cloud > 70) {
    return 0.6 + (rad / 1000) * 0.1;
  }

  return 1;
}

function getCloudThicknessLabel(cloud, rad) {
  let radFactor = rad / 1000;

  let score = Math.pow(cloud / 100, 1.2) * (1 - Math.pow(radFactor, 0.7));

  // Normalize score to 0–1 range for UI
  let intensity = Math.min(1, Math.max(0, score));

  if (cloud < 30 && rad > 300) {
    return { label: "Thin / Broken Cloud ☁️", intensity };
  }

  if (cloud >= 30 && cloud <= 70) {
    return { label: "Moderate Cloud 🌥️", intensity };
  }

  if (cloud > 70) {
    return { label: "Thick Cloud ☁️☁️", intensity };
  }

  return { label: "Clear / Light Cloud ☀️", intensity: intensity * 0.5 };
}
  
function estimatePV(radSlice, cloudSlice, tempSlice, s) {

  let total = 0;

  for (let i = 0; i < 24; i++) {

    let r = radSlice[i];
    if (r < SOLAR_THRESHOLD) continue;

    let t = tempSlice[i] ?? 15;
    let c = cloudSlice[i];

    let hourPV =
      s.pvSize *
      (r / 1000) *
      (s.efficiency / 100) *
      temperatureEfficiency(t) *
      getOrientationFactor(s.orientation) *
      getTiltFactor(s.tilt, i) *
      (s.shading / 100) *
      cloudIntensityFactor(c, r);

    // inverter cap per hour
    hourPV = Math.min(hourPV, s.inverter);

    total += hourPV;
  }

  return total;
}



  
// -------------------- SOC --------------------
function recommendedSOC(pv, s){

  let shortfall = Math.max(0, s.dailyLoad - pv);

  let buffer = 1.15;
  if (shortfall > 5) buffer = 1.25;
  if (shortfall > 10) buffer = 1.35;

  let required = shortfall * buffer;

  let soc = (required / s.battery) * 100;

  if(soc < s.socLow) soc = s.socLow;
  if(soc > s.socHigh) soc = s.socHigh;

  return Math.round(soc);
}

function calculateChargePlan(pvForecast, s) {

  // ----------------------------
  // STEP 1: Base energy need
  // ----------------------------
  let shortfall = Math.max(0, s.dailyLoad - pvForecast);

  let buffer = 1.15;
  if (shortfall > 5) buffer = 1.25;
  if (shortfall > 10) buffer = 1.35;

  let requiredEnergy = shortfall * buffer;

  // ----------------------------
  // STEP 2: Battery constraint
  // ----------------------------
  let maxBatteryEnergy = s.battery;

  // ----------------------------
  // STEP 3: Inverter constraint
  // ----------------------------
  let chargeHours = 6; // typical overnight cheap window (adjustable later)

  let maxChargeFromInverter = s.inverter * chargeHours;

  // ----------------------------
  // STEP 4: TRUE maximum possible charge
  // ----------------------------
  let maxPossibleCharge = Math.min(maxBatteryEnergy, maxChargeFromInverter);

  // ----------------------------
  // STEP 5: Clamp required energy
  // ----------------------------
  let actualCharge = Math.min(requiredEnergy, maxPossibleCharge);

  // ----------------------------
  // STEP 6: Convert to SOC %
  // ----------------------------
  let soc = (actualCharge / s.battery) * 100;

  // Apply user limits
  if (soc < s.socLow) soc = s.socLow;
  if (soc > s.socHigh) soc = s.socHigh;

  return {
    soc: Math.round(soc),
    energy: actualCharge,
    capped: requiredEnergy > maxPossibleCharge
  };
}

function getChargeTimeWindow(energy, inverterPower) {
  if (!energy || energy <= 0) return "";

  let hoursNeeded = energy / inverterPower;

  // Anchor to cheap rate start (you can tweak this later)
  let start = new Date();
  start.setHours(3, 30, 0, 0); // 03:30 start

  let end = new Date(start.getTime() + hoursNeeded * 60 * 60 * 1000);

  let fmt = (d) =>
    d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  return `${fmt(start)} – ${fmt(end)}`;
}
  
function getSolarTimeRange(radSlice, timeSlice) {
  let startTime = null;
  let endTime = null;

  for (let i = 0; i < 24; i++) {
  if (radSlice[i] > SOLAR_VISIBLE_THRESHOLD) {
      if (startTime === null) {
        startTime = timeSlice[i];
      }
      endTime = timeSlice[i];
    }
  }

  if (!startTime || !endTime) return "No data";

  let start = new Date(startTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  let end = new Date(endTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  return `${start} – ${end}`;
}

function weatherSummary(c,r,t,h,p){
  return `
    🌤️ Cloud (daylight): ${c.toFixed(0)}%<br>
    ☀️ Radiation (daylight avg): ${r.toFixed(0)} W/m²<br>
    🌡️ Temp (daylight avg): ${t.toFixed(1)}°C<br>
    💧 Humidity (daylight avg): ${h.toFixed(0)}%<br>
    🌧️ Precip (daylight total): ${p.toFixed(2)} mm
  `;
}

// -------------------- MAIN --------------------
async function runAI(){

  let s=getSettings();
  loading.innerText="Loading...";
  let tomorrowSOCValue = null;
  let data = preloadedWeather || await getWeather(s.postcode);

  let cloud=data.hourly.cloudcover;
  let rad=data.hourly.shortwave_radiation;
  let temp=data.hourly.temperature_2m;
  let hum=data.hourly.relativehumidity_2m;
  let precip=data.hourly.precipitation;
  let time = data.hourly.time;

  let html = "";
let forecastHtml = "";

  // -------------------- LIVE NOW --------------------
let now = new Date();

// Find closest hour index
let nowIndex = time.findIndex(t => new Date(t) > now);
if (nowIndex <= 0) nowIndex = 0;
else nowIndex -= 1;

// Extract current conditions
let nowRad = rad[nowIndex];
let nowCloud = cloud[nowIndex];
let cloudInfo = getCloudThicknessLabel(nowCloud, nowRad); 
let nowTemp = temp[nowIndex];

// -------------------- LIVE PV ESTIMATE --------------------


// Convert radiation to PV output (kW)
let cloudFactorLive = cloudIntensityFactor(nowCloud, nowRad);

// stronger but still stable cloud response
let cloudFactorLiveSoft = 0.85 + (0.25 * (cloudFactorLive - 1));

// 🔧 radiation input (no change)
let hour = new Date().getHours();

// Radiation response curve (already good idea)
let radBoost = 0.9 + (0.2 * (1 - Math.exp(-nowRad / 400)));

let effectiveRad = nowRad * radBoost;

// cap AFTER adjustments
effectiveRad = Math.min(1000, effectiveRad);

let tiltFactor = getTiltFactor(s.tilt, hour);

let nowPV =
  s.pvSize *
  (effectiveRad / 1000) *
  (s.efficiency / 100) *
  temperatureEfficiency(nowTemp) *
  getOrientationFactor(s.orientation) *
  tiltFactor *
  (s.shading / 100) *
  cloudFactorLiveSoft;

// apply calibrated correction
  // raw physics model first
let rawNowPV = nowPV;
nowPV = applyCalibration(rawNowPV, "live");

// inverter cap
nowPV = Math.min(nowPV, s.inverter);
 
let status = "";

if (nowRad < 20) {
  status = "🌙 No solar → discharge or grid use";

} else if (nowPV < 0.3) {
  status = "🌥️ Very weak → minimal charging";

} else if (nowPV < 1) {
  status = "⚡ Low solar → partial charging";

} else if (nowPV < 3) {
  status = "☀️ Moderate solar → charging battery";

} else if (nowPV < s.inverter * 0.8) {
  status = "🔋 Strong solar → high charging";

} else if (nowPV < s.inverter) {
  status = "🚀 Near max → optimising export";

} else {
  status = "⚠️ Clipping zone → inverter limiting output";
}
  
// Format time nicely
let nowTimeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

// Build UI card
html += `
  <div class="card">
    <h3>☀️ Now (${nowTimeStr})</h3>

    <b>Radiation:</b> ${nowRad.toFixed(0)} W/m²<br>
    <b>Live PV:</b> ${nowPV.toFixed(2)} kW<br>
    <b>Cloud:</b> ${nowCloud.toFixed(0)}%<br>
    <b>Cloud Type:</b> ${cloudInfo.label}<br>

<div class="cloud-bar">
  <div class="cloud-bar-fill" style="width:${(Math.pow(cloudInfo.intensity, 0.7) * 100).toFixed(0)}%"></div>
</div>
    <b>Temp:</b> ${nowTemp.toFixed(1)}°C<br>
    <b>Effective Tilt:</b> ${getSeasonalTilt(s.tilt).toFixed(1)}°<br>

    <br><b>Status:</b> ${status}
  </div>
`;

 for (let d = 0; d < 3; d++) {

  let start = d * 24;

  let dayRad = daylightHours(rad.slice(start, start + 24));

  let avgRad = dayRad.length
    ? dayRad.reduce((a, b) => a + b) / dayRad.length
    : 0;

  let validHours = 0;
  let scoreSum = 0;

  for (let i = 0; i < 24; i++) {
    let rVal = rad[start + i];

    if (rVal > SOLAR_THRESHOLD) {
      scoreSum += hourlySolarScore(cloud[start + i], rVal);
      validHours++;
    }
  }

  let avgScore = validHours ? (scoreSum / validHours) : 0;

  let split = sunshineSplit(rad, start);

  let timeRange = getSolarTimeRange(
    rad.slice(start, start + 24),
    time.slice(start, start + 24)
  );

  let sun = split.morning + split.afternoon;

  let midTemp = temp[start + 12] ?? temp[start]; // safety fallback

  let cloudFactorDay = cloudIntensityFactor(
    weightedCloudAverage(cloud, rad, start),
    avgRad
  );
let cloudAvg = weightedCloudAverage(cloud, rad, start);

// smooth radiation stability (important!)
let radStd = 0;
let count = 0;
let mean = 0;

// quick variance estimate (cheap + stable)
for (let i = 0; i < 24; i++) {
  let r = rad[start + i];
  if (r > SOLAR_THRESHOLD) {
    mean += r;
    count++;
  }
}

mean = count ? mean / count : 0;

for (let i = 0; i < 24; i++) {
  let r = rad[start + i];
  if (r > SOLAR_THRESHOLD) {
    radStd += Math.pow(r - mean, 2);
  }
}

radStd = count ? Math.sqrt(radStd / count) : 0;

// normalize instability (0 = stable, 1 = chaotic)
let instability = Math.min(1, radStd / 400);

// cloud penalty (soft curve, not linear)
let cloudPenalty = Math.pow(cloudAvg / 100, 1.4);

// final confidence blend
let confidence =
  100 *
  (0.55 * (1 - cloudPenalty) +
   0.45 * (1 - instability));

// clamp
confidence = Math.max(35, Math.min(98, confidence));
let basePV = estimatePV(
  rad.slice(start, start + 24),
  cloud.slice(start, start + 24),
  temp.slice(start, start + 24),
  s
);

  // calibration
let rawPV = basePV;
let pv = applyCalibration(rawPV, "forecast");

// ✅ Store expected PV for today + tomorrow
let data = getPVData();

let date = new Date();
date.setDate(date.getDate() + d);

let key = getLocalDateKey(date);

storeExpectedPV(d, pv);

  // ✅ SOC calculation
  let risk = 1;

if (pv < 5) risk = 1.3;
else if (pv < 10) risk = 1.15;

let chargePlan = calculateChargePlan(pv * (1 / risk), s);
let soc = chargePlan.soc;

if (d === 1 && tomorrowSOCValue === null) {
  tomorrowSOCValue = {
    soc: chargePlan.soc,
    energy: chargePlan.energy,
    capped: chargePlan.capped
  };
}

  // Label
  let label = d === 0
  ? "Today"
  : d === 1
    ? "<span style='font-weight:bold'>Tomorrow</span>"
    : "The day after tomorrow";

  // Render card
  forecastHtml += `
    <div class="card">
      <h3>${label}</h3>

      ${weatherSummary(
        weightedCloudAverage(cloud, rad, start),
        avgRad,
        temp[start + 12] ?? temp[start],
        hum[start + 12] ?? hum[start],
        precip[start + 12] ?? precip[start]
      )}

      <br><b>🔆 Usable Solar Window:</b> ${sun} hours
      <br><b>⏱️ Time Range:</b> ${timeRange}

      <br><b>⚡ Estimated PV:</b> ${pv.toFixed(1)} kWh
<br><b>📊 Confidence:</b> ${confidence.toFixed(0)}%
    </div>
  `;
}

// -------------------- RENDER --------------------

loading.innerText = "";

// 1. Add SOC FIRST
html += `
  <div class="card">
    <h3>🔋 Tonight's Grid Charge Target</h3>

    <span style="color:red;font-weight:bold; font-size:18px;">
     ${
  tomorrowSOCValue !== null
    ? `
      ⚡ ${tomorrowSOCValue.energy.toFixed(1)} kWh charge
      <br>
      ⏱️ ${getChargeTimeWindow(tomorrowSOCValue.energy, s.inverter)}
      ${tomorrowSOCValue.capped ? "<br>⚠️ Limited by inverter/battery" : ""}
    `
    : "N/A"
}
    </span>
  </div>
`;

// 2. Then append forecast cards
html += forecastHtml;

output.innerHTML = html;
  
};
let currentEditDate = null;

function openEditor(date) {
  let data = getPVData();

  currentEditDate = date;

  document.getElementById("editDate").value = date;
  document.getElementById("editValue").value = data[date]?.manual || "";

  pvEditor.classList.remove("hidden");
}

function closeEditor() {
  pvEditor.classList.add("hidden");
  currentEditDate = null;
}

function saveEdit() {
  let data = getPVData();

  let newDate = document.getElementById("editDate").value;
 let value = parseFloat(document.getElementById("editValue").value);
if (isNaN(value)) value = undefined;

  if (!newDate) return alert("Pick a date");

  // move entry if date changed
  if (currentEditDate !== newDate) {
    if (data[newDate]) {
      alert("Date already exists");
      return;
    }
    data[newDate] = data[currentEditDate] || {};
    delete data[currentEditDate];
  }

if (value !== undefined) {

  let s = getSettings();

  let maxPV = Math.max(
    s.pvSize * 6,
    s.inverter * 8
  );

  if (value < 0 || value > maxPV) {
    alert(`Value must be between 0 and ${maxPV.toFixed(1)} kWh`);
    return;
  }

  data[newDate].manual = value;
} else {
  delete data[newDate].manual;
}

  savePVData(data);

// 🔥 force PV recalculation after manual entry
refreshExpectedPVAfterManualChange();

closeEditor();
renderPVTable();
runAI(); // optional but recommended
}

function deleteEdit() {
  if (!currentEditDate) return;

  let data = getPVData();
  delete data[currentEditDate];

  savePVData(data);

refreshExpectedPVAfterManualChange();

closeEditor();
renderPVTable();
runAI();
}
