<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input {
      padding: 8px;
      width: 180px;
      margin-bottom: 10px;
    }
    .hidden { display: none; }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="runAI()">Plan Next 3 Days</button>

<div id="settingsPanel" class="card hidden">
  <h3>Settings</h3>

  <label>Postcode:</label><br>
  <input id="postcode"><br>

  <label>PV Size (kWp):</label><br>
  <input id="pvSize" type="number"><br>

  <label>Inverter Size (kW):</label><br>
  <input id="inverter" type="number"><br>

  <label>Battery Capacity (kWh):</label><br>
  <input id="battery" type="number"><br>

  <label>Daily Load (kWh):</label><br>
  <input id="dailyLoad" type="number"><br>

  <label>Efficiency (%):</label><br>
  <input id="efficiency" type="number"><br>

  <label>SOC Low (%):</label><br>
  <input id="socLow" type="number"><br>

  <label>SOC High (%):</label><br>
  <input id="socHigh" type="number"><br>

  <button onclick="saveSettings()">Save</button>
</div>

<p id="loading"></p>
<div id="output"></div>

<script>

// -------------------- SETTINGS --------------------
function getSettings() {
  let s = JSON.parse(localStorage.getItem("settings") || "{}");

  return {
    postcode: s.postcode || "NR7 0WZ",
    pvSize: s.pvSize ?? 6.5,
    inverter: s.inverter ?? 5,
    battery: s.battery ?? 10.64,
    dailyLoad: s.dailyLoad ?? 10,
    efficiency: s.efficiency ?? 85,
    socLow: s.socLow ?? 20,
    socHigh: s.socHigh ?? 95
  };
}

function saveSettings() {
  let settings = {
    postcode: document.getElementById("postcode").value,
    pvSize: parseFloat(document.getElementById("pvSize").value),
    inverter: parseFloat(document.getElementById("inverter").value),
    battery: parseFloat(document.getElementById("battery").value),
    dailyLoad: parseFloat(document.getElementById("dailyLoad").value),
    efficiency: parseFloat(document.getElementById("efficiency").value),
    socLow: parseFloat(document.getElementById("socLow").value),
    socHigh: parseFloat(document.getElementById("socHigh").value)
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  alert("Saved");
  toggleSettings();
}

function loadSettingsToUI() {
  let s = getSettings();

  document.getElementById("postcode").value = s.postcode;
  document.getElementById("pvSize").value = s.pvSize;
  document.getElementById("inverter").value = s.inverter;
  document.getElementById("battery").value = s.battery;
  document.getElementById("dailyLoad").value = s.dailyLoad;
  document.getElementById("efficiency").value = s.efficiency;
  document.getElementById("socLow").value = s.socLow;
  document.getElementById("socHigh").value = s.socHigh;
}

function toggleSettings() {
  document.getElementById("settingsPanel").classList.toggle("hidden");
  loadSettingsToUI();
}

// -------------------- POSTCODE → COORDS --------------------
async function getCoordinates(postcode) {
  let res = await fetch(`https://api.postcodes.io/postcodes/${postcode}`);
  let data = await res.json();

  if (data.status !== 200) {
    alert("Invalid postcode");
    throw new Error("Postcode lookup failed");
  }

  return {
    lat: data.result.latitude,
    lon: data.result.longitude
  };
}

// -------------------- WEATHER --------------------
async function getWeather(postcode) {

  let coords = await getCoordinates(postcode);

  let res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto`
  );

  return await res.json();
}

// -------------------- TEMP EFF --------------------
function temperatureEfficiency(temp) {
  const nominalTemp = 25;
  const coef = -0.004;

  let factor = 1 + ((temp - nominalTemp) * coef);
  return Math.min(1.05, Math.max(0.8, factor));
}

// -------------------- SOLAR SCORE --------------------
function hourlySolarScore(cloud, radiation) {
  return Math.min(1, Math.max(0,
    (1 - cloud / 100) * 0.6 + (radiation / 1000) * 0.4
  ));
}

// -------------------- SUNSHINE --------------------
function calculateSunshineHours(radiation, start) {
  let h = 0;
  for (let i = start; i < start + 24; i++) {
    if (radiation[i] > 120) h++;
  }
  return h;
}

// -------------------- CLOUD WEIGHT --------------------
function weightedCloudAverage(cloud, start) {
  let sum = 0, weight = 0;

  for (let i = 0; i < 24; i++) {
    let w = Math.exp(-Math.pow((i - 12) / 6, 2));
    sum += cloud[start + i] * w;
    weight += w;
  }

  return sum / weight;
}

// -------------------- PV --------------------
function estimatePV(avgScore, sunshine, temp, s) {
  let raw = s.pvSize * sunshine * avgScore * (s.efficiency / 100) * temperatureEfficiency(temp);
  let limit = s.inverter * sunshine;
  return Math.min(raw, limit);
}

// -------------------- SOC --------------------
function recommendedSOC(pv, s) {
  let shortfall = Math.max(0, s.dailyLoad - pv);
  let required = shortfall * 1.2;
  let soc = (required / s.battery) * 100;

  if (soc < s.socLow) soc = s.socLow;
  if (soc > s.socHigh) soc = s.socHigh;

  return Math.round(soc);
}

// -------------------- WEATHER UI --------------------
function weatherSummary(cloud, rad, temp, hum, precip) {
  return `
    🌤️ Cloud: ${cloud.toFixed(0)}%<br>
    ☀️ Radiation: ${rad.toFixed(0)} W/m²<br>
    🌡️ Temp (midday): ${temp.toFixed(1)}°C<br>
    💧 Humidity: ${hum.toFixed(0)}%<br>
    🌧️ Precip: ${precip.toFixed(2)} mm
  `;
}

// -------------------- MAIN --------------------
async function runAI() {

  let s = getSettings();

  document.getElementById("loading").innerText = "Loading...";

  let data = await getWeather(s.postcode);

  let cloud = data.hourly.cloudcover;
  let rad = data.hourly.shortwave_radiation;
  let temp = data.hourly.temperature_2m;
  let hum = data.hourly.relativehumidity_2m;
  let precip = data.hourly.precipitation;

  let html = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;

    let weightedCloud = weightedCloudAverage(cloud, start);

    let avgRad = rad.slice(start, start+24).reduce((a,b)=>a+b)/24;

    let scores = rad.slice(start, start+24)
      .map((r,i)=>hourlySolarScore(cloud[start+i], r));

    let avgScore = scores.reduce((a,b)=>a+b)/scores.length;

    let sunshine = calculateSunshineHours(rad, start);
    let middayTemp = temp[start+12];

    let pv = estimatePV(avgScore, sunshine, middayTemp, s);
    let soc = recommendedSOC(pv, s);

    let label = d===0?"Today":d===1?"Tomorrow":"The day after tomorrow";
    let style = d===1?"style='color:red;font-weight:bold;font-size:20px'":"";

    html += `
      <div class="card">
        <h3>${label}</h3>
        ${weatherSummary(weightedCloud, avgRad, middayTemp, hum[start+12], precip[start+12])}
        <br><b>🌞 Sunshine Hours:</b> ${sunshine}
        <br><b>⚡ Estimated PV:</b> ${pv.toFixed(1)} kWh
        <br><span ${style}>🔋 Recommended SOC: ${soc}%</span>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
  document.getElementById("loading").innerText = "";
}

</script>

</body>
</html>
