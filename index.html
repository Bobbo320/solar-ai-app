<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Season Aware)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }

    .footer {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro (Season Aware)</h2>

<div class="card">
📍 <b>Location:</b><br>
NR7 0WZ (Norwich, UK)<br>
<small>Lat: 52.627 | Lon: 1.331</small>
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<p id="loading"></p>
<div id="output"></div>

<div class="footer">
<b>📊 Solar Score Meaning:</b><br><br>
🔥 85–100% → Excellent<br>
👍 65–85% → Good<br>
⚖️ 45–65% → Moderate<br>
⚠️ &lt;45% → Low solar<br>
</div>

<script>

const LAT = 52.627;
const LON = 1.331;

// -----------------------------
// Monthly Calibration Storage
// -----------------------------
function getMonthlyCalibration() {
  return JSON.parse(localStorage.getItem("monthlyCalibration")) || {};
}

function setMonthlyCalibration(data) {
  localStorage.setItem("monthlyCalibration", JSON.stringify(data));
}

function getMonthKey(dateStr) {
  return new Date(dateStr).getMonth() + 1;
}

function getCalibrationForDate(dateStr) {
  let calMap = getMonthlyCalibration();
  let month = getMonthKey(dateStr);
  return calMap[month] || 1;
}

// -----------------------------
// Sun Elevation
// -----------------------------
function sunElevation(date, lat, lon) {
  const rad = Math.PI / 180;

  let day = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  let decl = 23.45 * Math.sin(rad * (360 * (284 + day) / 365));

  let hour = date.getHours() + date.getMinutes() / 60;
  let solarTime = hour + (lon / 15);
  let hourAngle = 15 * (solarTime - 12);

  let elevation = Math.asin(
    Math.sin(lat * rad) * Math.sin(decl * rad) +
    Math.cos(lat * rad) * Math.cos(decl * rad) * Math.cos(hourAngle * rad)
  ) / rad;

  return Math.max(0, elevation);
}

// -----------------------------
// Seasonal SOC Logic
// -----------------------------
function seasonalSOCRecommendation(avgScore, maxElevation, date) {

  let month = new Date(date).getMonth() + 1;

  let seasonalWeight;

  if (month <= 2 || month === 12) {
    seasonalWeight = 0.9; // Winter
  } else if (month <= 5) {
    seasonalWeight = 0.6; // Spring
  } else if (month <= 8) {
    seasonalWeight = 0.3; // Summer
  } else {
    seasonalWeight = 0.5; // Autumn
  }

  let elevationFactor = maxElevation / 60;
  elevationFactor = Math.min(1, Math.max(0, elevationFactor));

  let adjustedScore =
    (avgScore * 0.6) +
    (elevationFactor * 0.2) +
    ((1 - seasonalWeight) * 0.2);

  let soc = 100 - (adjustedScore * 60);

  soc = Math.min(95, Math.max(20, soc));

  return Math.round(soc) + "%";
}

// -----------------------------
// Solar scoring
// -----------------------------
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;

  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

// -----------------------------
// Weather summary
// -----------------------------
function weatherSummary(avgCloud, avgRad, avgTemp) {
  if (avgCloud < 20 && avgRad > 600) {
    return "☀️ Clear skies with strong solar radiation.";
  }
  if (avgCloud < 40 && avgRad > 400) {
    return "🌤️ Mostly sunny with some cloud.";
  }
  if (avgCloud < 70) {
    return "⛅ Mixed cloud cover.";
  }
  return "☁️ Heavy cloud cover.";
}

// -----------------------------
// Main AI function
// -----------------------------
async function runAI() {

  try {

    document.getElementById("loading").innerText = "Loading forecast...";

    let res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation&forecast_days=3&timezone=auto"
    );

    let data = await res.json();

    let times = data.hourly.time;
    let cloud = data.hourly.cloudcover;
    let radiation = data.hourly.shortwave_radiation;
    let temp = data.hourly.temperature_2m;

    let output = "";

    for (let d = 0; d < 3; d++) {

      let dayStart = d * 24;

      let scores = [];
      let cloudVals = [];
      let radVals = [];
      let tempVals = [];

      for (let h = dayStart; h < dayStart + 24; h++) {

        let date = new Date(times[h]);
        let hour = date.getHours();

        if (hour >= 10 && hour <= 15) {

          let elevation = sunElevation(date, LAT, LON);
          let sunFactor = Math.sin(elevation * Math.PI / 180);

          let baseScore = hourlySolarScore(cloud[h], radiation[h]);
          let adjustedScore = baseScore * sunFactor;

          scores.push(adjustedScore);
          cloudVals.push(cloud[h]);
          radVals.push(radiation[h]);
          tempVals.push(temp[h]);
        }
      }

      let avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;
      if (isNaN(avgScore)) avgScore = 0;

      let avgCloud = cloudVals.reduce((a,b)=>a+b,0) / cloudVals.length;
      let avgRad = radVals.reduce((a,b)=>a+b,0) / radVals.length;
      let avgTemp = tempVals.reduce((a,b)=>a+b,0) / tempVals.length;

      let dateObj = new Date(times[dayStart]);
      let maxElevation = 0;

      for (let h = 0; h < 24; h++) {
        let d2 = new Date(dateObj);
        d2.setHours(h);
        let elev = sunElevation(d2, LAT, LON);
        if (elev > maxElevation) maxElevation = elev;
      }

      let percent = (avgScore * 100).toFixed(0);

      let soc = seasonalSOCRecommendation(avgScore, maxElevation, dateObj);

      output += `
        <div class="card">
          <b>Day ${d === 0 ? "Today" : d === 1 ? "Tomorrow" : "Day +2"}</b><br><br>

          🌤️ Weather: ${weatherSummary(avgCloud, avgRad, avgTemp)}<br><br>

          ⚡ Solar Score: ${percent}%<br>
          ☀️ Max Sun Elevation: ${maxElevation.toFixed(1)}°<br><br>

          🌡️ Temp: ${avgTemp.toFixed(1)}°C<br>
          ☁️ Cloud: ${avgCloud.toFixed(0)}%<br>
          ☀️ Radiation: ${avgRad.toFixed(0)} W/m²<br><br>

          🔋 Recommended SOC: <b>${soc}</b><br>
        </div>
      `;
    }

    document.getElementById("output").innerHTML = output;
    document.getElementById("loading").innerText = "";

  } catch (err) {
    document.getElementById("output").innerHTML = "Error loading data";
    document.getElementById("loading").innerText = "";
  }
}

</script>

</body>
</html>
