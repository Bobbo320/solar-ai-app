<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Aligned)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input {
      padding: 8px;
      width: 160px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro (Aligned System)</h2>

<div class="card">
📍 <b>Location:</b><br>
NR7 0WZ (Norwich, UK)
</div>

<div class="card">
  <b>⚙️ System Config</b><br><br>

  ☀️ PV: 6.5 kWp<br>
  ⚡ Inverter: 5 kW<br>
  🔋 Battery: 10.64 kWh<br>
</div>

<div class="card">
  <b>📥 Add Daily PV Data</b><br><br>

  <label>Date:</label><br>
  <input id="pvDate" type="date"><br><br>

  <label>PV (kWh):</label><br>
  <input id="pvInput" type="number"><br><br>

  <button onclick="savePV()">Save PV</button>
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<p id="loading"></p>
<div id="output"></div>

<script>

/* ---------------- SYSTEM ---------------- */

const system = {
  pvSize: 6.5,        // kWp
  inverter: 5,        // kW
  battery: 10.64      // kWh
};

/* ---------------- STORAGE ---------------- */

function getPVHistory() {
  return JSON.parse(localStorage.getItem("pvHistory") || "[]");
}

function savePV() {
  let pv = parseFloat(document.getElementById("pvInput").value);
  let date = document.getElementById("pvDate").value;

  if (!date || isNaN(pv)) return alert("Enter valid data");

  let history = getPVHistory();
  history.push({ date, kwh: pv });

  localStorage.setItem("pvHistory", JSON.stringify(history));

  alert("Saved PV");
}

/* ---------------- CALIBRATION ---------------- */

function getCalibrationFactorFromHistory(dayScoresMap) {

  let history = getPVHistory();
  let factors = [];

  history.forEach(entry => {
    let score = dayScoresMap[entry.date];
    if (score && score > 0) {
      factors.push(entry.kwh / score);
    }
  });

  if (factors.length === 0) return 50;

  return factors.reduce((a,b)=>a+b,0)/factors.length;
}

/* ---------------- SOLAR MODEL ---------------- */

function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;
  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

/* ---------------- SOC MODEL ---------------- */

function calculateSOC(predictedPV) {

  let currentSOC = 50; // assumed starting SOC
  let load = 8;        // estimated daily consumption (kWh)

  let net = predictedPV - load;

  let soc = currentSOC + (net / system.battery) * 100;

  return Math.min(100, Math.max(0, soc));
}

/* ---------------- MAIN ---------------- */

async function runAI() {

  document.getElementById("loading").innerText = "Loading...";

  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,windspeed_10m,precipitation&forecast_days=3&timezone=auto"
  );

  let data = await res.json();

  let times = data.hourly.time;
  let cloud = data.hourly.cloudcover;
  let radiation = data.hourly.shortwave_radiation;

  let output = "";
  let dayScoresMap = {};

  /* ---------------- SCORE BUILD ---------------- */

  for (let d = 0; d < 3; d++) {

    let dayStart = d * 24;
    let scores = [];

    for (let h = dayStart; h < dayStart + 24; h++) {

      let date = new Date(times[h]);
      let hour = date.getHours();

      if (hour >= 10 && hour <= 15) {

        let baseScore = hourlySolarScore(cloud[h], radiation[h]);
        scores.push(baseScore);
      }
    }

    let avgScore = scores.reduce((a,b)=>a+b,0)/scores.length || 0;

    let dateKey = new Date(times[dayStart]).toISOString().split("T")[0];
    dayScoresMap[dateKey] = avgScore;
  }

  let calibrationFactor = getCalibrationFactorFromHistory(dayScoresMap);

  /* ---------------- OUTPUT ---------------- */

  for (let d = 0; d < 3; d++) {

    let dayStart = d * 24;
    let dateKey = new Date(times[dayStart]).toISOString().split("T")[0];

    let scores = [];

    for (let h = dayStart; h < dayStart + 24; h++) {
      let hour = new Date(times[h]).getHours();
      if (hour >= 10 && hour <= 15) {
        scores.push(hourlySolarScore(cloud[h], radiation[h]));
      }
    }

    let avgScore = scores.reduce((a,b)=>a+b,0)/scores.length || 0;

    // 🔋 PV prediction aligned to real system
    let predictedPV = avgScore * system.pvSize * calibrationFactor;

    // ⚡ inverter clipping effect (approx)
    let inverterLimit = system.inverter * 6; // daily equivalent cap
    predictedPV = Math.min(predictedPV, inverterLimit);

    let soc = calculateSOC(predictedPV);

    let isTomorrow = (d === 1);

    output += `
      <div class="card">
        <b>${d === 0 ? "Today" : d === 1 ? "Tomorrow" : "Day +2"}</b><br><br>

        ⚡ Solar Score: ${(avgScore*100).toFixed(0)}%<br>
        🔋 Expected PV: ${predictedPV.toFixed(1)} kWh<br><br>

        🔋 Recommended SOC:<br><br>

        <div style="
          font-weight:bold;
          font-size:${isTomorrow ? '28px' : '18px'};
          color:${isTomorrow ? 'red' : 'limegreen'};
          background:${isTomorrow ? '#1f2937' : 'transparent'};
          padding:${isTomorrow ? '10px' : '0'};
          border-radius:8px;
          display:inline-block;
        ">
          ${soc.toFixed(0)}%
        </div>

      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText = "";
}

</script>

</body>
</html>
