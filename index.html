<script>

const SOLAR_THRESHOLD = 50;        // used for real PV calculations
const SOLAR_VISIBLE_THRESHOLD = 30; // used for solar time window display
  const SYSTEM_LOSS = 0.98; // wiring, inverter, mismatch
let GLOBAL_PV_BIAS_LIVE = 1;
let GLOBAL_PV_BIAS_FORECAST = 1;
let LIVE_ADJUSTMENT = 1;
let preloadedWeather = null;
  
function getLocalDateKey(d = new Date()) {
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000)
    .toISOString()
    .split("T")[0];
}
// -------------------- PV DATA + AUTO TUNING --------------------

function getPVData() {
  return JSON.parse(localStorage.getItem("pvData") || "{}");
}

function savePVData(data) {
  localStorage.setItem("pvData", JSON.stringify(data));
}
function shouldUpdateExpectedPV() {
  const hour = new Date().getHours();

  // allow early-day creation, refine later
  return hour >= 10; // 10am+ improves forecast stability
}
function togglePVTab() {
  pvPanel.classList.toggle("hidden");
  renderPVTable();
}

function storeExpectedPV(dayIndex, pvValue) {
  let data = getPVData();

  let date = new Date();
  date.setDate(date.getDate() + dayIndex);

  let key = getLocalDateKey(date);

  if (!data[key]) data[key] = {};

  // NEVER overwrite manual data
  if (data[key].manual !== undefined) return;

  // ALWAYS allow refresh if no manual override exists
  let existing = data[key].expected;

  if (existing === undefined) {
    data[key].expected = pvValue;
  } else {
    // FULL REFRESH MODEL (not damped blending anymore)
    data[key].expected = pvValue;
  }

  savePVData(data);
}

function refreshExpectedPVAfterManualChange() {
  let data = getPVData();

  let today = new Date();

  for (let d = 0; d < 2; d++) {
    let date = new Date(today);
    date.setDate(today.getDate() + d);

    let key = getLocalDateKey(date);

    if (!data[key]) data[key] = {};

    // ONLY refresh expected if no manual override exists
    if (data[key].manual === undefined) {
      delete data[key].expected;
    }
  }

  savePVData(data);
}

function rebuildExpectedPVForWindow(pvToday) {
  let data = getPVData();

  let today = new Date();

  for (let d = 0; d < 2; d++) {

    let date = new Date(today);
    date.setDate(today.getDate() + d);

    let key = getLocalDateKey(date);

    if (!data[key]) data[key] = {};

    // NEVER touch manual entries
    if (data[key].manual !== undefined) continue;

    // SHIFT LOGIC:
    // tomorrow inherits today adjusted expectation
    if (d === 1) {
      let todayVal = pvToday || data[getLocalDateKey(today)]?.expected || 0;

      let cal = getCalibrationSystem();

      let adjusted = todayVal * (cal.bias * cal.seasonalFactor);

      data[key].expected = adjusted;
    }
  }

  savePVData(data);
}
  
function getCalibrationSystem() {
  let pvData = getPVData();
  let today = new Date();

  let weightedManual = 0;
  let weightedExpected = 0;

  let seasonal = {
    winter: { m: 0, e: 0 },
    spring: { m: 0, e: 0 },
    summer: { m: 0, e: 0 },
    autumn: { m: 0, e: 0 }
  };

  Object.keys(pvData).forEach(date => {
    let row = pvData[date];
    if (!row.expected || !row.manual) return;

    let entryDate = new Date(date);
    let diffDays = (today - entryDate) / 86400000;

    // allow forward + backward smoothing window
if (diffDays < -1 || diffDays > 90) return;

    let ratio = row.manual / row.expected;
    if (ratio < 0.3 || ratio > 1.7) return;
    if (row.expected < 1) return;

    let weight = Math.pow(row.expected, 1.2);

    weightedManual += row.manual * weight;
    weightedExpected += row.expected * weight;

    let month = entryDate.getMonth() + 1;

    let season =
      (month <= 2 || month === 12) ? "winter" :
      (month <= 5) ? "spring" :
      (month <= 8) ? "summer" : "autumn";

    seasonal[season].m += row.manual * weight;
    seasonal[season].e += row.expected * weight;
  });

  let bias = weightedExpected
    ? weightedManual / weightedExpected
    : 1;

  bias = Math.max(0.75, Math.min(1.25, bias));

  let month = new Date().getMonth() + 1;

  let currentSeason =
    (month <= 2 || month === 12) ? "winter" :
    (month <= 5) ? "spring" :
    (month <= 8) ? "summer" : "autumn";

  let s = seasonal[currentSeason];
  let seasonalFactor = s.e > 0 ? (s.m / s.e) : 1;

  seasonalFactor = Math.max(0.85, Math.min(1.15, seasonalFactor));

  let sampleSize = Object.values(pvData)
    .filter(d => d.manual && d.expected)
    .length;

  let confidence = Math.min(1, sampleSize / 20);

  return {
    bias,
    seasonalFactor,
    confidence
  };
}

function applyCalibration(raw, mode = "live") {

  let { bias, seasonalFactor, confidence } = getCalibrationSystem();

  // combine layers
  let combined = bias * seasonalFactor;

  // ---------------------------
  // RESPONSIVENESS MODEL (NEW CORE IDEA)
  // ---------------------------
  let strength;

  if (mode === "live") {
    strength = 0.25;   // stable, avoids noise chasing
  } else if (mode === "forecast") {
    strength = 0.60;   // allows learning from trends
  } else {
    strength = 0.40;
  }

  // reduce effect when data is weak
 strength *= (0.7 + 0.3 * confidence);

  // blend toward 1 (neutral baseline)
  let corrected = 1 + (combined - 1) * strength;

  // hard safety clamp
corrected = Math.max(0.95, Math.min(1.25, corrected));

  return raw * corrected;
}
  
function renderPVTable() {
  let data = getPVData();
  let tbody = document.getElementById("pvTable");
  tbody.innerHTML = "";

  let mode = document.getElementById("pvViewMode")?.value || "today";

  let today = new Date();
  let todayStr = getLocalDateKey(new Date());

  Object.keys(data)
  .sort(function (a, b) {
    return new Date(a) - new Date(b);
  })
  .forEach(function (date) {

      let include = false;
      let entryDate = new Date(date);

      if (mode === "today") {
        include = (date === todayStr);
      }

      if (mode === "7days") {
        let diff = (today - entryDate) / (1000 * 60 * 60 * 24);
        include = diff >= 0 && diff <= 7;
      }

      if (mode === "all") {
        include = true;
      }

      if (!include) return;

      let row = data[date];

      let tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${date}</td>
        <td>${row.expected ? row.expected.toFixed(1) : "-"}</td>
        <td>${row.manual ? row.manual.toFixed(1) : "-"}</td>
        <td>
          <button onclick="openEditor('${date}')">Edit</button>
          <button onclick="deletePVRow('${date}')">Delete</button>
        </td>
      `;

      tbody.appendChild(tr);
    });

  let { bias, seasonalFactor } = getCalibrationSystem();
  document.getElementById("calFactor").innerText =
    (bias * seasonalFactor).toFixed(2);
}


function deletePVRow(date) {
  let data = getPVData();
  delete data[date];
  savePVData(data);

refreshExpectedPVAfterManualChange();
rebuildExpectedPVForWindow();

renderPVTable();
runAI();
}

}

cheapEnd.value = s.cheapEnd;

// -------------------- CACHE --------------------
function getCache(key) {
  return JSON.parse(localStorage.getItem(key) || "null");
}

function setCache(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

// -------------------- PRELOAD --------------------
async function preloadWeather() {
  try {
    let s = getSettings();
    preloadedWeather = await getWeather(s.postcode);
  } catch {}
}

// -------------------- GEOCODING --------------------
async function getCoordinates(postcode) {
  try {
    let cacheKey = "coords_" + postcode;
    let cached = getCache(cacheKey);

    if (cached) return cached;

 let res = await fetch(
  `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(postcode)}&count=1`
);

let geo = await res.json();

if (!geo.results || geo.results.length === 0) throw new Error();

let coords = {
  lat: geo.results[0].latitude,
  lon: geo.results[0].longitude
};

    setCache(cacheKey, coords);
    return coords;

  } catch {
    return { lat: 52.6309, lon: 1.2974 };
  }
}

// -------------------- WEATHER --------------------
async function getWeather(postcode) {
  try {
    let cacheKey = "weather_" + postcode;
    let cached = getCache(cacheKey);
    let now = Date.now();

    if (cached && (now - cached.timestamp < 1800000)) {
      return cached.data;
    }

    let c = await getCoordinates(postcode);

    let res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&hourly=cloudcover,temperature_2m,shortwave_radiation,direct_radiation,diffuse_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto`
    );

    let data = await res.json();

    if (!data.hourly.direct_radiation) {
      data.hourly.direct_radiation = data.hourly.shortwave_radiation;
    }

    if (!data.hourly.diffuse_radiation) {
      data.hourly.diffuse_radiation =
        data.hourly.shortwave_radiation.map(v => v * 0.3);
    }

    setCache(cacheKey, { timestamp: now, data });
    return data;

  } catch {
    return {
      hourly: {
        cloudcover: new Array(72).fill(50),
        shortwave_radiation: new Array(72).fill(200),
        temperature_2m: new Array(72).fill(15),
        relativehumidity_2m: new Array(72).fill(70),
        precipitation: new Array(72).fill(0),
        direct_radiation: new Array(72).fill(200),
        diffuse_radiation: new Array(72).fill(60),
        time: new Array(72).fill(new Date().toISOString())
      }
    };
  }
}

// -------------------- SOLAR --------------------
function getOrientationFactor(o) {
  if (o==="south") return 1;
  if (o==="se_sw") return 0.92;
  if (o==="east_west") return 0.85;
  if (o==="north") return 0.65;
  return 1;
}

function extractDay(weather, dayIndex) {
  const start = dayIndex * 24;

  return {
    rad: weather.hourly.shortwave_radiation.slice(start, start + 24),
    cloud: weather.hourly.cloudcover.slice(start, start + 24),
    temp: weather.hourly.temperature_2m.slice(start, start + 24),
    dni: weather.hourly.direct_radiation.slice(start, start + 24),
    dhi: weather.hourly.diffuse_radiation.slice(start, start + 24)
  };
}

function lowLightFactor(rad) {
  if (rad < 150) return 0.85 + (rad / 150) * 0.15;
  return 1;
}
  
function getForecastRadScale(r) {
  // smoother UK-realistic curve
  if (r < 80) return 1.6;
  if (r < 200) return 1.6 + (r - 80) * 0.004;
  if (r < 500) return 2.1 + (r - 200) * 0.0022;
  return 2.75;
}

function getEffectiveIrradiance(dni, dhi, tiltFactor) {
  return (dni * tiltFactor) + dhi;
}
  
function cloudFactorForecast(cloud, rad) {

  // reduce aggressive stacking with radiation
  let cloudNorm = cloud / 100;

  // radiation already contains cloud effects from API → soften impact
  let radWeight = Math.min(1, rad / 500);

  let factor = 1 - cloudNorm * (0.6 - 0.3 * radWeight);

  // light cloud boost realism
  if (cloud < 30 && rad > 250) {
    factor *= 1.08;
  }

  return Math.max(0.65, Math.min(1.08, factor));
}
// -------------------- SEASONAL TILT --------------------
 
function getSeasonalTilt(baseTilt) {
  let s = getSettings();
  if (s.seasonalTilt === "off") return baseTilt;

  const now = new Date(); // ✅ FIX: define now locally

  let start = new Date(now.getFullYear(), 0, 0);
  let diff = now - start;
  let day = Math.floor(diff / (1000 * 60 * 60 * 24));

  let winterTilt = Math.min(60, baseTilt + 20);
  let summerTilt = Math.max(15, baseTilt - 15);

  let seasonalFactor =
    (Math.cos((2 * Math.PI * (day - 172)) / 365) + 1) / 2;

  return summerTilt * (1 - seasonalFactor) + winterTilt * seasonalFactor;
}

function getTiltFactor(baseTilt, hour) {
  // Approximate sun position curve (UK-friendly heuristic)

  // 1 = noon peak, 0 = night
  const timeFactor = Math.max(
    0,
    Math.cos(((hour - 12) / 12) * Math.PI)
  );

  // optimal UK panel tilt ~30–40°
  const optimalTilt = 35;

  // penalty for being too far from optimal tilt
  const tiltPenalty =
    1 - Math.min(0.25, Math.abs(baseTilt - optimalTilt) * 0.005);

  return timeFactor * tiltPenalty;
}
  
function temperatureEfficiency(t) {
  let f = 1 + ((t - 25) * -0.004);
  return Math.min(1.05, Math.max(0.8, f));
}

function daylightHours(radSlice) {
  return radSlice.filter(r => r > SOLAR_THRESHOLD);
}

function sunshineSplit(r,start){
  let morning=0, afternoon=0;

  for(let i=0;i<24;i++){
    if(r[start+i] > SOLAR_THRESHOLD){
      if(i < 12) morning++;
      else afternoon++;
    }
  }

  return {morning, afternoon};
}

function hourlySolarScore(c, r) {
  return Math.min(1, r / 1000);
}

function weightedCloudAverage(c, r, start){

  let sum = 0, wSum = 0;

  for(let i=0;i<24;i++){
    let radVal = r[start+i];

    if(radVal > SOLAR_THRESHOLD){
      let weight = radVal;

      sum += c[start+i] * weight;
      wSum += weight;
    }
  }

  if(wSum === 0) wSum = 1;

  return sum / wSum;
}

function cloudIntensityFactor(cloud, rad) {
  let cloudFactor = cloud / 100;

  // Thin cloud → strong boost (sun breaks)
  if (cloud < 30) {
    if (rad > 200) return 1.25;
    return 1.1;
  }

  // Medium cloud → balanced scaling
  if (cloud >= 30 && cloud <= 70) {
   return 0.90 + (rad / 1000) * 0.25;
  }

  // Thick cloud → strong reduction
  if (cloud > 70) {
    return 0.6 + (rad / 1000) * 0.1;
  }

  return 1;
}

function getCloudThicknessLabel(cloud, rad) {
  let radFactor = rad / 1000;

  let score = Math.pow(cloud / 100, 1.2) * (1 - Math.pow(radFactor, 0.7));

  // Normalize score to 0–1 range for UI
  let intensity = Math.min(1, Math.max(0, score));

  if (cloud < 30 && rad > 300) {
    return { label: "Thin / Broken Cloud ☁️", intensity };
  }

  if (cloud >= 30 && cloud <= 70) {
    return { label: "Moderate Cloud 🌥️", intensity };
  }

  if (cloud > 70) {
    return { label: "Thick Cloud ☁️☁️", intensity };
  }

  return { label: "Clear / Light Cloud ☀️", intensity: intensity * 0.5 };
}

function inverterLimit(pv, inverter) {
  const overload = pv / inverter;

  if (overload <= 1) return pv;

  return inverter * (1 + Math.tanh(overload - 1) * 0.2);
}
  
function estimatePV(radSlice, cloudSlice, tempSlice, s, dayData) {

  let total = 0;

  for (let i = 0; i < 24; i++) {

    let r = radSlice[i];
    if (r < SOLAR_THRESHOLD) continue;
    let t = tempSlice[i] ?? 15;
    let c = cloudSlice[i];

    let dni = dayData?.dni?.[i] ?? scaledRad;
let dhi = dayData?.dhi?.[i] ?? scaledRad * 0.35;

   let effectiveRad = getEffectiveIrradiance(
  dni,
  dhi,
  getTiltFactor(s.tilt, i)
);
    effectiveRad = Math.min(1100, effectiveRad);

let hourPV =
  s.pvSize *
  (effectiveRad / 1000) *
  (s.efficiency / 100) *
  SYSTEM_LOSS *
  temperatureEfficiency(t) *
  getOrientationFactor(s.orientation) *
  getTiltFactor(s.tilt, i) *
  (s.shading / 100);

hourPV = inverterLimit(hourPV, s.inverter);

    total += hourPV;
  }

  return total;
}
function getNightLoadProfile(s) {
  const total = s.dailyLoad;

  // Night window split (2200–0600 = 8 hours)
  const nightStart = 22;
  const nightEnd = 6;

  const nightHours = 8;

  // 2% per hour overnight baseline (your rule)
  const nightTotal = total * 0.16; // 8 * 2%

  const nightPerHour = nightTotal / nightHours;

  return {
    hourly: nightPerHour,
    total: nightTotal
  };
}

  
// -------------------- SOC --------------------
function recommendedSOC(pv, s){

  let shortfall = Math.max(0, s.dailyLoad - pv);

  let buffer = 1.15;
  if (shortfall > 5) buffer = 1.25;
  if (shortfall > 10) buffer = 1.35;

  let required = shortfall * buffer;

  let soc = (required / s.battery) * 100;


  return Math.round(soc);
}

function getHourlyLoad(s, hour = new Date().getHours()) {
  const total = s.dailyLoad;

  // Night: 2200–0600 (reduced usage)
  if (hour >= 22 || hour < 6) {
    return (total * 0.16) / 8;
  }

  // Evening peak 1600–1900 = 30%
  if (hour >= 16 && hour < 19) {
    return (total * 0.30) / 3;
  }

  // Remaining daytime (rebalanced)
  const night = total * 0.16;
  const evening = total * 0.30;
  const rest = total - night - evening;

  const restHours = 24 - 8 - 3; // 13 hours

  return rest / restHours;
}

  function calculateExport(pvKW, loadKW, soc, s) {

  const batteryFull = soc >= s.socHigh;

  if (!batteryFull) return 0;

  const surplus = pvKW - loadKW;

  return Math.max(0, surplus);
}
  
function calculateChargePlan(pvForecast, s, confidence) {

  // ----------------------------
  // STEP 1: BASE ENERGY DEMAND
  // ----------------------------
// ----------------------------
// FIXED LOAD + TOU MODEL
// ----------------------------

// total daily load
let loadDaily = s.dailyLoad;

// split energy (still your idea, but not double-counted)
let nightEnergy = s.dailyLoad * 0.16;
let eveningEnergy = s.dailyLoad * 0.30;

// base comparison (PV vs total demand)
let baseShortfall = Math.max(0, loadDaily - pvForecast);

// TOU urgency weighting (NOT extra energy subtraction)
let touPenalty =
  (nightEnergy * 0.6) +
  (eveningEnergy * 0.3);

// final required energy
let shortfall = baseShortfall + touPenalty;
  let buffer = 1.15;
  if (shortfall > 5) buffer = 1.25;
  if (shortfall > 10) buffer = 1.35;

  let requiredEnergy = shortfall * buffer;

// ----------------------------
// SINGLE UNCERTAINTY MODEL (FIX)
// prevents double/triple penalisation
// ----------------------------

let uncertaintyFactor =
  0.9 + (1 - confidence / 100) * 0.25;

// clamp safety
uncertaintyFactor = Math.max(0.85, Math.min(1.15, uncertaintyFactor));

requiredEnergy *= uncertaintyFactor;

  // ----------------------------
  // STEP 2: HARD SYSTEM LIMITS
  // ----------------------------
  let maxBatteryEnergy = s.battery;
  let chargeHours = 6;
  let maxGridEnergy = s.inverter * chargeHours;

  let maxPossibleCharge = Math.min(maxBatteryEnergy, maxGridEnergy);

  // ----------------------------
  // STEP 3: APPLY HARD CAP FIRST
  // ----------------------------
  let actualCharge = Math.min(requiredEnergy, maxPossibleCharge);

  // ----------------------------
  // STEP 4: SOC SAFETY FLOOR (IMPORTANT FIX)
  // ----------------------------
  let minEnergy = s.battery * (s.socLow / 100);
  actualCharge = Math.max(actualCharge, Math.min(minEnergy, maxPossibleCharge));

  // ----------------------------
  // STEP 5: SOC CONVERSION (RAW)
  // ----------------------------
  let soc = (actualCharge / s.battery) * 100;

  // clamp SOC display only (not energy)
  soc = Math.min(Math.max(soc, s.socLow), s.socHigh);

  return {
    soc: Math.round(soc),
    energy: actualCharge,
    capped: requiredEnergy > maxPossibleCharge
  };
}
function getLoadEnergyByWindow(s, startHour, endHour) {
  let total = 0;

  for (let h = startHour; h < endHour; h++) {
    total += getHourlyLoad(s, h);
  }

  return total;
}
function getChargePlanFromWindow(targetEnergy, s) {
  if (!targetEnergy || targetEnergy <= 0) {
    return { time: "None", cost: 0, energy: 0 };
  }

  const blockHours = s.blockSize;
  const inverterPower = s.inverter;

  const blockGridEnergy = inverterPower * blockHours;

  // 🔑 NEW: efficiency handling
  const efficiency = s.efficiency / 100;

  const blockStoredEnergy = blockGridEnergy * efficiency;

  function toMinutes(t) {
    let [h, m] = t.split(":").map(Number);
    return h * 60 + m;
  }

  let startMin = toMinutes(s.cheapStart);
  let endMin = toMinutes(s.cheapEnd);

  let totalBlocks = Math.floor((endMin - startMin) / (blockHours * 60));

  let stored = 0;
  let gridUsed = 0;
  let blocksUsed = 0;

  let nightLoadPerHour = (s.dailyLoad * 0.16) / 8;

  for (let i = 0; i < totalBlocks; i++) {

    if (stored >= targetEnergy) break;

    let remaining = targetEnergy - stored;

    // full block case
    if (remaining >= blockStoredEnergy) {

      stored += blockStoredEnergy;
      gridUsed += blockGridEnergy;

    } else {

      // 🔑 PARTIAL BLOCK (realistic)
      let hoursNeeded = remaining / (inverterPower * efficiency);

      let gridForCharge = hoursNeeded * inverterPower;

      // remainder of block = house load only
      let remainderHours = blockHours - hoursNeeded;
      let gridForHouse = remainderHours * nightLoadPerHour;

      gridUsed += gridForCharge + gridForHouse;

      stored = targetEnergy;
    }

    blocksUsed++;
  }

  let cost = gridUsed * s.importRate;

  let chargeEnd = endMin;
  let chargeStart = endMin - blocksUsed * blockHours * 60;

  function fmt(mins) {
    let h = Math.floor(mins / 60);
    let m = mins % 60;
    return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
  }

  return {
    time: `${fmt(chargeStart)} – ${fmt(chargeEnd)}`,
    cost: cost,
    energy: stored,        // actual stored energy (battery)
    gridEnergy: gridUsed,  // what you paid for
    capped: blocksUsed >= totalBlocks
  };
}
  
function getSolarTimeRange(radSlice, timeSlice) {
  let startTime = null;
  let endTime = null;

  for (let i = 0; i < 24; i++) {
  if (radSlice[i] > SOLAR_VISIBLE_THRESHOLD) {
      if (startTime === null) {
        startTime = timeSlice[i];
      }
      endTime = timeSlice[i];
    }
  }

  if (!startTime || !endTime) return "No data";

  let start = new Date(startTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  let end = new Date(endTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  return `${start} – ${end}`;
}

function weatherSummary(c,r,t,h,p){
  return `

    ☀️ Radiation (daylight avg): ${r.toFixed(0)} W/m²<br>

  `;
}

function estimateCurrentHourPV(s, cloud, rad, temp, hourIndex) {

  let r = rad[hourIndex];
  let c = cloud[hourIndex];
  let t = temp[hourIndex];

  if (r < SOLAR_THRESHOLD) return 0;

  let scaledRad = r * getForecastRadScale(r);
  scaledRad = Math.min(1100, scaledRad);

  return (
    s.pvSize *
    (scaledRad / 1000) *
    (s.efficiency / 100) *
    temperatureEfficiency(t) *
    getOrientationFactor(s.orientation) *
    getTiltFactor(s.tilt, hourIndex) *
    (s.shading / 100) *
    cloudFactorForecast(c, r)
  );
}
