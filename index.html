<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Self Learning)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input {
      padding: 8px;
      width: 160px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro (Self Learning)</h2>

<div class="card">
📍 <b>Location:</b><br>
NR7 0WZ (Norwich, UK)
</div>

<div class="card">
  <b>📥 Add Daily PV Data</b><br><br>

  <label>Date:</label><br>
  <input id="pvDate" type="date"><br><br>

  <label>PV (kWh):</label><br>
  <input id="pvInput" type="number"><br><br>

  <button onclick="savePV()">Save PV</button>
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<p id="loading"></p>

<div id="output"></div>

<script>

// -------------------- Storage --------------------
function getPVHistory() {
  return JSON.parse(localStorage.getItem("pvHistory") || "[]");
}

function savePV() {
  let pv = parseFloat(document.getElementById("pvInput").value);
  let date = document.getElementById("pvDate").value;

  if (!date || isNaN(pv)) return alert("Enter valid data");

  let history = getPVHistory();
  history.push({ date, kwh: pv });

  localStorage.setItem("pvHistory", JSON.stringify(history));

  alert("Saved PV");
}

// -------------------- Calibration --------------------
function getCalibrationFactorFromHistory(dayScoresMap) {
  let history = getPVHistory();
  let factors = [];

  history.forEach(entry => {
    let score = dayScoresMap[entry.date];
    if (score && score > 0) {
      factors.push(entry.kwh / score);
    }
  });

  if (factors.length === 0) return 52;

  return factors.reduce((a,b)=>a+b,0) / factors.length;
}

// -------------------- SOC Colour --------------------
function socColor(socValue) {
  let soc = parseInt(socValue);
  if (soc >= 70) return "limegreen";
  if (soc >= 40) return "orange";
  return "red";
}

// -------------------- SOC Logic --------------------
function recommendedSOC(avgScore, maxElevation) {

  let seasonalFactor = maxElevation / 60;
  seasonalFactor = Math.min(1, Math.max(0, seasonalFactor));

  let adjustedScore = (avgScore * 0.7) + (seasonalFactor * 0.3);

  let soc = 100 - (adjustedScore * 50);

  soc = Math.min(95, Math.max(20, soc));

  return Math.round(soc) + "%";
}

// -------------------- Solar Model --------------------
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;
  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

// -------------------- Sun Elevation --------------------
function sunElevation(date, lat, lon) {
  const rad = Math.PI / 180;

  let day = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  let decl = 23.45 * Math.sin(rad * (360 * (284 + day) / 365));

  let hour = date.getHours() + date.getMinutes() / 60;
  let solarTime = hour + (lon / 15);
  let hourAngle = 15 * (solarTime - 12);

  let elevation = Math.asin(
    Math.sin(lat * rad) * Math.sin(decl * rad) +
    Math.cos(lat * rad) * Math.cos(decl * rad) * Math.cos(hourAngle * rad)
  ) / rad;

  return Math.max(0, elevation);
}

function maxSunElevationForDay(date, lat, lon) {
  let maxElev = 0;

  for (let hour = 0; hour < 24; hour++) {
    let d = new Date(date);
    d.setHours(hour,0,0,0);

    let elev = sunElevation(d, lat, lon);
    if (elev > maxElev) maxElev = elev;
  }

  return maxElev;
}

// -------------------- Sunshine Hours --------------------
function calculateSunshineHours(radiationArray, dayStart) {
  let hours = 0;
  for (let h = dayStart; h < dayStart + 24; h++) {
    if (radiationArray[h] > 120) hours++;
  }
  return hours;
}

// -------------------- Weather Summary --------------------
function weatherSummary(cloud, rad, temp, humidity, wind, precip) {
  return `
    🌤️ Cloud: ${cloud.toFixed(0)}%<br>
    ☀️ Radiation: ${rad.toFixed(0)} W/m²<br>
    🌡️ Temp: ${temp.toFixed(1)}°C<br>
    💧 Humidity: ${humidity.toFixed(0)}%<br>
    🌬️ Wind: ${wind.toFixed(1)} km/h<br>
    🌧️ Precip: ${precip.toFixed(2)} mm
  `;
}

// -------------------- Main --------------------
async function runAI() {

  document.getElementById("loading").innerText = "Loading...";

  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,windspeed_10m,precipitation&forecast_days=3&timezone=auto"
  );

  let data = await res.json();

  let times = data.hourly.time;
  let cloud = data.hourly.cloudcover;
  let radiation = data.hourly.shortwave_radiation;
  let temp = data.hourly.temperature_2m;
  let humidity = data.hourly.relativehumidity_2m;
  let wind = data.hourly.windspeed_10m;
  let precip = data.hourly.precipitation;

  let output = "";
  let dayScoresMap = {};

  // Build score map
  for (let d = 0; d < 3; d++) {

    let dayStart = d * 24;
    let scores = [];

    for (let h = dayStart; h < dayStart + 24; h++) {

      let date = new Date(times[h]);
      let hour = date.getHours();

      if (hour >= 10 && hour <= 15) {
        let elevation = sunElevation(date, 52.627, 1.331);
        let sunFactor = Math.sin(elevation * Math.PI / 180);

        let baseScore = hourlySolarScore(cloud[h], radiation[h]);
        scores.push(baseScore * sunFactor);
      }
    }

    let avgScore = scores.reduce((a,b)=>a+b,0)/scores.length || 0;

    let dateKey = new Date(times[dayStart]).toISOString().split("T")[0];
    dayScoresMap[dateKey] = avgScore;
  }

  let calibrationFactor = getCalibrationFactorFromHistory(dayScoresMap);

  // Render output
  for (let d = 0; d < 3; d++) {

    let dayStart = d * 24;
    let dateKey = new Date(times[dayStart]).toISOString().split("T")[0];

    let scores = [];

    for (let h = dayStart; h < dayStart + 24; h++) {
      let date = new Date(times[h]);
      let hour = date.getHours();

      if (hour >= 10 && hour <= 15) {
        let elevation = sunElevation(date, 52.627, 1.331);
        let sunFactor = Math.sin(elevation * Math.PI / 180);
        let baseScore = hourlySolarScore(cloud[h], radiation[h]);
        scores.push(baseScore * sunFactor);
      }
    }

    let avgScore = scores.reduce((a,b)=>a+b,0)/scores.length || 0;

    let avgCloud = cloud.slice(dayStart, dayStart+24).reduce((a,b)=>a+b,0)/24;
    let avgRad = radiation.slice(dayStart, dayStart+24).reduce((a,b)=>a+b,0)/24;
    let avgTemp = temp.slice(dayStart, dayStart+24).reduce((a,b)=>a+b,0)/24;
    let avgHum = humidity.slice(dayStart, dayStart+24).reduce((a,b)=>a+b,0)/24;
    let avgWind = wind.slice(dayStart, dayStart+24).reduce((a,b)=>a+b,0)/24;
    let avgPrecip = precip.slice(dayStart, dayStart+24).reduce((a,b)=>a+b,0)/24;

    let dateObj = new Date(times[dayStart]);
    let maxElevation = maxSunElevationForDay(dateObj, 52.627, 1.331);

    let predictedPV = (avgScore * calibrationFactor).toFixed(1);
    let socValue = recommendedSOC(avgScore, maxElevation);
    let sunshineHours = calculateSunshineHours(radiation, dayStart);

    let isTomorrow = (d === 1);

    output += `
      <div class="card">
        <b>${d === 0 ? "Today" : d === 1 ? "Tomorrow" : "Day +2"}</b><br><br>

        ${weatherSummary(avgCloud, avgRad, avgTemp, avgHum, avgWind, avgPrecip)}<br><br>

        ☀️ Expected Sunshine Hours: ${sunshineHours} hrs<br><br>

        ⚡ Solar Score: ${(avgScore*100).toFixed(0)}%<br>
        🔋 Estimated PV: ${predictedPV} kWh<br><br>

        🔋 Recommended SOC:<br><br>

        <div style="
          font-weight: bold;
          font-size: ${isTomorrow ? '28px' : '18px'};
          color: ${isTomorrow ? 'red' : socColor(socValue)};
          background: ${isTomorrow ? '#1f2937' : 'transparent'};
          padding: ${isTomorrow ? '10px' : '0'};
          border-radius: ${isTomorrow ? '8px' : '0'};
          display: inline-block;
        ">
          ${socValue}
        </div>

      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText = "";
}

</script>

</body>
</html>
