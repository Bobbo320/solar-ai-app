<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input, select {
      padding: 8px;
      width: 180px;
      margin-bottom: 10px;
    }
    .hidden { display: none; }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="runAI()">Plan Next 3 Days</button>

<div id="settingsPanel" class="card hidden">
  <h3>Settings</h3>

  <label>Place:</label><br>
  <input id="postcode"><br>

  <label>PV Size (kWp):</label><br>
  <input id="pvSize" type="number"><br>

  <label>Inverter Size (kW):</label><br>
  <input id="inverter" type="number"><br>

  <label>Battery Capacity (kWh):</label><br>
  <input id="battery" type="number"><br>

  <label>PV Orientation:</label><br>
  <select id="orientation">
    <option value="south">South</option>
    <option value="se_sw">SE / SW</option>
    <option value="east_west">East / West</option>
    <option value="north">North</option>
  </select><br>

  <label>Shading:</label><br>
  <select id="shading">
    <option value="100">None</option>
    <option value="90">Very light</option>
    <option value="80">Light</option>
    <option value="70">Moderate</option>
    <option value="50">Heavy</option>
  </select><br>

  <label>Daily Load (kWh):</label><br>
  <input id="dailyLoad" type="number"><br>

  <label>Efficiency (%):</label><br>
  <input id="efficiency" type="number"><br>

  <label>SOC Low (%):</label><br>
  <input id="socLow" type="number"><br>

  <label>SOC High (%):</label><br>
  <input id="socHigh" type="number"><br>

  <button onclick="saveSettings()">Save</button>
</div>

<p id="loading"></p>
<div id="output"></div>

<script>

let preloadedWeather = null;

// ---------------- SETTINGS ----------------
function getSettings() {
  let s = JSON.parse(localStorage.getItem("settings") || "{}");
  return {
    postcode: s.postcode || "Norwich",
    pvSize: s.pvSize ?? 6.5,
    inverter: s.inverter ?? 5,
    battery: s.battery ?? 10.64,
    orientation: s.orientation || "south",
    shading: s.shading ?? 100,
    dailyLoad: s.dailyLoad ?? 10,
    efficiency: s.efficiency ?? 85,
    socLow: s.socLow ?? 20,
    socHigh: s.socHigh ?? 95
  };
}

function saveSettings() {
  let settings = {
    postcode: postcode.value,
    pvSize: parseFloat(pvSize.value),
    inverter: parseFloat(inverter.value),
    battery: parseFloat(battery.value),
    orientation: orientation.value,
    shading: parseFloat(shading.value),
    dailyLoad: parseFloat(dailyLoad.value),
    efficiency: parseFloat(efficiency.value),
    socLow: parseFloat(socLow.value),
    socHigh: parseFloat(socHigh.value)
  };
  localStorage.setItem("settings", JSON.stringify(settings));
  preloadWeather();
  alert("Saved");
  toggleSettings();
}

function loadSettingsToUI() {
  let s = getSettings();
  postcode.value = s.postcode;
  pvSize.value = s.pvSize;
  inverter.value = s.inverter;
  battery.value = s.battery;
  orientation.value = s.orientation;
  shading.value = s.shading;
  dailyLoad.value = s.dailyLoad;
  efficiency.value = s.efficiency;
  socLow.value = s.socLow;
  socHigh.value = s.socHigh;
}

function toggleSettings() {
  settingsPanel.classList.toggle("hidden");
  loadSettingsToUI();
}

// ---------------- CACHE ----------------
function getCache(k){ return JSON.parse(localStorage.getItem(k)||"null"); }
function setCache(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

// ---------------- WEATHER ----------------
async function preloadWeather(){
  try{
    let s=getSettings();
    preloadedWeather=await getWeather(s.postcode);
  }catch{}
}

async function getCoordinates(postcode){
  try{
    let c=getCache("coords_"+postcode);
    if(c) return c;

    let res=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(postcode)}&count=1`);
    let d=await res.json();

    let coords={lat:d.results[0].latitude, lon:d.results[0].longitude};
    setCache("coords_"+postcode,coords);
    return coords;
  }catch{
    return {lat:52.63,lon:1.29};
  }
}

async function getWeather(postcode){
  try{
    let c=getCache("weather_"+postcode);
    if(c && Date.now()-c.timestamp<1800000) return c.data;

    let coord=await getCoordinates(postcode);

    let res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coord.lat}&longitude=${coord.lon}&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto`);
    let data=await res.json();

    setCache("weather_"+postcode,{timestamp:Date.now(),data});
    return data;
  }catch{
    return {hourly:{
      cloudcover:Array(72).fill(50),
      shortwave_radiation:Array(72).fill(200),
      temperature_2m:Array(72).fill(15),
      relativehumidity_2m:Array(72).fill(70),
      precipitation:Array(72).fill(0)
    }};
  }
}

// ---------------- SOLAR ----------------
function temperatureEfficiency(t){
  return Math.min(1.05,Math.max(0.8,1+((t-25)*-0.004)));
}

function daylightHours(r){ return r.filter(x=>x>100); }

function hourlySolarScore(c,r){
  return Math.min(1,Math.max(0,(1-c/100)*0.6+(r/1000)*0.4));
}

function weightedCloudAverage(c,start){
  let s=0,w=0;
  for(let i=0;i<24;i++){
    let wt=Math.exp(-Math.pow((i-12)/6,2));
    s+=c[start+i]*wt; w+=wt;
  }
  return s/w;
}

function sunshineSplit(r,start){
  let m=0,a=0;
  for(let i=0;i<24;i++){
    if(r[start+i]>120){ i<12?m++:a++; }
  }
  return {morning:m,afternoon:a};
}

function estimatePV(avgScore,sun,temp,s){
  let raw=s.pvSize*sun*avgScore*(s.efficiency/100)*temperatureEfficiency(temp)*(s.shading/100);
  return Math.min(raw,s.inverter*sun);
}

// ---------------- WEATHER DISPLAY ----------------
function weatherSummary(c,r,t,h,p){
  return `
    🌤️ Cloud: ${c.toFixed(0)}%<br>
    ☀️ Radiation: ${r.toFixed(0)} W/m²<br>
    🌡️ Temp (midday): ${t.toFixed(1)}°C<br>
    💧 Humidity: ${h.toFixed(0)}%<br>
    🌧️ Precip: ${p.toFixed(2)} mm
  `;
}

// ---------------- ADAPTIVE SOC ----------------
function recommendedSOC(pv,s,avgScore,cloudAvg){
  let shortfall=Math.max(0,s.dailyLoad-pv);

  let buffer=1.15;
  if(avgScore<0.4) buffer=1.35;
  else if(avgScore<0.6) buffer=1.25;
  else if(avgScore>0.8) buffer=1.1;

  if(cloudAvg>70) buffer+=0.05;

  let required=shortfall*buffer;
  let soc=(required/s.battery)*100;

  if(soc<s.socLow) soc=s.socLow;
  if(soc>s.socHigh) soc=s.socHigh;

  return Math.round(soc);
}

// ---------------- MAIN ----------------
async function runAI(){

  let s=getSettings();
  loading.innerText="Loading...";

  let data=preloadedWeather||await getWeather(s.postcode);

  let cloud=data.hourly.cloudcover;
  let rad=data.hourly.shortwave_radiation;
  let temp=data.hourly.temperature_2m;
  let hum=data.hourly.relativehumidity_2m;
  let precip=data.hourly.precipitation;

  let html="";

  for(let d=0;d<3;d++){

    let start=d*24;

    let dayRad=daylightHours(rad.slice(start,start+24));
    let avgRad=dayRad.length?dayRad.reduce((a,b)=>a+b)/dayRad.length:0;

    let scores=[];
    rad.slice(start,start+24).forEach((r,i)=>{
      if(r>100) scores.push(hourlySolarScore(cloud[start+i],r));
    });

    let avgScore=scores.length?scores.reduce((a,b)=>a+b)/scores.length:0;

    let split=sunshineSplit(rad,start);
    let sun=split.morning+split.afternoon;

    let midTemp=temp[start+12];
    let cloudAvg=weightedCloudAverage(cloud,start);

    let pv=estimatePV(avgScore,sun,midTemp,s);
    let soc=recommendedSOC(pv,s,avgScore,cloudAvg);

    let label=d===0?"Today":d===1?"Tomorrow":"Day 3";

    html+=`
      <div class="card">
        <h3>${label}</h3>

        ${weatherSummary(
          cloudAvg,
          avgRad,
          midTemp,
          hum[start+12],
          precip[start+12]
        )}

        <br><b>🔆 Usable Solar Window:</b> ${split.morning + split.afternoon} hours

        <br><b>⚡ Estimated PV:</b> ${pv.toFixed(1)} kWh
        <br><b>🔋 Recommended SOC:</b> ${soc}%
      </div>
    `;
  }

  output.innerHTML=html;
  loading.innerText="";
}

// ---------------- INIT ----------------
window.onload=()=>preloadWeather();

</script>

</body>
</html>
