<!DOCTYPE html>
<html>
<head>
  <title>Solar AI App</title>

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 10px;
      font-size: 16px;
    }

    h2 {
      font-size: 22px;
      text-align: center;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    button {
      flex: 1 1 45%;
      padding: 12px;
      font-size: 14px;
    }

    input {
      margin: 6px 0;
      padding: 10px;
      width: 100%;
      font-size: 16px;
      box-sizing: border-box;
    }

    .tab {
      display: none;
    }

    .active {
      display: block;
    }

    .card {
      background: #f5f5f5;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .soc-box {
      margin-top: 20px;
      padding: 20px;
      background: #ffdddd;
      border-radius: 10px;
      text-align: center;
    }

    .soc-title {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .soc-value {
      font-size: 32px;
      font-weight: bold;
      color: red;
    }

    #pv, #weather, #soc {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Solar AI App</h2>

<div class="nav">
  <button onclick="showTab('dashboard')">Dashboard</button>
  <button onclick="showTab('settings')">Settings</button>
  <button onclick="showTab('manual')">Manual PV</button>
  <button onclick="showTab('history')">History</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab active">
  <button onclick="loadWeather()">Load Weather</button>

  <div id="weather"></div>
  <div id="pv"></div>
  <div id="soc"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab">
  <h3>Settings</h3>

  <input id="postcode" placeholder="Postcode"><br>
  <input id="pvSize" placeholder="PV Size (kWp)"><br>
  <input id="inverter" placeholder="Inverter (kW)"><br>
  <input id="battery" placeholder="Battery (kWh)"><br>
  <input id="direction" placeholder="Direction (degrees)"><br>
  <input id="elevation" placeholder="Elevation (m)"><br>

  <button onclick="saveSettings()">Save Settings</button>
</div>

<!-- MANUAL PV -->
<div id="manual" class="tab">
  <h3>Manual PV Input</h3>

  <input type="date" id="pvDate"><br>
  <input id="pvInput" placeholder="kWh"><br>

  <button onclick="addPV()">Add PV</button>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
  <h3>PV History</h3>
  <div id="historyList"></div>
</div>

<script>
let weatherData = null;

/* ---------------- NAV ---------------- */

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');

  if(tab === 'history') renderHistory();
}

/* ---------------- SETTINGS ---------------- */

function saveSettings(){
  let settings = {
    postcode: postcode.value,
    pvSize: pvSize.value,
    inverter: inverter.value,
    battery: battery.value,
    direction: direction.value,
    elevation: elevation.value
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  alert("Saved");
}

function loadSettings(){
  let s = JSON.parse(localStorage.getItem("settings") || "{}");

  postcode.value = s.postcode || "NR7 0WZ";
  pvSize.value = s.pvSize || 6.5;
  inverter.value = s.inverter || 5;
  battery.value = s.battery || 10.64;
  direction.value = s.direction || 170;
  elevation.value = s.elevation || 30;
}

/* ---------------- MANUAL PV ---------------- */

function addPV(){
  let history = JSON.parse(localStorage.getItem("pvHistory") || "[]");

  history.push({
    date: pvDate.value,
    kwh: parseFloat(pvInput.value)
  });

  localStorage.setItem("pvHistory", JSON.stringify(history));
  alert("Saved");
}

/* ---------------- HISTORY ---------------- */

function renderHistory(){
  let history = JSON.parse(localStorage.getItem("pvHistory") || "[]");

  let html = "<div class='card'>";
  history.forEach(h => {
    html += `${h.date} : ${h.kwh} kWh<br>`;
  });
  html += "</div>";

  historyList.innerHTML = html;
}

/* ---------------- WEATHER ---------------- */

async function loadWeather(){

  let lat = 52.627;
  let lon = 1.331;

  let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,cloudcover,precipitation&forecast_days=3`;

  let res = await fetch(url);
  let data = await res.json();

  weatherData = data.hourly;

  displayWeather();
  calculatePV();
}

function displayWeather(){
  if(!weatherData){
    weather.innerHTML = "Weather not loaded";
    return;
  }

  weather.innerHTML = `
    <div class="card">
      <b>Weather Loaded (3 Days)</b><br>
      Cloud, Radiation, Precipitation available
    </div>
  `;
}

/* ---------------- WEATHER HELPERS ---------------- */

function getDailyWeather(hourly, dayIndex){

  let start = dayIndex * 24;

  let clouds = [];
  let radiation = [];
  let precip = [];

  for(let i=0;i<24;i++){
    let idx = start + i;
    clouds.push(hourly.cloudcover[idx]);
    radiation.push(hourly.shortwave_radiation[idx]);
    precip.push(hourly.precipitation[idx]);
  }

  let avgCloud = clouds.reduce((a,b)=>a+b,0)/24;
  let avgRad = radiation.reduce((a,b)=>a+b,0)/24;
  let totalPrecip = precip.reduce((a,b)=>a+b,0);

  let sunshineHours = radiation.filter(r => r > 100).length;

  return {
    cloud: avgCloud,
    radiation: avgRad,
    precipitation: totalPrecip,
    sunshine: sunshineHours
  };
}

/* ---------------- PV MODEL ---------------- */

function predictDay(dayIndex){

  let settings = JSON.parse(localStorage.getItem("settings") || "{}");

  let pvSize = parseFloat(settings.pvSize);
  let inverter = parseFloat(settings.inverter);

  if(!weatherData) return 0;

  let w = getDailyWeather(weatherData, dayIndex);

  let cloudFactor = 0.4 + 0.6 * (1 - w.cloud / 100);
  let rainPenalty = Math.max(0.7, 1 - (w.precipitation * 0.05));
  let sunshineFactor = Math.min(1.2, 0.7 + (w.sunshine / 10));

  let base = w.radiation * 0.08;

  let pv = pvSize * base * cloudFactor * rainPenalty * sunshineFactor;

  pv = Math.min(pv, inverter * 6);

  return pv;
}

/* ---------------- SOC ---------------- */

function calculateSOC(pvToday, pvTomorrow){

  let settings = JSON.parse(localStorage.getItem("settings") || "{}");
  let battery = parseFloat(settings.battery);

  let ratio = pvTomorrow / battery;

  let soc;

  if(ratio > 3){
    soc = 20;
  } else if(ratio > 1.5){
    soc = 35;
  } else {
    soc = 60;
  }

  return Math.max(10, Math.min(90, soc));
}

/* ---------------- DISPLAY ---------------- */

function calculatePV(){

  if(!weatherData){
    pv.innerHTML = "Load weather first";
    return;
  }

  let pvToday = predictDay(0);
  let pvTomorrow = predictDay(1);
  let pvDay3 = predictDay(2);

  let w0 = getDailyWeather(weatherData, 0);
  let w1 = getDailyWeather(weatherData, 1);
  let w2 = getDailyWeather(weatherData, 2);

  pv.innerHTML = `
    <div class="card">
      <h3>📊 PV Forecast</h3>

      <b>Today:</b> ${pvToday.toFixed(2)} kWh<br>
      ☁️ ${w0.cloud.toFixed(0)}% | ☀️ ${w0.radiation.toFixed(0)} W/m² | 🌞 ${w0.sunshine} hrs | 🌧️ ${w0.precipitation.toFixed(2)} mm<br><br>

      <b>Tomorrow:</b> ${pvTomorrow.toFixed(2)} kWh<br>
      ☁️ ${w1.cloud.toFixed(0)}% | ☀️ ${w1.radiation.toFixed(0)} W/m² | 🌞 ${w1.sunshine} hrs | 🌧️ ${w1.precipitation.toFixed(2)} mm<br><br>

      <b>Day 3:</b> ${pvDay3.toFixed(2)} kWh<br>
      ☁️ ${w2.cloud.toFixed(0)}% | ☀️ ${w2.radiation.toFixed(0)} W/m² | 🌞 ${w2.sunshine} hrs | 🌧️ ${w2.precipitation.toFixed(2)} mm
    </div>
  `;

  let socVal = calculateSOC(pvToday, pvTomorrow);

  soc.innerHTML = `
    <div class="soc-box">
      <div class="soc-title">Recommended SOC (Tomorrow)</div>
      <div class="soc-value">${socVal}%</div>
    </div>
  `;
}

/* ---------------- INIT ---------------- */

loadSettings();

</script>

</body>
</html>
