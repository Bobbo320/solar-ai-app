<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button {
      padding: 10px;
      margin: 6px;
      font-size: 14px;
    }

    input {
      padding: 6px;
      margin: 4px;
      width: 80%;
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }

    .tab {
      display: none;
    }

    .active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #555;
      padding: 6px;
      text-align: center;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="showTab('main')">Main</button>
<button onclick="showTab('settings')">Settings</button>
<button onclick="showTab('history')">PV History</button>

<!-- MAIN TAB -->
<div id="main" class="tab active">

  <div class="card">
    📍 <b id="locationDisplay"></b>
  </div>

  <button onclick="runAI()">Plan Next 3 Days</button>

  <p id="loading"></p>
  <div id="output"></div>

</div>

<!-- SETTINGS TAB -->
<div id="settings" class="tab">

  <div class="card">
    <h3>Settings</h3>

    <input id="postcode" placeholder="Postcode"><br>
    <input id="inverter" placeholder="Inverter kW"><br>
    <input id="battery" placeholder="Battery kWh"><br>
    <input id="pvSize" placeholder="PV Size kWp"><br>
    <input id="direction" placeholder="Direction (deg)"><br>
    <input id="elevation" placeholder="Elevation (m)"><br>

    <button onclick="saveSettings()">Save Settings</button>
  </div>

  <div class="card">
    <h3>Manual PV Input</h3>

    <input type="date" id="pvDate"><br>
    <input type="number" id="pvInput" placeholder="PV kWh"><br>

    <button onclick="savePV()">Save PV</button>

    <div id="pvHistoryTable"></div>
  </div>

</div>

<!-- HISTORY TAB -->
<div id="history" class="tab">
  <div class="card">
    <h3>Historical PV Data</h3>
    <div id="historyTable"></div>
  </div>
</div>

<script>

const LAT = 52.627;
const LON = 1.331;

// ---------------- SETTINGS ----------------
function getSettings() {
  return JSON.parse(localStorage.getItem("settings")) || {};
}

function saveSettings() {
  let settings = {
    postcode: document.getElementById("postcode").value,
    inverter: document.getElementById("inverter").value,
    battery: document.getElementById("battery").value,
    pvSize: document.getElementById("pvSize").value,
    direction: document.getElementById("direction").value,
    elevation: document.getElementById("elevation").value
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  alert("Settings saved");
  loadSettingsUI();
}

// ---------------- PV HISTORY ----------------
function getHistory() {
  return JSON.parse(localStorage.getItem("pvHistory")) || [];
}

function savePV() {
  let pv = parseFloat(document.getElementById("pvInput").value);
  let date = document.getElementById("pvDate").value;

  if (!date || isNaN(pv)) {
    alert("Enter valid PV and date");
    return;
  }

  let history = getHistory();

  history = history.filter(d => d.date !== date);
  history.push({ date, kwh: pv });

  localStorage.setItem("pvHistory", JSON.stringify(history));

  renderPVHistory();
  renderHistoryTab();

  alert("Saved");
}

function renderPVHistory() {
  let history = getHistory();
  let container = document.getElementById("pvHistoryTable");

  if (!container) return;

  if (history.length === 0) {
    container.innerHTML = "No data";
    return;
  }

  let html = "<table><tr><th>Date</th><th>kWh</th></tr>";

  history.sort((a,b)=> new Date(b.date)-new Date(a.date));

  history.forEach(h => {
    html += `<tr><td>${h.date}</td><td>${h.kwh}</td></tr>`;
  });

  html += "</table>";
  container.innerHTML = html;
}

function renderHistoryTab() {
  let history = getHistory();
  let container = document.getElementById("historyTable");

  if (!container) return;

  if (history.length === 0) {
    container.innerHTML = "No history";
    return;
  }

  let html = "<table><tr><th>Date</th><th>PV (kWh)</th></tr>";

  history.sort((a,b)=> new Date(b.date)-new Date(a.date));

  history.forEach(h => {
    html += `<tr><td>${h.date}</td><td>${h.kwh}</td></tr>`;
  });

  html += "</table>";
  container.innerHTML = html;
}

// ---------------- UI ----------------
function showTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if (tab === "settings") {
    loadSettingsUI();
    renderPVHistory();
  }

  if (tab === "history") {
    renderHistoryTab();
  }
}

function loadSettingsUI() {
  let s = getSettings();

  document.getElementById("postcode").value = s.postcode || "";
  document.getElementById("inverter").value = s.inverter || "";
  document.getElementById("battery").value = s.battery || "";
  document.getElementById("pvSize").value = s.pvSize || "6.5";
  document.getElementById("direction").value = s.direction || "170";
  document.getElementById("elevation").value = s.elevation || "30";

  document.getElementById("locationDisplay").innerText =
    (s.postcode || "NR7 0WZ") + " (Norwich)";
}

// ---------------- SOLAR ----------------
function sunElevation(date, lat, lon) {
  const rad = Math.PI / 180;

  let day = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  let decl = 23.45 * Math.sin(rad * (360 * (284 + day) / 365));

  let hour = date.getHours() + date.getMinutes() / 60;
  let solarTime = hour + (lon / 15);
  let hourAngle = 15 * (solarTime - 12);

  let elevation = Math.asin(
    Math.sin(lat * rad) * Math.sin(decl * rad) +
    Math.cos(lat * rad) * Math.cos(decl * rad) * Math.cos(hourAngle * rad)
  ) / rad;

  return Math.max(0, elevation);
}

function seasonalSOC(avgScore, maxElevation, date) {

  let month = new Date(date).getMonth() + 1;

  let seasonalWeight =
    (month <= 2 || month === 12) ? 0.9 :
    (month <= 5) ? 0.6 :
    (month <= 8) ? 0.3 : 0.5;

  let elevationFactor = maxElevation / 60;

  let adjusted =
    (avgScore * 0.6) +
    (elevationFactor * 0.2) +
    ((1 - seasonalWeight) * 0.2);

  let soc = 100 - (adjusted * 60);
  return Math.round(Math.min(95, Math.max(20, soc))) + "%";
}

function hourlyScore(cloud, rad) {
  return Math.min(1, Math.max(0, (1 - cloud/100)*0.6 + (rad/1000)*0.4));
}

// ---------------- MAIN ----------------
async function runAI() {

  document.getElementById("loading").innerText = "Loading...";

  let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation&forecast_days=3&timezone=auto");

  let data = await res.json();

  let times = data.hourly.time;
  let cloud = data.hourly.cloudcover;
  let rad = data.hourly.shortwave_radiation;

  let output = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;
    let scores = [];

    for (let h = start; h < start + 24; h++) {

      let dt = new Date(times[h]);
      let hour = dt.getHours();

      if (hour >= 10 && hour <= 15) {
        let elev = sunElevation(dt, LAT, LON);
        let score = hourlyScore(cloud[h], rad[h]) * Math.sin(elev*Math.PI/180);
        scores.push(score);
      }
    }

    let avg = scores.reduce((a,b)=>a+b,0)/scores.length || 0;

    let dateObj = new Date(times[start]);

    let maxElev = 0;
    for (let h = 0; h < 24; h++) {
      let dt = new Date(dateObj);
      dt.setHours(h);
      let e = sunElevation(dt, LAT, LON);
      if (e > maxElev) maxElev = e;
    }

    output += `
      <div class="card">
        <b>${d===0?"Today":d===1?"Tomorrow":"Day +2"}</b><br><br>

        ⚡ Solar Score: ${(avg*100).toFixed(0)}%<br>
        ☀️ Max Elevation: ${maxElev.toFixed(1)}°<br><br>

        🔋 Recommended SOC: <b>${seasonalSOC(avg, maxElev, dateObj)}</b>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText = "";
}

// ---------------- INIT ----------------
loadSettingsUI();
renderPVHistory();
renderHistoryTab();

</script>

</body>
</html>
