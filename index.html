<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro - Energy Model</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button { padding: 10px; margin: 6px; }

    input {
      padding: 6px;
      margin: 4px;
      width: 90%;
    }

    .card {
      margin-top: 12px;
      padding: 12px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }

    .tab { display: none; }
    .active { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #555;
      padding: 6px;
      font-size: 13px;
    }

    #debug {
      background:#000;
      color:#0f0;
      font-size:11px;
      padding:8px;
      text-align:left;
      max-height:120px;
      overflow:auto;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro (Energy Model)</h2>

<div id="debug"></div>

<button onclick="showTab('main')">Main</button>
<button onclick="showTab('settings')">Settings</button>
<button onclick="showTab('history')">History</button>

<!-- MAIN -->
<div id="main" class="tab active">

  <div class="card">📍 System Active</div>

  <button onclick="runAI()">Plan Next 3 Days</button>

  <p id="loading"></p>
  <div id="output"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab">

  <div class="card">
    <h3>Manual PV Input</h3>

    <input type="date" id="pvDate"><br>
    <input type="number" id="pvInput" placeholder="kWh"><br>

    <button onclick="savePV()">Save PV</button>
  </div>

  <div class="card">
    <h3>Settings</h3>

    <input id="postcode" placeholder="Postcode"><br>
    <input id="inverter" placeholder="Inverter kW"><br>
    <input id="battery" placeholder="Battery kWh"><br>
    <input id="pvSize" placeholder="PV kWp"><br>
    <input id="direction" placeholder="Direction (degrees)"><br>
    <input id="elevation" placeholder="Elevation (m)"><br>

    <button onclick="saveSettings()">Save Settings</button>
  </div>

</div>

<!-- HISTORY -->
<div id="history" class="tab">
  <div class="card">
    <h3>PV History</h3>
    <div id="historyTable"></div>
  </div>

  <div class="card">
    <h3>Calibration</h3>
    <div id="calibrationTable"></div>
  </div>
</div>

<script>

// ---------------- DEBUG ----------------
function log(msg){
  console.log(msg);
  document.getElementById("debug").innerHTML += msg + "<br>";
}

// ---------------- STORAGE ----------------
function getHistory(){
  return JSON.parse(localStorage.getItem("pvHistory")) || [];
}

// ---------------- SETTINGS ----------------
function saveSettings(){
  let s = {
    postcode: document.getElementById("postcode").value,
    inverter: document.getElementById("inverter").value,
    battery: document.getElementById("battery").value,
    pvSize: document.getElementById("pvSize").value,
    direction: document.getElementById("direction").value,
    elevation: document.getElementById("elevation").value
  };

  localStorage.setItem("settings", JSON.stringify(s));
  alert("Saved");
}

// ---------------- LOAD SETTINGS ----------------
function loadSettings(){
  let s = JSON.parse(localStorage.getItem("settings"));

  if(!s){
    s = {
      postcode:"NR7 0WZ",
      inverter:"5",
      battery:"10.64",
      pvSize:"6.5",
      direction:"170",
      elevation:"30"
    };
    localStorage.setItem("settings", JSON.stringify(s));
  }

  document.getElementById("postcode").value = s.postcode;
  document.getElementById("inverter").value = s.inverter;
  document.getElementById("battery").value = s.battery;
  document.getElementById("pvSize").value = s.pvSize;
  document.getElementById("direction").value = s.direction;
  document.getElementById("elevation").value = s.elevation;
}

// ---------------- SAVE PV ----------------
function savePV(){
  let date = document.getElementById("pvDate").value;
  let pv = parseFloat(document.getElementById("pvInput").value);

  if(!date || isNaN(pv)){
    alert("Invalid");
    return;
  }

  let history = getHistory();

  history = history.filter(d=>d.date !== date);
  history.push({date, kwh: pv});

  localStorage.setItem("pvHistory", JSON.stringify(history));

  updateCalibration();
  renderHistory();
  renderCalibration();

  alert("Saved");
}

// ---------------- WEATHER ----------------
async function getWeather(){
  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,shortwave_radiation&forecast_days=3&timezone=auto"
  );
  return await res.json();
}

// ---------------- HOURLY PV SIMULATION ----------------
function simulatePV(hourly, settings){

  let pvSize = parseFloat(settings.pvSize);
  let inverter = parseFloat(settings.inverter);

  let total = 0;

  for(let i=0;i<hourly.cloudcover.length;i++){

    let cloud = hourly.cloudcover[i];
    let rad = hourly.shortwave_radiation[i];

    let potential = (rad / 1000) * pvSize;

    let cloudFactor = 1 - (cloud / 100);

    let raw = potential * cloudFactor;

    let clipped = Math.min(raw, inverter);

    total += clipped / 4; // approximate kWh scaling
  }

  return total;
}

// ---------------- CALIBRATION ----------------
function updateCalibration(){

  let history = getHistory();

  let monthly = {};

  history.forEach(h=>{
    let m = new Date(h.date).getMonth();
    if(!monthly[m]) monthly[m] = [];
    monthly[m].push(h.kwh);
  });

  let cal = {};

  Object.keys(monthly).forEach(m=>{
    let avg = monthly[m].reduce((a,b)=>a+b,0)/monthly[m].length;
    let baseline = 20;
    cal[m] = avg / baseline;
  });

  localStorage.setItem("calibration", JSON.stringify(cal));
}

// ---------------- GET CALIBRATION ----------------
function getCalibration(month){
  let c = JSON.parse(localStorage.getItem("calibration")) || {};
  return c[month] || 1;
}

// ---------------- ENERGY-BASED SOC ----------------
function energySOC(pv, battery){

  if(pv > battery * 1.2) return 40;
  if(pv > battery * 0.8) return 55;
  return 75;
}

// ---------------- MAIN ----------------
async function runAI(){

  document.getElementById("loading").innerText="Loading...";

  let data = await getWeather();
  let settings = JSON.parse(localStorage.getItem("settings"));

  let month = new Date().getMonth();
  let calibration = getCalibration(month);

  let hourlyPV = simulatePV(data.hourly, settings);

  let adjustedPV = hourlyPV * calibration;

  let battery = parseFloat(settings.battery);

  let soc = energySOC(adjustedPV, battery);

  let output = `
    <div class="card">
      ⚡ Predicted PV: ${adjustedPV.toFixed(1)} kWh<br>
      🔧 Calibration: ${calibration.toFixed(2)}<br><br>

      🔋 Recommended SOC:<br>
      <b style="font-size:24px">${soc}%</b>
    </div>
  `;

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText="";
}

// ---------------- HISTORY ----------------
function renderHistory(){
  let h = getHistory();
  let el = document.getElementById("historyTable");

  if(h.length===0){
    el.innerHTML="No history";
    return;
  }

  let html="<table><tr><th>Date</th><th>kWh</th></tr>";

  h.forEach(d=>{
    html += `<tr><td>${d.date}</td><td>${d.kwh}</td></tr>`;
  });

  html += "</table>";

  el.innerHTML = html;
}

// ---------------- CALIBRATION UI ----------------
function renderCalibration(){

  let c = JSON.parse(localStorage.getItem("calibration")) || {};
  let el = document.getElementById("calibrationTable");

  let html="<table><tr><th>Month</th><th>Factor</th></tr>";

  Object.keys(c).forEach(m=>{
    html += `<tr><td>${m}</td><td>${c[m].toFixed(2)}</td></tr>`;
  });

  html += "</table>";

  el.innerHTML = html;
}

// ---------------- TABS ----------------
function showTab(tab){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if(tab==="history"){
    renderHistory();
    renderCalibration();
  }

  if(tab==="settings"){
    loadSettings();
  }
}

// ---------------- INIT ----------------
window.addEventListener("load",()=>{
  loadSettings();
  renderHistory();
  renderCalibration();
});

</script>

</body>
</html>
