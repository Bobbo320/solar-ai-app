<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input, select {
      padding: 8px;
      width: 180px;
      margin-bottom: 10px;
    }
    .hidden { display: none; }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="runAI()">Plan Next 3 Days</button>

<div id="settingsPanel" class="card hidden">
  <h3>Settings</h3>

  <label>Place:</label><br>
  <input id="place" value="Norwich"><br>

  <label>PV Size (kWp):</label><br>
  <input id="pvSize" type="number" value="6.5"><br>

  <label>Inverter Size (kW):</label><br>
  <input id="inverter" type="number" value="5"><br>

  <label>Battery Capacity (kWh):</label><br>
  <input id="battery" type="number" value="10.64"><br>

  <label>Orientation:</label><br>
  <select id="orientation">
    <option value="south">South</option>
    <option value="se_sw">SE / SW</option>
    <option value="east_west">East / West</option>
    <option value="north">North</option>
  </select><br>

  <label>Shading (%):</label><br>
  <input id="shading" type="number" value="100"><br>

  <label>Daily Load (kWh):</label><br>
  <input id="dailyLoad" type="number" value="10"><br>

  <button onclick="saveSettings()">Save</button>
</div>

<p id="loading"></p>
<div id="output"></div>

<script>

let cache = {};

// ---------------- SETTINGS ----------------
function getSettings() {
  return JSON.parse(localStorage.getItem("settings") || JSON.stringify({
    place: "Norwich",
    pvSize: 6.5,
    inverter: 5,
    battery: 10.64,
    orientation: "south",
    shading: 100,
    dailyLoad: 10
  }));
}

function saveSettings() {
  let s = {
    place: document.getElementById("place").value,
    pvSize: parseFloat(document.getElementById("pvSize").value),
    inverter: parseFloat(document.getElementById("inverter").value),
    battery: parseFloat(document.getElementById("battery").value),
    orientation: document.getElementById("orientation").value,
    shading: parseFloat(document.getElementById("shading").value),
    dailyLoad: parseFloat(document.getElementById("dailyLoad").value)
  };

  localStorage.setItem("settings", JSON.stringify(s));
  alert("Saved");
  toggleSettings();
}

function loadUI() {
  let s = getSettings();
  document.getElementById("place").value = s.place;
  document.getElementById("pvSize").value = s.pvSize;
  document.getElementById("inverter").value = s.inverter;
  document.getElementById("battery").value = s.battery;
  document.getElementById("orientation").value = s.orientation;
  document.getElementById("shading").value = s.shading;
  document.getElementById("dailyLoad").value = s.dailyLoad;
}

function toggleSettings() {
  document.getElementById("settingsPanel").classList.toggle("hidden");
  loadUI();
}

// ---------------- SIMPLE PLACE → COORDS ----------------
async function getCoordinates(place) {

  try {
    if (cache.coords) return cache.coords;

    let res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(place)}&count=1`);

    let data = await res.json();

    if (!data.results) throw new Error("No results");

    let coords = {
      lat: data.results[0].latitude,
      lon: data.results[0].longitude
    };

    cache.coords = coords;
    return coords;

  } catch (e) {
    console.log("Coords fallback used");
    return { lat: 52.6309, lon: 1.2974 }; // Norwich fallback
  }
}

// ---------------- WEATHER ----------------
async function getWeather(place) {

  try {

    if (cache.weather) return cache.weather;

    let c = await getCoordinates(place);

    let res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,precipitation&forecast_days=3&timezone=auto`
    );

    let data = await res.json();

    cache.weather = data;
    return data;

  } catch (e) {

    console.error("Weather fetch failed", e);
    document.getElementById("loading").innerText = "Using fallback data";

    return {
      hourly: {
        cloudcover: new Array(72).fill(50),
        shortwave_radiation: new Array(72).fill(200),
        temperature_2m: new Array(72).fill(15),
        relativehumidity_2m: new Array(72).fill(70),
        precipitation: new Array(72).fill(0)
      }
    };
  }
}

// ---------------- SOLAR ----------------
function solarWeight(hour){
  let x = (hour - 12) / 6;
  return Math.exp(-x*x);
}

function weightedCloud(cloud, rad, start){

  let s=0,w=0;

  for(let i=0;i<24;i++){
    let r = rad[start+i];
    if(r > 120){
      let wt = solarWeight(i) * (r/1000);
      s += cloud[start+i] * wt;
      w += wt;
    }
  }

  return w ? s/w : 0;
}

function estimatePV(pvSize, sun, efficiency, shading, inverter, orientationFactor){

  let raw = pvSize * sun * efficiency * shading * orientationFactor;
  return Math.min(raw, inverter * sun);
}

// ---------------- MAIN ----------------
async function runAI(){

  let s = getSettings();
  document.getElementById("loading").innerText = "Loading...";

  let data = await getWeather(s.place);

  let cloud = data.hourly.cloudcover;
  let rad = data.hourly.shortwave_radiation;
  let temp = data.hourly.temperature_2m;

  let html = "";

  for(let d=0; d<3; d++){

    let start = d*24;

    let wc = weightedCloud(cloud, rad, start);

    let avgRad = rad.slice(start,start+24).reduce((a,b)=>a+b)/24;

    let sunHours = rad.slice(start,start+24).filter(r=>r>120).length;

    let orientationFactor =
      s.orientation === "south" ? 1 :
      s.orientation === "se_sw" ? 0.92 :
      s.orientation === "east_west" ? 0.85 :
      0.65;

    let pv = estimatePV(
      s.pvSize,
      sunHours,
      0.85,
      s.shading/100,
      s.inverter,
      orientationFactor
    );

    let label = d===0?"Today":d===1?"Tomorrow":"Day 3";

    html += `
      <div class="card">
        <h3>${label}</h3>
        🌤️ Cloud: ${wc.toFixed(0)}%<br>
        ☀️ Radiation: ${avgRad.toFixed(0)}<br>
        🌡️ Temp: ${temp[start+12].toFixed(1)}°C<br>
        🔆 Sun hours: ${sunHours}<br>
        ⚡ PV Estimate: ${pv.toFixed(1)} kWh
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
  document.getElementById("loading").innerText = "";
}

// ---------------- INIT ----------------
window.onload = () => {
  loadUI();
};

</script>

</body>
</html>
