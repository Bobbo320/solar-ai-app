<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Hourly + Weather)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    .footer {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro (Hourly)</h2>

<div class="card">
📍 <b>Location:</b><br>
NR7 0WZ (Norwich, UK)<br>
<small>Lat: 52.627 | Lon: 1.331</small>
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<div id="output"></div>

<div class="footer">
  <b>📊 What Solar Score Means:</b><br><br>

  🔥 <b>85–100%</b> → Excellent solar<br>
  👍 <b>65–85%</b> → Good solar<br>
  ⚖️ <b>45–65%</b> → Moderate solar<br>
  ⚠️ <b>&lt;45%</b> → Low solar<br>
</div>

<script>
function soc(score) {
  if (score > 0.85) return "65%";
  if (score > 0.65) return "75%";
  if (score > 0.45) return "85%";
  return "95%";
}

function strategy(scores) {
  let avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  if (avg > 0.8) return "☀️ Strong solar period → Keep SOC lower to maximise export";
  if (avg > 0.6) return "⚖️ Mixed conditions → Balance SOC across days";
  return "⚠️ Weak solar period → Keep SOC higher to avoid grid import";
}

// Hourly solar scoring
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;

  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

// Weather classification from cloud cover
function weatherFromCloud(avgCloud) {
  if (avgCloud < 20) return "☀️ Clear";
  if (avgCloud < 40) return "🌤️ Partly cloudy";
  if (avgCloud < 70) return "☁️ Overcast";
  return "🌧️ Cloudy";
}

async function runAI() {
  try {
    let res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation&forecast_days=3&timezone=auto"
    );

    let data = await res.json();

    let times = data.hourly.time;
    let cloud = data.hourly.cloudcover;
    let radiation = data.hourly.shortwave_radiation;
    let temp = data.hourly.temperature_2m;

    let output = "";
    let dayScores = [];

    for (let d = 0; d < 3; d++) {

      let dayStart = d * 24;

      let scores = [];
      let temps = [];
      let clouds = [];

      for (let h = dayStart; h < dayStart + 24; h++) {

        let hour = new Date(times[h]).getHours();

        if (hour >= 10 && hour <= 15) {
          let score = hourlySolarScore(cloud[h], radiation[h]);
          scores.push(score);
          clouds.push(cloud[h]);
          temps.push(temp[h]);
        }
      }

      let avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;
      if (isNaN(avgScore)) avgScore = 0;

      let avgCloud = clouds.reduce((a,b)=>a+b,0) / clouds.length;
      let avgTemp = temps.reduce((a,b)=>a+b,0) / temps.length;

      dayScores.push(avgScore);

      let percent = (avgScore * 100).toFixed(0);

      output += `
        <div class="card">
          <b>Day ${d === 0 ? "Today" : d === 1 ? "Tomorrow" : "Day +2"}</b><br><br>

          🌤️ Weather: ${weatherFromCloud(avgCloud)}<br>
          🌡️ Avg Temp (midday): ${avgTemp.toFixed(1)}°C<br><br>

          ⚡ Solar Score: ${percent}%<br>
          🔋 Recommended SOC: ${soc(avgScore)}<br>
        </div>
      `;
    }

    output += `
      <div class="card">
        <b>📊 3-Day Strategy</b><br><br>
        ${strategy(dayScores)}
      </div>
    `;

    document.getElementById("output").innerHTML = output;

  } catch (err) {
    document.getElementById("output").innerHTML = "Error loading data";
  }
}
</script>

</body>
</html>
