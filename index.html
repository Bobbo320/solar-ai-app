<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button {
      padding: 10px;
      margin: 6px;
    }

    input {
      padding: 6px;
      margin: 4px;
      width: 80%;
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }

    .tab { display: none; }
    .active { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #555;
      padding: 6px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="showTab('main')">Main</button>
<button onclick="showTab('settings')">Settings</button>
<button onclick="showTab('history')">History</button>

<!-- MAIN -->
<div id="main" class="tab active">
  <div class="card">📍 System Active</div>

  <button onclick="runAI()">Plan Next 3 Days</button>
  <p id="loading"></p>
  <div id="output"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab">

  <div class="card">
    <h3>Settings</h3>

    <input id="postcode" placeholder="Postcode"><br>
    <input id="inverter" placeholder="Inverter kW"><br>
    <input id="battery" placeholder="Battery kWh"><br>
    <input id="pvSize" placeholder="PV kWp"><br>
    <input id="direction" placeholder="Direction (degrees)"><br>
    <input id="elevation" placeholder="Elevation (m)"><br>

    <button onclick="saveSettings()">Save Settings</button>
  </div>

  <div class="card">
    <h3>Manual PV Input</h3>

    <input type="date" id="pvDate"><br>
    <input type="number" id="pvInput" placeholder="kWh"><br>

    <button onclick="savePV()">Save PV</button>

    <div id="pvHistoryTable"></div>
  </div>

</div>

<!-- HISTORY -->
<div id="history" class="tab">
  <div class="card">
    <h3>PV History</h3>
    <div id="historyTable"></div>
  </div>

  <div class="card">
    <h3>Monthly Calibration</h3>
    <div id="calibrationTable"></div>
  </div>
</div>

<script>

let lastPredictedPV = null;

// ---------------- STORAGE ----------------
function getHistory() {
  return JSON.parse(localStorage.getItem("pvHistory")) || [];
}

// ---------------- SETTINGS ----------------
function saveSettings() {
  let settings = {
    postcode: document.getElementById("postcode").value,
    inverter: document.getElementById("inverter").value,
    battery: document.getElementById("battery").value,
    pvSize: document.getElementById("pvSize").value,
    direction: document.getElementById("direction").value,
    elevation: document.getElementById("elevation").value
  };

  localStorage.setItem("settings", JSON.stringify(settings));
  alert("Saved");
}

// ---------------- LOAD SETTINGS ----------------
function loadSettingsUI() {
  let s = JSON.parse(localStorage.getItem("settings")) || {};

  document.getElementById("postcode").value = s.postcode || "";
  document.getElementById("inverter").value = s.inverter || "";
  document.getElementById("battery").value = s.battery || "";
  document.getElementById("pvSize").value = s.pvSize || "";
  document.getElementById("direction").value = s.direction || "";
  document.getElementById("elevation").value = s.elevation || "";
}

// ---------------- AUTO LEARNING ----------------
function updateAutoLearning(date, predicted, actual) {

  let map = JSON.parse(localStorage.getItem("calibrationMap")) || {};
  let month = new Date(date).getMonth() + 1;

  let factor = actual / predicted;

  if (!map[month]) {
    map[month] = factor;
  } else {
    map[month] = (map[month] * 0.8) + (factor * 0.2);
  }

  localStorage.setItem("calibrationMap", JSON.stringify(map));
}

function getAutoCalibration(date) {
  let map = JSON.parse(localStorage.getItem("calibrationMap")) || {};
  let month = new Date(date).getMonth() + 1;
  return map[month] || 1;
}

// ---------------- PV ----------------
function savePV() {

  let pv = parseFloat(document.getElementById("pvInput").value);
  let date = document.getElementById("pvDate").value;

  if (!date || isNaN(pv)) {
    alert("Invalid input");
    return;
  }

  let history = getHistory();

  history = history.filter(d => d.date !== date);
  history.push({ date, kwh: pv });

  localStorage.setItem("pvHistory", JSON.stringify(history));

  if (lastPredictedPV) {
    updateAutoLearning(date, lastPredictedPV, pv);
  }

  renderPVHistory();
  renderHistory();
  renderCalibration();

  alert("Saved + Learning Updated");
}

// ---------------- WEATHER ----------------
async function getWeather() {

  let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,shortwave_radiation,precipitation,relativehumidity_2m,windspeed_10m&forecast_days=3&timezone=auto");

  return await res.json();
}

// ---------------- MAIN ----------------
async function runAI() {

  document.getElementById("loading").innerText = "Loading...";

  let data = await getWeather();

  let cloud = data.hourly.cloudcover;
  let rad = data.hourly.shortwave_radiation;
  let precip = data.hourly.precipitation;
  let humidity = data.hourly.relativehumidity_2m;
  let wind = data.hourly.windspeed_10m;

  let output = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;

    let sunshineHours = cloud.slice(start,start+24).filter(c => c < 50).length;

    let avgCloud = cloud.slice(start,start+24).reduce((a,b)=>a+b,0)/24;
    let avgRad = rad.slice(start,start+24).reduce((a,b)=>a+b,0)/24;
    let avgPrecip = precip.slice(start,start+24).reduce((a,b)=>a+b,0)/24;
    let avgHum = humidity.slice(start,start+24).reduce((a,b)=>a+b,0)/24;
    let avgWind = wind.slice(start,start+24).reduce((a,b)=>a+b,0)/24;

    let score = (1 - avgCloud/100) * 0.5 + (avgRad/1000) * 0.5;

    let basePV = score * 30;

    let calibration = getAutoCalibration(new Date());
    let predictedPV = basePV * calibration;

    if (d === 0) lastPredictedPV = predictedPV;

    output += `
      <div class="card">
        <b>${d===0?"Today":d===1?"Tomorrow":"Day +2"}</b><br><br>

        ⚡ Solar Score: ${(score*100).toFixed(0)}%<br>
        ☀️ Sunshine Hours: ${sunshineHours}<br><br>

        🌥️ Cloud: ${avgCloud.toFixed(1)}%<br>
        🌧️ Rain: ${avgPrecip.toFixed(2)} mm<br>
        🌡️ Humidity: ${avgHum.toFixed(0)}%<br>
        💨 Wind: ${avgWind.toFixed(1)} km/h<br>
        ☀️ Radiation: ${avgRad.toFixed(0)} W/m²<br><br>

        🔋 Predicted PV: ${predictedPV.toFixed(1)} kWh
      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
  document.getElementById("loading").innerText = "";
}

// ---------------- RENDER PV HISTORY ----------------
function renderPVHistory() {

  let history = getHistory();
  let el = document.getElementById("pvHistoryTable");

  if (!el) return;

  if (history.length === 0) {
    el.innerHTML = "No PV data";
    return;
  }

  history.sort((a,b)=> new Date(b.date)-new Date(a.date));

  let html = "<table><tr><th>Date</th><th>kWh</th></tr>";

  history.forEach(h => {
    html += `<tr><td>${h.date}</td><td>${h.kwh}</td></tr>`;
  });

  html += "</table>";

  el.innerHTML = html;
}

// ---------------- HISTORY TAB ----------------
function renderHistory() {

  let history = getHistory();
  let el = document.getElementById("historyTable");

  if (!el) return;

  if (history.length === 0) {
    el.innerHTML = "No data";
    return;
  }

  history.sort((a,b)=> new Date(b.date)-new Date(a.date));

  let html = "<table><tr><th>Date</th><th>kWh</th></tr>";

  history.forEach(h => {
    html += `<tr><td>${h.date}</td><td>${h.kwh}</td></tr>`;
  });

  html += "</table>";

  el.innerHTML = html;
}

// ---------------- CALIBRATION TABLE ----------------
function renderCalibration() {

  let map = JSON.parse(localStorage.getItem("calibrationMap")) || {};
  let el = document.getElementById("calibrationTable");

  let html = "<table><tr><th>Month</th><th>Factor</th></tr>";

  for (let m = 1; m <= 12; m++) {
    html += `<tr><td>${m}</td><td>${map[m] ? map[m].toFixed(2) : "-"}</td></tr>`;
  }

  html += "</table>";
  el.innerHTML = html;
}

// ---------------- TABS ----------------
function showTab(tab) {

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if (tab === "settings") {
    loadSettingsUI();
    renderPVHistory();
  }

  if (tab === "history") {
    renderHistory();
    renderCalibration();
  }
}

// ---------------- INIT ----------------
renderPVHistory();
renderHistory();
renderCalibration();

</script>

</body>
</html>
