<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      font-size: 16px;
      margin: 10px;
    }
    .card {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI</h2>

<button onclick="enableNotifications()">Enable Notifications</button>
<br>
<button onclick="runAI()">Run SOC Optimiser</button>

<div class="card" id="output">Loading...</div>

<script>
// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

let notificationsEnabled = false;

function enableNotifications() {
  Notification.requestPermission().then(permission => {
    notificationsEnabled = permission === "granted";
    alert("Notifications: " + permission);
  });
}

async function runAI() {
  let url = "https://api.open-meteo.com/v1/forecast?latitude=52.63&longitude=1.30&daily=weathercode,temperature_2m_max&timezone=auto";

  let res = await fetch(url);
  let data = await res.json();

  let code = data.daily.weathercode[1];
  let temp = data.daily.temperature_2m_max[1];

  let solarScore = 0;

  if ([0].includes(code)) solarScore = 1.0;
  else if ([1,2].includes(code)) solarScore = 0.8;
  else if ([3].includes(code)) solarScore = 0.6;
  else if ([45,48].includes(code)) solarScore = 0.4;
  else if ([51,61,63].includes(code)) solarScore = 0.3;
  else solarScore = 0.2;

  if (temp >= 10 && temp <= 20) solarScore += 0.05;

  solarScore = Math.min(1, solarScore);

  let soc;
  if (solarScore > 0.85) soc = "60–70%";
  else if (solarScore > 0.65) soc = "70–80%";
  else if (solarScore > 0.45) soc = "80–90%";
  else soc = "90–100%";

  let outputText = `
    🔋 SOC: ${soc}<br>
    🌤️ Score: ${(solarScore*100).toFixed(0)}%<br>
  `;

  document.getElementById("output").innerHTML = outputText;

  if (notificationsEnabled) {
    new Notification("Solar SOC Recommendation", {
      body: `SOC: ${soc} | Score: ${(solarScore*100).toFixed(0)}%`
    });
  }
}
</script>

</body>
</html>
