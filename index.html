<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro (Detailed)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    .footer {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro (Detailed)</h2>

<div class="card">
📍 <b>Location:</b><br>
NR7 0WZ (Norwich, UK)<br>
<small>Lat: 52.627 | Lon: 1.331</small>
</div>

<button onclick="runAI()">Plan Next 3 Days</button>

<div id="output"></div>

<div class="footer">
  <b>📊 Solar Score Meaning:</b><br><br>

  🔥 85–100% → Excellent<br>
  👍 65–85% → Good<br>
  ⚖️ 45–65% → Moderate<br>
  ⚠️ &lt;45% → Low solar<br>
</div>

<script>
function soc(score) {
  if (score > 0.85) return "65%";
  if (score > 0.65) return "75%";
  if (score > 0.45) return "85%";
  return "95%";
}

function explain(score) {
  if (score > 0.85) return "Excellent solar conditions. Battery will likely fill early with strong export.";
  if (score > 0.65) return "Good solar with some cloud. Expect solid battery charging.";
  if (score > 0.45) return "Moderate solar. Battery may not fully charge.";
  return "Low solar. Prioritise higher SOC to avoid grid import.";
}

// Hourly solar score
function hourlySolarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radiationFactor = radiation / 1000;

  let score = (cloudFactor * 0.6) + (radiationFactor * 0.4);
  return Math.min(1, Math.max(0, score));
}

async function runAI() {
  try {
    let res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation&forecast_days=3&timezone=auto"
    );

    let data = await res.json();

    let times = data.hourly.time;
    let cloud = data.hourly.cloudcover;
    let radiation = data.hourly.shortwave_radiation;
    let temp = data.hourly.temperature_2m;

    let output = "";
    let dayScores = [];

    for (let d = 0; d < 3; d++) {

      let dayStart = d * 24;

      let scores = [];
      let cloudVals = [];
      let radVals = [];
      let tempVals = [];

      for (let h = dayStart; h < dayStart + 24; h++) {

        let hour = new Date(times[h]).getHours();

        if (hour >= 10 && hour <= 15) {
          scores.push(hourlySolarScore(cloud[h], radiation[h]));
          cloudVals.push(cloud[h]);
          radVals.push(radiation[h]);
          tempVals.push(temp[h]);
        }
      }

      let avgScore = scores.reduce((a,b)=>a+b,0) / scores.length;
      if (isNaN(avgScore)) avgScore = 0;

      let avgCloud = cloudVals.reduce((a,b)=>a+b,0) / cloudVals.length;
      let avgRad = radVals.reduce((a,b)=>a+b,0) / radVals.length;
      let avgTemp = tempVals.reduce((a,b)=>a+b,0) / tempVals.length;

      dayScores.push(avgScore);

      let percent = (avgScore * 100).toFixed(0);

      output += `
        <div class="card">
          <b>Day ${d === 0 ? "Today" : d === 1 ? "Tomorrow" : "Day +2"}</b><br><br>

          ⚡ <b>Solar Score:</b> ${percent}%<br><br>

          ☁️ Cloud impact: ${(1 - avgCloud / 100).toFixed(2)}<br>
          ☀️ Radiation impact: ${(avgRad / 1000).toFixed(2)}<br>
          🌡️ Temperature: ${avgTemp.toFixed(1)}°C<br><br>

          🔋 Recommended SOC: ${soc(avgScore)}<br><br>

          🧠 ${explain(avgScore)}
        </div>
      `;
    }

    let avg = dayScores.reduce((a,b)=>a+b,0)/dayScores.length;

    output += `
      <div class="card">
        <b>📊 3-Day Strategy</b><br><br>
        ${avg > 0.7 ? "☀️ Favour export — lower SOC" : "⚖️ Balance SOC across days"}
      </div>
    `;

    document.getElementById("output").innerHTML = output;

  } catch (err) {
    document.getElementById("output").innerHTML = "Error loading data";
  }
}
</script>

</body>
</html>
