<!DOCTYPE html>
<html>
<head>
  <title>Solar SOC AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 15px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      text-align: left;
    }
    input {
      padding: 8px;
      width: 180px;
      margin-bottom: 10px;
    }
    .hidden { display: none; }
  </style>
</head>

<body>

<h2>⚡ Solar SOC AI Pro</h2>

<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="runAI()">Plan Next 3 Days</button>

<div id="settingsPanel" class="card hidden">
  <h3>Settings</h3>

  <label>Postcode:</label><br>
  <input id="postcode" type="text"><br>

  <label>PV Array Size (kWp):</label><br>
  <input id="pvSize" type="number" step="0.1"><br>

  <label>Inverter Size (kW):</label><br>
  <input id="inverter" type="number" step="0.1"><br>

  <label>Battery Capacity (kWh):</label><br>
  <input id="battery" type="number" step="0.1"><br>

  <label>Daily Load (kWh):</label><br>
  <input id="dailyLoad" type="number"><br>

  <label>Efficiency (%):</label><br>
  <input id="efficiency" type="number"><br>

  <br>
  <button onclick="saveSettings()">Save Settings</button>
</div>

<p id="loading"></p>
<div id="output"></div>

<script>

// -------------------- Default Settings --------------------
const defaultSettings = {
  postcode: "NR7 0WZ",
  pvSize: 6.5,
  inverter: 5,
  battery: 10.64,
  dailyLoad: 10,
  efficiency: 85
};

// -------------------- Load Settings --------------------
function loadSettings() {
  let s = JSON.parse(localStorage.getItem("settings")) || defaultSettings;
  return s;
}

// -------------------- Save Settings --------------------
function saveSettings() {
  let s = {
    postcode: document.getElementById("postcode").value,
    pvSize: parseFloat(document.getElementById("pvSize").value),
    inverter: parseFloat(document.getElementById("inverter").value),
    battery: parseFloat(document.getElementById("battery").value),
    dailyLoad: parseFloat(document.getElementById("dailyLoad").value),
    efficiency: parseFloat(document.getElementById("efficiency").value)
  };
  localStorage.setItem("settings", JSON.stringify(s));
  alert("Saved");
}

// -------------------- Toggle Settings --------------------
function toggleSettings() {
  let panel = document.getElementById("settingsPanel");
  let s = loadSettings();

  document.getElementById("postcode").value = s.postcode;
  document.getElementById("pvSize").value = s.pvSize;
  document.getElementById("inverter").value = s.inverter;
  document.getElementById("battery").value = s.battery;
  document.getElementById("dailyLoad").value = s.dailyLoad;
  document.getElementById("efficiency").value = s.efficiency;

  panel.classList.toggle("hidden");
}

// -------------------- Weather Fetch --------------------
async function getWeather() {
  let res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=52.627&longitude=1.331&hourly=cloudcover,temperature_2m,shortwave_radiation,relativehumidity_2m,windspeed_10m,precipitation&forecast_days=3&timezone=auto"
  );
  return await res.json();
}

// -------------------- Temperature Efficiency --------------------
function temperatureEfficiency(temp) {
  const nominalTemp = 25;
  const coef = -0.004;

  let delta = temp - nominalTemp;
  let factor = 1 + (delta * coef);

  if (factor < 0.8) factor = 0.8;
  if (factor > 1.05) factor = 1.05;

  return factor;
}

// -------------------- Solar Score --------------------
function solarScore(cloud, radiation) {
  let cloudFactor = 1 - (cloud / 100);
  let radFactor = radiation / 1000;
  return Math.max(0, Math.min(1, (cloudFactor * 0.6) + (radFactor * 0.4)));
}

// -------------------- Sunshine Hours --------------------
function sunshineHours(radiation, start) {
  let hours = 0;
  for (let i = start; i < start + 24; i++) {
    if (radiation[i] > 120) hours++;
  }
  return hours;
}

// -------------------- PV Model --------------------
function estimatePV(settings, score, hours, temp) {
  let tempFactor = temperatureEfficiency(temp);
  let base = settings.pvSize * hours * score * (settings.efficiency / 100) * tempFactor;
  let capped = settings.inverter * hours;
  return Math.min(base, capped);
}

// -------------------- Run --------------------
async function runAI() {

  let settings = loadSettings();
  let data = await getWeather();

  let cloud = data.hourly.cloudcover;
  let temp = data.hourly.temperature_2m;
  let rad = data.hourly.shortwave_radiation;

  let output = "";

  for (let d = 0; d < 3; d++) {

    let start = d * 24;

    let avgCloud = cloud.slice(start, start + 24).reduce((a,b)=>a+b,0)/24;
    let avgRad = rad.slice(start, start + 24).reduce((a,b)=>a+b,0)/24;
    let middayTemp = temp[start + 12];

    let score = solarScore(avgCloud, avgRad);
    let hours = sunshineHours(rad, start);
    let pv = estimatePV(settings, score, hours, middayTemp);

    let soc = Math.round(100 - ((settings.dailyLoad - pv) / settings.battery) * 100);
    soc = Math.max(20, Math.min(100, soc));

    let label = d === 0 ? "Today" : d === 1 ? "Tomorrow" : "The day after tomorrow";

    let socStyle = d === 1 ? "style='color:red;font-weight:bold;font-size:20px;'" : "";

    output += `
      <div class="card">
        <h3>${label}</h3>

        <b>🌤️ Cloud:</b> ${avgCloud.toFixed(0)}%<br>
        <b>☀️ Radiation:</b> ${avgRad.toFixed(0)} W/m²<br>
        <b>🌡️ Midday Temp:</b> ${middayTemp.toFixed(1)}°C<br>
        <b>🌞 Sunshine Hours:</b> ${hours}<br>

        <hr>

        <b>⚡ Estimated PV:</b> ${pv.toFixed(2)} kWh<br>

        <br>
        <span ${socStyle}>🔋 Recommended SOC: ${soc}%</span>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
}

// -------------------- Init defaults --------------------
window.onload = () => {
  let s = loadSettings();
  if (!localStorage.getItem("settings")) {
    localStorage.setItem("settings", JSON.stringify(defaultSettings));
  }
};

</script>

</body>
</html>
